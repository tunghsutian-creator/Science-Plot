    function renderLiveMarker(point, series) {
      if (!series.enabled || series.marker === "none" || series.markerSize <= 0) return "";
      const r = roundCoord(series.markerSize + 1.4);
      const x = point.x;
      const y = point.y;
      const color = escapeHtml(series.color);
      const common = `class="live-point" data-series="${escapeHtml(series.label)}" data-x="${escapeHtml(point.rawXLabel)}" data-y="${escapeHtml(point.rawYLabel)}"`;
      if (series.marker === "square") {
        const side = roundCoord(Number(r) * 1.7);
        return `<rect ${common} x="${roundCoord(Number(x) - Number(side) / 2)}" y="${roundCoord(Number(y) - Number(side) / 2)}" width="${side}" height="${side}" rx="1.5" fill="${color}"></rect>`;
      }
      if (series.marker === "triangle") {
        const size = Number(r) * 1.9;
        const points = `${x},${roundCoord(Number(y) - size / 1.25)} ${roundCoord(Number(x) - size / 1.05)},${roundCoord(Number(y) + size / 1.35)} ${roundCoord(Number(x) + size / 1.05)},${roundCoord(Number(y) + size / 1.35)}`;
        return `<polygon ${common} points="${points}" fill="${color}"></polygon>`;
      }
      if (series.marker === "diamond") {
        const size = Number(r) * 1.45;
        const points = `${x},${roundCoord(Number(y) - size)} ${roundCoord(Number(x) + size)},${y} ${x},${roundCoord(Number(y) + size)} ${roundCoord(Number(x) - size)},${y}`;
        return `<polygon ${common} points="${points}" fill="${color}"></polygon>`;
      }
      if (series.marker === "x" || series.marker === "plus") {
        const size = Number(r) * 1.25;
        const lines = series.marker === "x"
          ? [
              [Number(x) - size, Number(y) - size, Number(x) + size, Number(y) + size],
              [Number(x) - size, Number(y) + size, Number(x) + size, Number(y) - size],
            ]
          : [
              [Number(x) - size, Number(y), Number(x) + size, Number(y)],
              [Number(x), Number(y) - size, Number(x), Number(y) + size],
            ];
        return `<g ${common}>${lines.map((line) => `<line x1="${roundCoord(line[0])}" y1="${roundCoord(line[1])}" x2="${roundCoord(line[2])}" y2="${roundCoord(line[3])}" stroke="${color}" stroke-width="2" stroke-linecap="round"></line>`).join("")}</g>`;
      }
      return `<circle ${common} cx="${x}" cy="${y}" r="${r}" fill="${color}"></circle>`;
    }

    function buildLiveChart(spec) {
      const width = 920;
      const height = 560;
      const left = 96;
      const right = 858;
      const top = 44;
      const bottom = 462;
      const plotWidth = right - left;
      const plotHeight = bottom - top;
      const options = spec?.contract?.render_options || {};
      const xMode = chartScaleMode("x", options, spec);
      const yMode = chartScaleMode("y", options, spec);
      const reverseX = chartBooleanOption("reverse_x", options, Boolean(spec?.axes?.x?.reversed));
      const xLabel = formatAxisLabel(refineOptionValue("x_label_override") || spec?.axes?.x?.label || spec?.xAxisLabel || "X");
      const yLabel = formatAxisLabel(refineOptionValue("y_label_override") || spec?.axes?.y?.label || spec?.yAxisLabel || "Y");
      const labelMode = String(refineOptionValue("series_label_mode") || options.series_label_mode || "");
      const palette = ["#0b8a7a", "#3366e0", "#c7780a", "#7c3aed", "#d9394a", "#4a8c2a"];
      const seriesMeta = new Map((spec?.series || []).map((item) => [String(item.label || ""), item]));
      const rowsBySeries = new Map();
      (spec?.data || []).forEach((row) => {
        const x = Number(row.x);
        const y = Number(row.y);
        if (!Number.isFinite(x) || !Number.isFinite(y)) return;
        if (xMode === "log" && x <= 0) return;
        if (yMode === "log" && y <= 0) return;
        const label = String(row.series || "Series");
        if (!rowsBySeries.has(label)) rowsBySeries.set(label, []);
        rowsBySeries.get(label).push({ x, y });
      });

      const rawSeries = Array.from(rowsBySeries.entries()).map(([label, points], index) => {
        const meta = seriesMeta.get(label) || {};
        const color = safeSeriesColor(seriesStyleValue(label, "color", meta.color || palette[index % palette.length]), palette[index % palette.length]);
        const lineWidth = cleanNumber(seriesStyleValue(label, "line_width", 2.2), 2.2);
        const markerSize = cleanNumber(seriesStyleValue(label, "marker_size", 3.2), 3.2);
        const marker = String(seriesStyleValue(label, "marker", "") || defaultMarkerForKind(meta.kind));
        const enabled = seriesStyleValue(label, "enabled", meta.visible !== false) !== false;
        return { label, points, color, lineWidth, markerSize, marker, enabled };
      }).filter((seriesItem) => seriesItem.points.length);

      const domainPoints = rawSeries.filter((seriesItem) => seriesItem.enabled).flatMap((seriesItem) => seriesItem.points);
      const allPoints = domainPoints.length ? domainPoints : rawSeries.flatMap((seriesItem) => seriesItem.points);
      const xDomain = transformedDomain(
        allPoints.map((point) => point.x),
        xMode,
        chartNumberOption("x_min", options),
        chartNumberOption("x_max", options),
        spec?.axes?.x?.limits,
      );
      const yDomain = transformedDomain(
        allPoints.map((point) => point.y),
        yMode,
        chartNumberOption("y_min", options),
        chartNumberOption("y_max", options),
        spec?.axes?.y?.limits,
      );
      const scaleX = (value) => {
        const ratio = (transformValue(value, xMode) - xDomain.min) / (xDomain.max - xDomain.min);
        return left + (reverseX ? 1 - ratio : ratio) * plotWidth;
      };
      const scaleY = (value) => bottom - ((transformValue(value, yMode) - yDomain.min) / (yDomain.max - yDomain.min)) * plotHeight;
      const showInlineLabels = labelMode === "inline";
      const series = rawSeries.map((seriesItem) => {
        const plotted = seriesItem.points.map((point) => ({
          x: roundCoord(scaleX(point.x)),
          y: roundCoord(scaleY(point.y)),
          rawX: point.x,
          rawY: point.y,
          rawXLabel: formatTickValue(point.x),
          rawYLabel: formatTickValue(point.y),
        }));
        const pathPoints = decimatePoints(plotted, 1800);
        const markerPoints = decimatePoints(plotted, 90).filter((point) => insidePlot(point, { left, right, top, bottom }));
        const labelPoint = [...plotted].reverse().find((point) => insidePlot(point, { left, right, top, bottom }));
        const directLabel = showInlineLabels && labelPoint ? {
          x: roundCoord(Math.min(right - 12, Math.max(left + 12, Number(labelPoint.x) + (reverseX ? -10 : 10)))),
          y: roundCoord(Math.min(bottom - 10, Math.max(top + 16, Number(labelPoint.y) - 8))),
          anchor: reverseX ? "end" : "start",
        } : null;
        return {
          ...seriesItem,
          points: plotted,
          markerPoints,
          directLabel,
          path: pathPoints.map((point, pointIndex) => `${pointIndex ? "L" : "M"}${point.x},${point.y}`).join(" "),
        };
      });
      const flatPoints = series
        .filter((seriesItem) => seriesItem.enabled)
        .flatMap((seriesItem) => seriesItem.points.map((point) => ({ ...point, series: seriesItem.label, color: seriesItem.color })))
        .filter((point) => insidePlot(point, { left, right, top, bottom }));
      const xTicks = axisTicks(xDomain, xMode).map((tick) => ({ x: roundCoord(scaleX(tick.value)), label: tick.label }));
      const yTicks = axisTicks(yDomain, yMode).map((tick) => ({ y: roundCoord(scaleY(tick.value)), label: tick.label }));
      const zeroX = xMode === "linear" && xDomain.rawMin <= 0 && xDomain.rawMax >= 0 ? roundCoord(scaleX(0)) : "";
      const zeroY = yMode === "linear" && yDomain.rawMin <= 0 && yDomain.rawMax >= 0 ? roundCoord(scaleY(0)) : "";
      return {
        width,
        height,
        left,
        right,
        top,
        bottom,
        plotWidth,
        plotHeight,
        clipId: "live-chart-clip",
        xLabel,
        yLabel,
        xTicks,
        yTicks,
        zeroX,
        zeroY,
        series,
        flatPoints,
      };
    }

    function chartScaleMode(axis, options, spec) {
      const key = axis === "x" ? "xscale" : "yscale";
      const value = String(refineOptionValue(key) || options[key] || spec?.axes?.[axis]?.scale || "");
      return value === "log" ? "log" : "linear";
    }

    function chartBooleanOption(key, options, fallback = false) {
      const value = refineOptionValue(key);
      if (value === "") return Boolean(options[key] ?? fallback);
      return Boolean(value);
    }

    function chartNumberOption(key, options) {
      const value = refineOptionValue(key);
      const candidate = value === "" ? options[key] : value;
      const number = Number(candidate);
      return Number.isFinite(number) ? number : null;
    }

    function transformedDomain(values, mode, minOverride = null, maxOverride = null, rendererLimits = null) {
      const rendererMin = Array.isArray(rendererLimits) ? Number(rendererLimits[0]) : NaN;
      const rendererMax = Array.isArray(rendererLimits) ? Number(rendererLimits[1]) : NaN;
      const hasRendererMin = minOverride === null && Number.isFinite(rendererMin) && (mode !== "log" || rendererMin > 0);
      const hasRendererMax = maxOverride === null && Number.isFinite(rendererMax) && (mode !== "log" || rendererMax > 0);
      const transformed = values.map((value) => transformValue(value, mode)).filter(Number.isFinite);
      if (!transformed.length && !hasRendererMin && !hasRendererMax) return { min: 0, max: 1, rawMin: 0, rawMax: 1 };
      let min = minOverride !== null ? transformValue(minOverride, mode) : (hasRendererMin ? transformValue(rendererMin, mode) : Math.min(...transformed));
      let max = maxOverride !== null ? transformValue(maxOverride, mode) : (hasRendererMax ? transformValue(rendererMax, mode) : Math.max(...transformed));
      if (!Number.isFinite(min)) min = Math.min(...transformed);
      if (!Number.isFinite(max)) max = Math.max(...transformed);
      if (min > max) [min, max] = [max, min];
      if (min === max) {
        const pad = Math.abs(min || 1) * 0.08;
        min -= pad;
        max += pad;
      } else {
        const pad = (max - min) * 0.04;
        if (minOverride === null && !hasRendererMin) min -= pad;
        if (maxOverride === null && !hasRendererMax) max += pad;
      }
      return { min, max, rawMin: inverseTransformValue(min, mode), rawMax: inverseTransformValue(max, mode) };
    }

    function transformValue(value, mode) {
      return mode === "log" ? Math.log10(value) : value;
    }

    function inverseTransformValue(value, mode) {
      return mode === "log" ? 10 ** value : value;
    }

    function axisTicks(domain, mode) {
      if (mode === "log") {
        const start = Math.ceil(domain.min);
        const end = Math.floor(domain.max);
        const ticks = [];
        for (let power = start; power <= end; power += 1) {
          ticks.push({ value: 10 ** power, label: formatTickValue(10 ** power) });
        }
        if (ticks.length >= 2) return ticks.slice(0, 6);
      }
      return Array.from({ length: 5 }, (_, index) => {
        const value = inverseTransformValue(domain.min + ((domain.max - domain.min) * index) / 4, mode);
        return { value, label: formatTickValue(value) };
      });
    }

    function defaultMarkerForKind(kind) {
      return kind === "scatter" ? "circle" : "none";
    }

    function formatAxisLabel(value) {
      return String(value || "")
        .replaceAll("$", "")
        .replaceAll("\\\\cdot", "·")
        .replaceAll("\\cdot", "·")
        .replaceAll("^{-1}", "⁻¹")
        .replaceAll("^{-2}", "⁻²")
        .replaceAll("^{-3}", "⁻³")
        .replaceAll("^2", "²")
        .replaceAll("^3", "³")
        .replaceAll("\\omega", "ω");
    }

    function cleanNumber(value, fallback) {
      const number = Number(value);
      return Number.isFinite(number) ? number : fallback;
    }

    function decimatePoints(points, maxPoints) {
      if (points.length <= maxPoints) return points;
      const step = Math.ceil(points.length / maxPoints);
      return points.filter((_, index) => index % step === 0 || index === points.length - 1);
    }

    function insidePlot(point, plot) {
      const x = Number(point.x);
      const y = Number(point.y);
      return x >= plot.left && x <= plot.right && y >= plot.top && y <= plot.bottom;
    }

    function formatTickValue(value) {
      const number = Number(value);
      if (!Number.isFinite(number)) return "";
      const abs = Math.abs(number);
      if ((abs >= 10000 || (abs > 0 && abs < 0.01))) return number.toExponential(1);
      if (abs >= 100) return number.toFixed(0);
      if (abs >= 10) return number.toFixed(1).replace(/\.0$/, "");
      return number.toFixed(2).replace(/\.?0+$/, "");
    }

    function safeSeriesColor(value, fallback) {
      const color = String(value || "");
      return /^#[0-9a-fA-F]{6}$/.test(color) ? color : fallback;
    }

    function roundCoord(value) {

    function initLiveChartInteraction() {
      const svg = document.querySelector("#liveChartSvg");
      if (!svg) return;

      const chart = liveChartModel;
      const crosshair = svg.querySelector("#chartCrosshair");
      const crosshairX = svg.querySelector("#chartCrosshairX");
      const crosshairY = svg.querySelector("#chartCrosshairY");
      const focusDot = svg.querySelector("#chartFocusDot");
      const tooltip = svg.querySelector("#chartTooltip");
      const tooltipRect = tooltip?.querySelector("rect");
      const tooltipText1 = svg.querySelector("#chartTooltipText1");
      const tooltipText2 = svg.querySelector("#chartTooltipText2");
      const hitArea = svg.querySelector("#chartHitArea");

      svg.querySelectorAll("[data-series-label]").forEach((group) => {
        group.addEventListener("pointerenter", () => {
          state.activeSeries = group.dataset.seriesLabel || "";
          updateLiveSeriesFocus(svg);
        });
      });

      if (hitArea && chart?.flatPoints?.length) {
        const moveFocus = (event) => {
          const point = svgPointFromEvent(svg, event);
          const nearest = nearestChartPoint(chart.flatPoints, point.x, point.y);
          if (!nearest || !crosshair || !crosshairX || !crosshairY || !focusDot || !tooltip || !tooltipRect || !tooltipText1 || !tooltipText2) return;
          state.activeSeries = nearest.series || "";
          updateLiveSeriesFocus(svg);
          crosshairX.setAttribute("x1", nearest.x);
          crosshairX.setAttribute("x2", nearest.x);
          crosshairY.setAttribute("y1", nearest.y);
          crosshairY.setAttribute("y2", nearest.y);
          focusDot.setAttribute("cx", nearest.x);
          focusDot.setAttribute("cy", nearest.y);
          focusDot.setAttribute("stroke", nearest.color || "#0b8a7a");
          tooltipText1.textContent = nearest.series || "";
          tooltipText2.textContent = `${nearest.rawXLabel} / ${nearest.rawYLabel}`;
          const tx = Math.min(Number(nearest.x) + 14, chart.width - 204);
          const ty = Math.max(Number(nearest.y) - 68, 12);
          tooltipRect.setAttribute("x", String(tx));
          tooltipRect.setAttribute("y", String(ty));
          tooltipText1.setAttribute("x", String(tx + 12));
          tooltipText1.setAttribute("y", String(ty + 20));
          tooltipText2.setAttribute("x", String(tx + 12));
          tooltipText2.setAttribute("y", String(ty + 39));
          crosshair.classList.add("visible");
        };
        hitArea.addEventListener("pointermove", moveFocus);
        hitArea.addEventListener("pointerenter", moveFocus);
        hitArea.addEventListener("pointerleave", () => {
          crosshair?.classList.remove("visible");
        });
      }

      const legend = document.querySelector("#liveChartLegend");
      if (legend) {
        legend.querySelectorAll(".live-legend-item").forEach((item) => {
          item.addEventListener("click", () => {
            const label = item.dataset.legendSeries || "";
            state.activeSeries = label;
            const currentSeries = chart?.series?.find((series) => series.label === label);
            const currentlyEnabled = seriesStyleValue(label, "enabled", currentSeries?.enabled !== false) !== false;
            setSeriesStyle(label, "enabled", !currentlyEnabled);
          });
        });
      }

      let svgViewBox = svg.getAttribute("data-original-viewbox") || "0 0 900 560";
      svg.addEventListener("dblclick", () => {
        svgViewBox = svg.getAttribute("data-original-viewbox") || "0 0 900 560";
        svg.setAttribute("viewBox", svgViewBox);
      });

      svg.addEventListener("wheel", (event) => {
        event.preventDefault();
        const parts = svgViewBox.split(" ").map(Number);
        if (parts.length < 4) return;
        let [vx, vy, vw, vh] = parts;
        const factor = event.deltaY < 0 ? 0.88 : 1.12;
        const cx = vx + vw / 2;
        const cy = vy + vh / 2;
        vw *= factor;
        vh *= factor;
        vx = cx - vw / 2;
        vy = cy - vh / 2;
        svgViewBox = `${vx} ${vy} ${vw} ${vh}`;
        svg.setAttribute("viewBox", svgViewBox);
      });

      let panning = false;
      let panStart = { x: 0, y: 0 };
      let panOrigin = { x: 0, y: 0 };
      svg.addEventListener("pointerdown", (event) => {
        if (event.target.closest(".live-point")) return;
        panning = true;
        panStart = { x: event.clientX, y: event.clientY };
        const parts = svgViewBox.split(" ").map(Number);
        panOrigin = { x: parts[0] || 0, y: parts[1] || 0 };
        svg.setPointerCapture(event.pointerId);
      });
      svg.addEventListener("pointermove", (event) => {
        if (!panning) return;
        const parts = svgViewBox.split(" ").map(Number);
        if (parts.length < 4) return;
        const dx = (event.clientX - panStart.x) * (parts[2] / svg.clientWidth);
        const dy = (event.clientY - panStart.y) * (parts[3] / svg.clientHeight);
        parts[0] = panOrigin.x - dx;
        parts[1] = panOrigin.y - dy;
        svgViewBox = parts.join(" ");
        svg.setAttribute("viewBox", svgViewBox);
      });
      svg.addEventListener("pointerup", () => { panning = false; });
    }

    function updateLiveSeriesFocus(svg) {
      svg.querySelectorAll(".live-series-group").forEach((group) => {
        group.classList.toggle("active", group.dataset.seriesLabel === state.activeSeries);
      });
      document.querySelectorAll(".live-legend-item").forEach((item) => {
        item.classList.toggle("active", item.dataset.legendSeries === state.activeSeries);
      });
    }

    function svgPointFromEvent(svg, event) {
      const matrix = svg.getScreenCTM();
      if (!matrix) return { x: 0, y: 0 };
      const point = svg.createSVGPoint();
      point.x = event.clientX;
      point.y = event.clientY;
      const transformed = point.matrixTransform(matrix.inverse());
      return { x: transformed.x, y: transformed.y };
    }

    function nearestChartPoint(points, x, y) {
      let nearest = null;
      let bestDistance = Number.POSITIVE_INFINITY;
      points.forEach((point) => {
        const dx = Number(point.x) - x;
        const dy = Number(point.y) - y;
        const distance = dx * dx + dy * dy;
        if (distance < bestDistance) {
          nearest = point;
          bestDistance = distance;
        }
      });
      return nearest;
    }

    async function fetchProjectList(searchTerm) {
      const list = document.getElementById("projectBrowserList");
      if (!list) return;
      list.innerHTML = '<div class="project-browser-empty">Loading...</div>';
      try {
        const url = searchTerm
          ? `/api/projects?search=${encodeURIComponent(searchTerm)}`
          : "/api/projects";
        const response = await fetch(url);
        const payload = await response.json();
        const projects = payload.projects || [];
        if (!projects.length) {
          list.innerHTML = '<div class="project-browser-empty">没有找到项目</div>';
          return;
        }
        list.innerHTML = projects.map((project) => {
          const typeLabel = (project.data_type?.label || project.data_type?.id || "");
          const expLabel = (project.experiment?.label || project.experiment?.id || "");
          const kind = [typeLabel, expLabel].filter(Boolean).join(" · ") || "未知类型";
          const mtime = project.mtime_ns
            ? new Date(project.mtime_ns / 1000000).toLocaleDateString("zh-CN", {
                month: "short", day: "numeric", hour: "2-digit", minute: "2-digit",
              })
            : "";
          return `
            <div class="project-browser-row" data-slug="${escapeHtml(project.slug)}">
              <div class="project-browser-row-meta">
                <div class="project-browser-row-name">${escapeHtml(project.project_name || project.slug)}</div>
                <div class="project-browser-row-info">
                  <span class="project-browser-row-chip">${escapeHtml(kind)}</span>
                  ${project.figure_count ? `<span class="project-browser-row-chip">${project.figure_count} figures</span>` : ""}
                  ${project.group_count ? `<span class="project-browser-row-chip">${project.group_count} groups</span>` : ""}
                  ${mtime ? `<span class="project-browser-row-chip">${mtime}</span>` : ""}
                  ${project.has_failure ? '<span class="project-browser-row-chip" style="background:var(--rose-soft);color:var(--rose)">needs fix</span>' : ""}
                </div>
              </div>
              <div class="project-browser-row-right">
                <svg class="project-browser-row-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
              </div>
            </div>
          `;
        }).join("");

        list.querySelectorAll(".project-browser-row").forEach((row) => {
          row.onclick = function () {
            const slug = row.dataset.slug;
            document.getElementById("projectBrowserOverlay").classList.add("hidden");
            if (slug) loadProject(slug);
          };
        });
      } catch (error) {
        list.innerHTML = `<div class="project-browser-empty">加载失败: ${escapeHtml(error.message)}</div>`;
      }
    }

    function addFiles(files) {
      if (!files.length) return;
      const group = state.groups[state.activeGroup] || state.groups[0];
      group.files.push(...files.map((file) => ({
        name: file.name,
        size: file.size,
        file,
        preview_id: `upload:${++state.fileSequence}:${file.name}`
      })));
      state.activePreviewKey = fileKey(group.files[group.files.length - 1]);
      setStatus(`${files.length} added`);
      render();
    }

    function addGroup() {
      state.groups.push({ sample: `Sample ${state.groups.length + 1}`, files: [] });
      state.activeGroup = state.groups.length - 1;
      render();
    }

    function removeGroup(index) {
      if (state.groups.length <= 1) return;
      const [removed] = state.groups.splice(index, 1);
      (removed.files || []).forEach((file) => clearFileCaches(file));
      state.activeGroup = Math.min(state.activeGroup, state.groups.length - 1);
      render();
    }

    function removeFile(groupIndex, fileIndex) {
      const group = state.groups[groupIndex];
      if (!group) return;
      const [removed] = group.files.splice(fileIndex, 1);
      clearFileCaches(removed);
      render();
    }

    function clearFileCaches(file) {
      if (!file) return;
      const key = fileKey(file);
      delete state.tablePreviews[key];
      delete state.columnConfirmations[key];
      delete state.previewLoading[key];
      delete state.previewErrors[key];
      if (state.activePreviewKey === key) state.activePreviewKey = "";
    }

    function moveGroup(fromIndex, toIndex) {
      if (fromIndex === toIndex) return;
      if (fromIndex < 0 || toIndex < 0 || fromIndex >= state.groups.length || toIndex >= state.groups.length) return;
      const [group] = state.groups.splice(fromIndex, 1);
      state.groups.splice(toIndex, 0, group);
      state.activeGroup = toIndex;
      render();
      if (state.stage === "review") scheduleLivePreview();
    }

    function toggleExport(value) {
      if (state.exports.includes(value)) {
        state.exports = state.exports.filter((item) => item !== value);
      } else {
        state.exports.push(value);
      }
    }

    async function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result).split(",", 2)[1] || "");
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(file);
      });
    }

    async function queueActivePreviewLoad() {
      const item = activePreviewItem();
      if (!item) return;
      const key = item.key;
      if (state.tablePreviews[key] || state.previewLoading[key]) return;
      state.previewLoading[key] = true;
      render();
      await loadTablePreview(item, key);
    }

    async function ensureAllPreviewsLoaded() {
      for (const item of allDataFiles()) {
        const key = item.key;
        if (state.tablePreviews[key] || state.previewLoading[key]) continue;
        state.previewLoading[key] = true;
        await loadTablePreview(item, key);
      }
    }

    async function loadTablePreview(item, key) {
      try {
        const body = {
          name: item.file.name || "table",
          source_path: item.file.source_path || ""
        };
        if (!body.source_path && item.file.file) {
          body.content_base64 = await fileToBase64(item.file.file);
        }
        const response = await fetch("/api/table-preview", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "Columns failed");
        state.tablePreviews[key] = payload;
        delete state.previewErrors[key];
        ensureColumnConfirmation(key, payload, item);
      } catch (error) {
        state.previewErrors[key] = error.message;
      } finally {
        delete state.previewLoading[key];
        render();
      }
    }

    function retryTablePreview(key) {
      delete state.previewErrors[key];
      delete state.tablePreviews[key];
      const item = allDataFiles().find((candidate) => candidate.key === key);
      if (item) loadTablePreview(item, key);
      else render();
    }

    function updateColumnRole(key, columnName, role) {
      const confirmation = state.columnConfirmations[key];
      if (!confirmation) return;
      const column = (confirmation.columns || []).find((col) => col.name === columnName);
      if (column) {
        column.role = role;
        state.experimentTouched = true;
      }
      render();
    }

    function ensureColumnConfirmation(key, preview, item) {
      if (!key || !preview || state.columnConfirmations[key]) return;
      state.columnConfirmations[key] = {
        sample: item?.group?.sample || "",
        file_name: item?.file?.name || preview.name || "table",
        source_path: item?.file?.source_path || "",
        sheet: preview.sheet || "",
        columns: (preview.columns || []).map((column) => ({
          index: Number(column.index),
          name: column.name,
          inferred_type: column.inferred_type || "auto",
          confirmed_type: column.inferred_type || "auto",
          role: column.suggested_role || "auto"
        }))
      };
    }

    function collectColumnConfirmations() {
      return Object.values(state.columnConfirmations).filter((item) => item && item.columns?.length);
    }

    function selectedSeriesOrder() {
      return visibleGroups().map((group) => group.sample.trim()).filter(Boolean);
    }

    async function exportProject() {
      state.rerunInFlight = true;
      setStatus("Reading");
      render();
      await ensureAllPreviewsLoaded();
      const groups = [];
      for (const group of state.groups) {
        if (!group.sample.trim() || !group.files.length) continue;
        const files = [];
        for (const item of group.files) {
          if (item.source_path) {
            files.push({ name: item.name, source_path: item.source_path });
          } else {
            files.push({ name: item.name, content_base64: await fileToBase64(item.file) });
          }
        }
        groups.push({ sample: group.sample.trim(), files });
      }
      setStatus("Rendering");
      render();
      try {
        const response = await fetch("/api/projects", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            project_name: state.projectName.trim() || "SciPlot project",
            data_type_id: state.dataTypeId,
            experiment_type_id: state.experimentTypeId,
            groups,
            plot_output: state.plotOutput.trim() || "runs/run_001",
            exports: state.exports,
            render_options: {
              series_order: selectedSeriesOrder()
            },
            replicate_mode: state.replicateMode,
            column_confirmations: collectColumnConfirmations(),
            run_after_create: true
          })
        });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "Render failed");
        state.lastProject = payload;
        state.rerunInFlight = false;
        await refreshProjectStatus();
        resetRefineOptionsFromProject();
        setStatus(payload.run_failed ? "Check" : "Ready");
        setStage(payload.run_failed ? "generate" : "review");
      } catch (error) {
        state.rerunInFlight = false;
        setStatus(error.message, error.message);
        render();
      }
    }

    async function submitExport() {
      if (state.lastProject?.project_slug) {
        await rerunProject();
      } else {
        await exportProject();
      }
    }

    function currentProjectRenderOptions() {
      return state.projectStatus?.manifest?.plot_options?.render_options || state.lastProject?.plot_options?.render_options || {};
    }

    function resetRefineOptionsFromProject() {
      const options = currentProjectRenderOptions();
      state.refineOptions = {
        size: options.size || selectedFigureSize(),
        xscale: options.xscale || "",
        yscale: options.yscale || "",
        x_min: options.x_min ?? "",
        x_max: options.x_max ?? "",
        y_min: options.y_min ?? "",
        y_max: options.y_max ?? "",
        reverse_x: options.reverse_x || false,
        x_tick_density: options.x_tick_density || "",
        y_tick_density: options.y_tick_density || "",
        legend_position: options.legend_position || "",
        series_label_mode: options.series_label_mode || "",
        series_order: Array.isArray(options.series_order) ? options.series_order : [],
        series_include: Array.isArray(options.series_include) ? options.series_include : [],
        series_styles: Array.isArray(options.series_styles) ? options.series_styles : [],
        x_label_override: options.x_label_override || "",
        y_label_override: options.y_label_override || "",
        style_preset: options.style_preset || "",
        palette_preset: options.palette_preset || ""
      };
      state.refineDirty = false;
    }

    function refineOptionValue(name) {
      if (!state.refineDirty && Object.keys(state.refineOptions).length === 0) resetRefineOptionsFromProject();
      return state.refineOptions[name] ?? "";
    }

    function setRefineOption(name, value) {
      state.refineOptions = { ...state.refineOptions, [name]: value };
      state.refineDirty = true;
      scheduleLivePreview();
    }

    function seriesStyleItems() {
      const styles = refineOptionValue("series_styles");
      return Array.isArray(styles) ? styles : [];
    }

    function seriesStyleFor(label) {
      return seriesStyleItems().find((item) => String(item.series_id || "") === label) || {};
    }

    function seriesStyleValue(label, key, fallback = "") {
      const value = seriesStyleFor(label)[key];
      return value === undefined || value === null ? fallback : value;
    }

    function setSeriesStyle(label, key, value, options = {}) {
      const styles = seriesStyleItems().filter((item) => String(item.series_id || "") !== label);
      const current = { ...seriesStyleFor(label), series_id: label };
      if (value === "" || value === null || value === undefined) {
        delete current[key];
      } else if (key === "enabled") {
        current[key] = Boolean(value);
      } else if (key === "line_width" || key === "marker_size") {
        const numeric = Number(value);
        if (Number.isFinite(numeric)) current[key] = numeric;
      } else {
        current[key] = value;
      }
      const hasStyle = ["enabled", "color", "line_width", "marker_size", "marker"].some((styleKey) => (
        current[styleKey] !== undefined && current[styleKey] !== "" && current[styleKey] !== null
      ));
      setRefineOption("series_styles", hasStyle ? [...styles, current] : styles);
      if (options.rerender !== false) render();
    }

    function bindRefine(id, key) {
      const element = document.querySelector(`#${id}`);
      if (!element) return;
      element.oninput = (event) => setRefineOption(key, event.target.value);
      element.onchange = (event) => setRefineOption(key, event.target.value);
    }

    function scheduleLivePreview(delay = 360) {
      if (state.stage !== "review" || !state.lastProject?.project_slug) return;
      window.clearTimeout(livePreviewTimer);
      livePreviewTimer = window.setTimeout(() => previewProject({ silent: true }), delay);
    }

    function compactRenderOptions(options) {
      const compact = {};
      Object.entries(options).forEach(([key, value]) => {
        if (value === "" || value === null || value === undefined) return;
        if (key === "series_styles" && Array.isArray(value)) {
          const styles = value.filter((item) => item?.series_id);
          if (styles.length) compact[key] = styles;
          return;
        }
        if (Array.isArray(value)) {
          if (value.length) compact[key] = value;
          return;
        }
        if (numericRenderOptionKeys.has(key) && typeof value === "string") {
          const numeric = Number(value.trim());
          compact[key] = Number.isFinite(numeric) ? numeric : value;
          return;
        }
        compact[key] = value;
      });
      return compact;
    }

    function renderOptionsForProjectRerun() {
      const options = compactRenderOptions(state.refineOptions);
      if (!options.size) options.size = selectedFigureSize();
      const order = selectedSeriesOrder();
      if (order.length) {
        options.series_order = order;
        options.series_include = order;
      }
      return options;
    }

    function workbenchRequestPayload(includeReviewNote = false) {
      return {
        exports: state.exports,
        render_options: renderOptionsForProjectRerun(),
        series_order: selectedSeriesOrder(),
        review_note: includeReviewNote ? state.refineOptions.review_note || "" : ""
      };
    }

    async function previewProject(options = {}) {
      if (!state.lastProject?.project_slug) return;
      if (state.previewInFlight) {
        state.livePreviewQueued = true;
        return;
      }
      const silent = Boolean(options.silent);
      state.previewInFlight = true;
      setStatus(silent ? "Updating" : "Update");
      render();
      try {
        const response = await fetch(`/api/projects/${encodeURIComponent(state.lastProject.project_slug)}/workbench/preview`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(workbenchRequestPayload(false))
        });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "Update failed");
        state.previewInFlight = false;
        state.workbenchPreview = payload;
        setStatus("Live ready");
        render();
      } catch (error) {
        state.previewInFlight = false;
        setStatus(error.message, error.message);
        render();
      } finally {
        if (state.livePreviewQueued) {
          state.livePreviewQueued = false;
          scheduleLivePreview(80);
        }
      }
    }

    async function applyProject() {
      if (!state.lastProject?.project_slug || state.rerunInFlight) return;
      state.rerunInFlight = true;
      setStatus("Apply");
      render();
      try {
        const response = await fetch(`/api/projects/${encodeURIComponent(state.lastProject.project_slug)}/workbench/apply`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(workbenchRequestPayload(true))
        });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "Apply failed");
        state.lastProject = payload;
        state.rerunInFlight = false;
        await refreshProjectStatus();
        resetRefineOptionsFromProject();
        setStatus("Applied");
        render();
      } catch (error) {
        state.rerunInFlight = false;
        setStatus(error.message, error.message);
        render();
      }
    }

    async function rerunProject() {
      if (!state.lastProject?.project_slug || state.rerunInFlight) return;
      state.rerunInFlight = true;
      setStatus("Exporting");
      render();
      try {
        const response = await fetch(`/api/projects/${encodeURIComponent(state.lastProject.project_slug)}/rerun`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(workbenchRequestPayload(true))
        });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "Export failed");
        state.lastProject = payload;
        state.rerunInFlight = false;
        state.workbenchPreview = null;
        await refreshProjectStatus();
        resetRefineOptionsFromProject();
        setStatus(payload.run_failed ? "Check" : "Ready");
        setStage(payload.run_failed ? "generate" : "review");
      } catch (error) {
        state.rerunInFlight = false;
        setStatus(error.message, error.message);
        render();
      }
    }

    async function revealOutput() {
      if (!state.lastProject?.project_dir) return;
      const target = state.projectStatus?.outputs_dir || state.lastProject.outputs_dir || state.lastProject.project_dir;
      try {
        await fetch(`/api/reveal?path=${encodeURIComponent(target)}`);
      } catch (error) {
        setStatus(`Reveal failed: ${error.message}`, error.message);
      }
    }

    async function refreshProjectStatus() {
      if (!state.lastProject?.project_slug) return;
      const response = await fetch(`/api/projects/${encodeURIComponent(state.lastProject.project_slug)}/status`);
      const payload = await response.json();
      if (!response.ok) throw new Error(payload.error || "Status failed");
      state.projectStatus = payload;
      if (payload.manifest) applyManifest(payload.manifest);
    }

    async function loadProject(slug) {
      try {
        const response = await fetch(`/api/projects/${encodeURIComponent(slug)}/status`);
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "Open failed");
        state.projectStatus = payload;
        state.workbenchPreview = null;
        state.lastProject = {
          project_slug: payload.project_slug,
          project_dir: payload.project_dir,
          plot_request: payload.plot_request,
          outputs_dir: payload.outputs_dir,
          last_run: payload.last_run,
          download_name: `${payload.project_slug}.zip`
        };
        applyManifest(payload.manifest || {});
        resetRefineOptionsFromProject();
        setStage(hasRenderedArtifacts() ? "review" : "generate");
      } catch (error) {
        setStatus(error.message, error.message);
        render();
      }
    }

    function applyManifest(manifest) {
      state.projectName = manifest.project_name || manifest.project_slug || state.projectName;
      if (manifest.data_type?.id) state.dataTypeId = manifest.data_type.id;
      if (manifest.experiment?.id) state.experimentTypeId = manifest.experiment.id;
      if (manifest.data_type?.id || manifest.experiment?.id) state.experimentTouched = false;
      if (Array.isArray(manifest.groups) && manifest.groups.length) {
        state.groups = manifest.groups.map((group) => ({
          sample: group.sample || "Sample",
          files: (group.files || []).map((file) => ({
            name: file.original_name || String(file.source_path || "").split("/").pop() || "data",
            source_path: file.source_path,
            size_bytes: file.size_bytes,
            preview_id: `source:${file.source_path || file.original_name}`
          }))
        }));
      }
      if (manifest.plot_options?.output) state.plotOutput = manifest.plot_options.output;
      if (manifest.plot_options?.exports?.length) state.exports = manifest.plot_options.exports;
      if (manifest.plot_options?.render_options?.size) state.figureSize = manifest.plot_options.render_options.size;
      if (manifest.plot_options?.replicate_mode) state.replicateMode = manifest.plot_options.replicate_mode;
    }

    function resultFigures() {
      return (state.projectStatus?.figures || state.lastProject?.last_run?.figures?.map((path) => ({
        name: String(path).split("/").pop(),
        path: String(path),
        url: "",
        exists: true
      })) || []).filter((item) => item && (item.exists !== false));
    }

    async function startCodexJob() {
      if (!state.lastProject) return;
      try {
        setStatus("Codex");
        const response = await fetch("/api/codex/jobs", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            project_slug: state.lastProject.project_slug,
            project_dir: state.lastProject.project_dir,
            plot_request: state.lastProject.plot_request,
            run_output: state.projectStatus?.last_run?.output || state.lastProject.outputs_dir,
            intervention_request: state.projectStatus?.artifacts?.intervention_request?.path,
            failure: state.projectStatus?.last_run?.failure || state.lastProject.failure,
            user_goal: state.codexGoal || ""
          })
        });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "Codex failed");
        state.codexJob = payload;
        setStatus(`Codex ${payload.status}`);
        await refreshProjectStatus();
        render();
      } catch (error) {
        setStatus(error.message, error.message);
        render();
      }
    }

    async function loadCatalog() {
      const response = await fetch("/api/catalog");
      const payload = await response.json();
      state.catalog = payload.data_types || [];
      if (!state.dataTypeId && state.catalog[0]) {
        state.dataTypeId = state.catalog[0].id;
        state.experimentTypeId = state.catalog[0].experiments?.[0]?.id || "";
      }
    }

    async function loadSessionFromQuery() {
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get("session");
      if (!sessionId) return;
      const response = await fetch(`/api/session/${encodeURIComponent(sessionId)}`);
      const payload = await response.json();
      if (!response.ok) return;
      state.projectName = payload.project_name || state.projectName;
      state.dataTypeId = payload.data_type_id || state.dataTypeId;
      state.experimentTypeId = payload.experiment_type_id || state.experimentTypeId;
      if (Array.isArray(payload.groups) && payload.groups.length) {
        state.groups = payload.groups.map((group) => ({
          sample: group.sample || "Sample",
          files: (group.files || []).map((file) => ({
            name: file.name || String(file.source_path || "").split("/").pop() || "data",
            source_path: file.source_path,
            size_bytes: file.size_bytes,
            preview_id: `source:${file.source_path || file.name}`
          }))
        }));
      }
    }

    async function loadProjectFromQuery() {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get("project");
      if (slug) await loadProject(slug);
    }

    async function boot() {
      try {
        await loadCatalog();
        await loadSessionFromQuery();
        await loadProjectFromQuery();
        if (!state.projectStatus) render();
        if (state.stage === "mapping") queueActivePreviewLoad();
      } catch (error) {
        setStatus(error.message, error.message);
        render();
      }
    }

    boot();
  </script>
</body>
</html>
