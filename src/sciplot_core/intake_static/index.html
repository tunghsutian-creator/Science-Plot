<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SciPlot</title>
<style>
:root {
  color-scheme: light;
  --bg: #f6fafc;
  --surface: #ffffff;
  --surface-soft: #f8fbfc;
  --surface-mute: #edf5f7;
  --ink: #101820;
  --muted: #68767d;
  --quiet: #a4b0b6;
  --line: #dce6ea;
  --line-strong: #b9cad1;
  --accent: #007c91;
  --accent-hover: #006579;
  --accent-soft: #dff7fb;
  --blue: #2f5fb3;
  --amber: #a76300;
  --rose: #b33a4a;
  --ok: #24785a;
  --shadow-sm: 0 1px 2px rgba(20, 38, 44, 0.06);
  --shadow: 0 12px 32px rgba(20, 38, 44, 0.10);
  --shadow-lg: 0 18px 48px rgba(20, 38, 44, 0.12);
  --radius: 8px;
  --radius-lg: 10px;
  --motion-fast: 140ms;
  --motion: 180ms;
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

* { box-sizing: border-box; }
html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: var(--bg); color: var(--ink); }
body { font-size: 13px; line-height: 1.45; letter-spacing: 0; }
button, input, select, textarea { font: inherit; letter-spacing: 0; }
button { border: 0; cursor: pointer; background: none; color: inherit; }
a { color: inherit; text-decoration: none; }

.app {
  width: 100vw;
  height: 100vh;
  display: grid;
  grid-template-rows: 68px minmax(0, 1fr);
  background: var(--bg);
}

.topbar {
  display: grid;
  grid-template-columns: minmax(280px, 1fr) auto;
  align-items: center;
  gap: 20px;
  padding: 0 32px;
  border-bottom: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  z-index: 20;
}

.brand {
  display: inline-flex;
  align-items: center;
  gap: 14px;
  min-width: 0;
}

.brand-mark {
  display: none;
}

.brand-mark svg,
.icon svg,
.button svg,
.icon-button svg { width: 16px; height: 16px; display: block; }

.project-chip {
  display: flex;
  align-items: center;
  gap: 16px;
  min-width: 0;
}

.project-name {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-weight: 800;
  font-size: 23px;
  letter-spacing: 0;
}

.project-state {
  display: inline-flex;
  align-items: center;
  gap: 14px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--muted);
  font-size: 15px;
}

.project-state::before {
  content: "/";
  color: var(--quiet);
}

.stage-nav {
  display: none;
}

.stage-pill {
  height: 28px;
  padding: 0 12px;
  border-radius: 999px;
  color: var(--muted);
  font-weight: 650;
  font-size: 12px;
  transition: background var(--motion-fast) var(--ease), color var(--motion-fast) var(--ease);
}

.stage-pill.active {
  color: var(--ink);
  background: #fff;
  box-shadow: var(--shadow-sm);
}

.actions {
  display: inline-flex;
  align-items: center;
  gap: 12px;
}

.button,
.icon-button {
  height: 40px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 9px;
  border-radius: var(--radius);
  border: 1px solid var(--line-strong);
  background: #fff;
  color: var(--ink);
  font-weight: 650;
  font-size: 15px;
  transition: transform var(--motion-fast) var(--ease), background var(--motion-fast) var(--ease), border-color var(--motion-fast) var(--ease), opacity var(--motion-fast) var(--ease);
}

.button { padding: 0 18px; }
.icon-button { width: 40px; padding: 0; }
.button:hover:not(:disabled), .icon-button:hover:not(:disabled) { transform: translateY(-1px); border-color: var(--line-strong); }
.button:disabled, .icon-button:disabled { opacity: 0.42; cursor: not-allowed; transform: none; }
.button.primary {
  color: #fff;
  border-color: var(--accent);
  background: linear-gradient(180deg, #078da0, #007589);
  box-shadow: 0 10px 24px rgba(0, 124, 145, 0.22);
}
.button.primary:hover:not(:disabled) { background: var(--accent-hover); }
.button.subtle { color: var(--muted); background: #fff; }
.button.danger { color: var(--rose); }

.main { min-width: 0; min-height: 0; overflow: hidden; }
.screen { width: 100%; height: 100%; animation: fadeSlide var(--motion) var(--ease) both; }
.screen.hidden { display: none; }

.flow-screen {
  display: grid;
  padding: 44px 30px 36px;
}

.flow-shell {
  width: 100%;
  height: 100%;
  min-height: 0;
  display: grid;
  grid-template-columns: 204px minmax(520px, 1fr) 284px;
  gap: clamp(28px, 5vw, 76px);
  align-items: stretch;
}

.flow-panel,
.flow-main,
.inspector,
.figure-rail,
.canvas-shell,
.modal-box {
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  background: var(--surface);
  box-shadow: var(--shadow);
}

.flow-panel,
.flow-main {
  min-width: 0;
  min-height: 0;
  overflow: hidden;
  display: grid;
  grid-template-rows: auto minmax(0, 1fr) auto;
}

.panel-head {
  padding: 18px 20px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.panel-title {
  font-size: 16px;
  font-weight: 780;
  text-transform: none;
  color: var(--ink);
}

.panel-body {
  padding: 16px;
  overflow: auto;
  display: grid;
  align-content: start;
  gap: 14px;
}

.panel-foot {
  padding: 14px 16px;
  border-top: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.field { display: grid; gap: 7px; }
.label { color: var(--muted); font-size: 11px; font-weight: 700; text-transform: uppercase; }
.input,
.select,
.textarea {
  width: 100%;
  min-width: 0;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: #fff;
  color: var(--ink);
  outline: none;
  transition: border-color var(--motion-fast) var(--ease), box-shadow var(--motion-fast) var(--ease);
}
.input,
.select { height: 34px; padding: 0 10px; }
.textarea { min-height: 74px; padding: 9px 10px; resize: vertical; }
.input:focus,
.select:focus,
.textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

.dropzone {
  min-height: 172px;
  display: grid;
  place-items: center;
  gap: 8px;
  padding: 22px;
  border: 1.5px dashed var(--line-strong);
  border-radius: var(--radius-lg);
  background: var(--surface-soft);
  text-align: center;
  color: var(--muted);
  transition: background var(--motion-fast) var(--ease), border-color var(--motion-fast) var(--ease), transform var(--motion-fast) var(--ease);
}
.dropzone:hover,
.dropzone.over { border-color: var(--accent); background: var(--accent-soft); transform: translateY(-1px); }
.dropzone strong { color: var(--ink); }

.sample-list,
.preview-list,
.figure-list,
.option-stack { display: grid; gap: 8px; }

.sample-row,
.preview-row,
.figure-row,
.status-row {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: #fff;
}

.sample-row {
  display: grid;
  grid-template-columns: 22px minmax(0, 1fr) auto 26px;
  align-items: center;
  gap: 8px;
  padding: 8px;
}

.drag-handle {
  width: 20px;
  height: 24px;
  display: grid;
  place-items: center;
  color: var(--quiet);
  cursor: grab;
}

.sample-name {
  height: 28px;
  min-width: 0;
  border: 0;
  border-radius: 6px;
  padding: 0 6px;
  background: transparent;
  color: var(--ink);
  outline: none;
  font-weight: 650;
}
.sample-name:focus { background: var(--surface-soft); }
.sample-count { white-space: nowrap; color: var(--muted); font-size: 11px; }

.detected-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
.family-card {
  min-height: 76px;
  display: grid;
  align-content: center;
  gap: 4px;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: #fff;
  text-align: left;
  transition: border-color var(--motion-fast) var(--ease), background var(--motion-fast) var(--ease), transform var(--motion-fast) var(--ease);
}
.family-card:hover { transform: translateY(-1px); border-color: var(--line-strong); }
.family-card.active { border-color: var(--accent); background: var(--accent-soft); }
.family-card b { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.family-card span { color: var(--muted); font-size: 11px; }

.inspect-grid {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 260px;
  gap: 14px;
  min-height: 0;
}

.preview-row { padding: 12px; display: grid; gap: 8px; }
.preview-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.preview-name { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 720; }
.preview-meta { color: var(--muted); font-size: 11px; }

.column-table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
  font-size: 12px;
}
.column-table th,
.column-table td {
  padding: 7px 8px;
  border-bottom: 1px solid var(--line);
  text-align: left;
  vertical-align: middle;
}
.column-table th { color: var(--muted); font-size: 10px; text-transform: uppercase; }
.column-table tr:last-child td { border-bottom: 0; }
.column-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.role-select { height: 28px; width: 100%; border: 1px solid var(--line); border-radius: 6px; background: #fff; font-size: 12px; }

.compact-box {
  display: grid;
  gap: 10px;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface-soft);
}

.check-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--line);
}
.check-row:last-child { border-bottom: 0; }
.check-row input { accent-color: var(--accent); }
.series-control {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 32px 64px;
  align-items: center;
  gap: 8px;
  width: 100%;
}
.mini-input {
  width: 100%;
  height: 26px;
  padding: 0 6px;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: #fff;
  font-size: 11px;
}

.workbench-screen {
  display: grid;
  grid-template-columns: 204px minmax(520px, 1fr) 284px;
  gap: clamp(28px, 5vw, 76px);
  padding: 44px 30px 36px;
  background: var(--bg);
}

.figure-rail,
.inspector,
.canvas-shell {
  min-width: 0;
  min-height: 0;
  overflow: hidden;
  display: grid;
  grid-template-rows: auto minmax(0, 1fr);
}

.figure-rail {
  grid-template-rows: auto minmax(0, 1fr) auto;
}

.workbench-screen > .figure-rail,
.workbench-screen > .inspector {
  align-self: start;
  max-height: calc(100vh - 148px);
}

.workbench-screen > .figure-rail {
  min-height: min(68vh, 640px);
}

.figure-list,
.inspector-body {
  overflow: auto;
  padding: 12px;
  align-content: start;
}

.figure-row {
  display: grid;
  grid-template-columns: 64px minmax(0, 1fr) auto;
  gap: 10px;
  align-items: center;
  padding: 10px;
  text-align: left;
  transition: background var(--motion-fast) var(--ease), border-color var(--motion-fast) var(--ease), transform var(--motion-fast) var(--ease);
}
.figure-row:hover { transform: translateY(-1px); border-color: var(--line-strong); }
.figure-row.active { border-color: var(--accent); background: var(--accent-soft); }
.thumb {
  width: 62px;
  height: 48px;
  border-radius: 6px;
  border: 1px solid var(--line);
  background: #fff;
  overflow: hidden;
  display: grid;
  place-items: center;
}
.thumb img { width: 100%; height: 100%; object-fit: cover; }
.thumb-line { width: 28px; height: 14px; border-bottom: 2px solid var(--accent); border-radius: 50%; }
.figure-title { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 720; font-size: 12px; }
.figure-meta { color: var(--muted); font-size: 10px; }

.canvas-shell {
  border: 0;
  border-radius: 0;
  background: transparent;
  box-shadow: none;
}
.canvas-top {
  height: 0;
  padding: 0;
  display: none;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  border-bottom: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.72);
}
.canvas-title { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 760; }
.canvas-meta { display: inline-flex; align-items: center; gap: 8px; color: var(--muted); font-size: 11px; }
.status-dot { width: 7px; height: 7px; border-radius: 999px; background: var(--quiet); }
.status-dot.ok { background: var(--ok); }
.status-dot.busy { background: var(--amber); animation: pulse 1s var(--ease) infinite; }
.status-dot.warn { background: var(--rose); }

.canvas-body {
  position: relative;
  min-width: 0;
  min-height: 0;
  display: grid;
  place-items: center;
  padding: 16px 0;
  overflow: hidden;
}

.figure-stage {
  position: relative;
  width: min(100%, 900px);
  height: min(70vh, 700px);
  min-height: 600px;
  display: grid;
  place-items: center;
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  background: #fff;
  box-shadow: var(--shadow-lg);
  overflow: hidden;
  transition: box-shadow var(--motion) var(--ease), transform var(--motion) var(--ease);
}
.figure-stage.busy { box-shadow: 0 0 0 4px var(--accent-soft), var(--shadow); }
.figure-stage img { width: 100%; height: 100%; border: 0; object-fit: contain; background: #fff; }

.empty-state {
  display: grid;
  place-items: center;
  gap: 10px;
  color: var(--muted);
  text-align: center;
  padding: 28px;
}
.empty-state b { color: var(--ink); }

.inspector-head {
  min-height: 58px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  border-bottom: 1px solid var(--line);
  font-size: 16px;
  font-weight: 760;
  position: relative;
}

.inspector-head::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 4px;
  background: var(--accent);
}

.inspector-close {
  width: 28px;
  height: 28px;
  color: var(--quiet);
}

.inspector-tabs {
  display: none;
}
.tab {
  height: 30px;
  border-radius: 7px;
  color: var(--muted);
  font-weight: 720;
  font-size: 11px;
  transition: background var(--motion-fast) var(--ease), color var(--motion-fast) var(--ease);
}
.tab.active { color: var(--ink); background: #fff; box-shadow: var(--shadow-sm); }

.section {
  display: grid;
  gap: 10px;
  padding: 16px 20px;
  border: 0;
  border-radius: 0;
  border-bottom: 1px solid var(--line);
  background: #fff;
  animation: fadeSlide var(--motion) var(--ease) both;
}
.section + .section { margin-top: 0; }
.section-title {
  color: var(--ink);
  font-size: 15px;
  font-weight: 720;
  text-transform: none;
}
.segmented { display: flex; flex-wrap: wrap; gap: 6px; }
.segment {
  min-height: 28px;
  padding: 0 9px;
  border-radius: 999px;
  border: 1px solid var(--line);
  color: var(--muted);
  background: #fff;
  font-weight: 700;
  font-size: 11px;
}
.segment.active { color: var(--accent); border-color: var(--accent); background: var(--accent-soft); }
.field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

.collapsed-row {
  min-height: 42px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 0 20px;
  border-bottom: 1px solid var(--line);
  color: var(--ink);
  font-weight: 650;
}
.collapsed-row.active {
  color: var(--accent);
  background: var(--accent-soft);
}

.collapsed-row span {
  min-width: 0;
  display: inline-flex;
  align-items: center;
  gap: 10px;
}

.collapsed-row svg {
  width: 16px;
  height: 16px;
  color: var(--muted);
}

.artifact-links { display: flex; flex-wrap: wrap; gap: 6px; }
.artifact-link {
  min-height: 28px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 0 9px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: var(--surface-soft);
  color: var(--muted);
  font-weight: 700;
  font-size: 11px;
}
.artifact-link.ready { color: var(--accent); border-color: var(--accent); background: var(--accent-soft); }
.quality-actions {
  display: grid;
  gap: 8px;
}
.quality-action {
  display: grid;
  gap: 6px;
  padding: 10px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface-soft);
}
.quality-action-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.quality-action-title {
  min-width: 0;
  color: var(--ink);
  font-weight: 760;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.quality-action-status {
  flex: 0 0 auto;
  color: var(--accent);
  font-size: 10px;
  font-weight: 800;
  text-transform: uppercase;
}
.quality-action-reason {
  color: var(--muted);
  font-size: 11px;
  line-height: 1.35;
}
.quality-action-button {
  justify-self: start;
  min-height: 26px;
  padding: 0 9px;
  border: 1px solid var(--line-strong);
  border-radius: var(--radius);
  background: #fff;
  color: var(--accent);
  font-size: 11px;
  font-weight: 760;
}

.toast {
  position: fixed;
  right: 16px;
  bottom: 16px;
  z-index: 50;
  max-width: 360px;
  padding: 10px 12px;
  border-radius: var(--radius);
  border: 1px solid var(--line);
  background: #fff;
  color: var(--ink);
  box-shadow: var(--shadow);
  animation: fadeSlide var(--motion) var(--ease) both;
}
.toast.hidden,
.modal.hidden { display: none; }

.modal {
  position: fixed;
  inset: 0;
  z-index: 60;
  display: grid;
  place-items: center;
  padding: 24px;
  background: rgba(23, 33, 36, 0.24);
}
.modal-box {
  width: min(560px, 100%);
  max-height: min(640px, 90vh);
  display: grid;
  grid-template-rows: auto minmax(0, 1fr);
}
.modal-head { padding: 12px; border-bottom: 1px solid var(--line); display: flex; gap: 8px; }
.modal-list { padding: 8px; overflow: auto; display: grid; gap: 6px; }
.modal-row {
  padding: 10px;
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  text-align: left;
}
.modal-row:hover { background: var(--surface-soft); }

.hidden-input { display: none; }

@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes pulse {
  0%, 100% { opacity: 0.42; transform: scale(0.92); }
  50% { opacity: 1; transform: scale(1); }
}

@media (max-width: 1080px) {
  .topbar { grid-template-columns: 210px minmax(0, 1fr) auto; }
  .workbench-screen { grid-template-columns: 160px minmax(0, 1fr); }
  .inspector {
    position: fixed;
    left: 12px;
    right: 12px;
    bottom: 12px;
    height: min(52vh, 420px);
    z-index: 30;
    transform: translateY(calc(100% - 52px));
    transition: transform var(--motion) var(--ease);
  }
  .inspector:focus-within,
  .inspector.open { transform: translateY(0); }
}

@media (max-width: 760px) {
  .app { grid-template-rows: auto minmax(0, 1fr); }
  .topbar { grid-template-columns: 1fr; align-items: stretch; gap: 8px; padding: 10px; }
  .stage-nav { justify-self: stretch; overflow-x: auto; }
  .actions { width: 100%; gap: 6px; overflow: visible; padding-bottom: 2px; }
  .actions .button { flex: 1 1 0; min-width: 0; padding: 0 8px; font-size: 14px; }
  .flow-screen { padding: 10px; place-items: stretch; }
  .flow-shell { height: 100%; min-height: 0; grid-template-columns: 1fr; }
  .inspect-grid { grid-template-columns: 1fr; }
  .workbench-screen { grid-template-columns: 1fr; grid-template-rows: auto minmax(0, 1fr); padding: 8px; }
  .workbench-screen > .figure-rail { min-height: 0; max-height: 136px; }
  .figure-rail { grid-template-rows: auto auto; }
  .figure-list { display: flex; overflow-x: auto; }
  .figure-rail .panel-foot { display: none; }
  .figure-row { min-width: 150px; }
  .canvas-body { align-items: start; padding: 12px; }

}

@media (prefers-reduced-motion: reduce) {

</style>

<body>
<div class="app">

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 17c3.4-8 6-8.5 8-3 1.8 5 4.1 4.4 8-6"/><path d="M4 20h16"/></svg>
      </div>

</div>

<div class="modal hidden" id="projectModal">

      <button class="button subtle" id="projectClose">Close</button>
    </div>
    <div class="modal-list" id="projectList"></div>
  </div>
</div>

<div class="toast hidden" id="toast"></div>

<input id="fileInput" class="hidden-input" type="file" multiple>
<input id="folderInput" class="hidden-input" type="file" multiple webkitdirectory>

<script>
const figureSizeOptions = [
  { v: "60x55", l: "60 x 55 mm" },
  { v: "120x55", l: "120 x 55 mm" },
  { v: "180x55", l: "180 x 55 mm" },
  { v: "60x110", l: "60 x 110 mm" },
  { v: "120x110", l: "120 x 110 mm" },
  { v: "180x110", l: "180 x 110 mm" }
];
const exportOptions = [{ v: "pdf", l: "PDF" }, { v: "tiff_300", l: "TIFF 300" }, { v: "png_300", l: "PNG 300" }];
const roleOptions = ["auto", "x", "y", "series", "sample", "unit", "metadata", "ignore"];
const scaleOptions = [{ v: "", l: "Auto" }, { v: "linear", l: "Linear" }, { v: "log", l: "Log" }];
const legendOptions = [{ v: "", l: "Auto" }, { v: "upper_right", l: "Upper right" }, { v: "upper_left", l: "Upper left" }, { v: "lower_right", l: "Lower right" }, { v: "lower_left", l: "Lower left" }];
const labelModeOptions = [{ v: "", l: "Auto" }, { v: "legend", l: "Legend" }, { v: "inline", l: "Inline" }];
const styleOptions = [{ v: "", l: "Auto" }, { v: "nature", l: "Nature" }, { v: "acs", l: "ACS" }, { v: "science", l: "Science" }, { v: "wiley", l: "Wiley" }];
const paletteOptions = [
  { v: "", l: "Auto (JAMA-inspired Editorial)" },
  { v: "jama_editorial", l: "JAMA-inspired Editorial (Default)" },
  { v: "npg_modern", l: "NPG-inspired Modern" },
  { v: "tol_bright", l: "Tol Bright" }
];
const tickDensityOptions = [{ v: "", l: "Auto" }, { v: "sparse", l: "Sparse" }, { v: "dense", l: "Dense" }];
const baselineOptions = [{ v: "", l: "Auto" }, { v: "none", l: "None" }, { v: "linear_endpoints", l: "Linear endpoints" }];

const icon = {
  files: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/></svg>',
  folder: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6.5h6l2 2h8v9.5a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2Z"/></svg>',
  play: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7Z"/></svg>',
  eye: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>',
  check: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m20 6-11 11-5-5"/></svg>',
  download: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>',
  more: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>',
  refresh: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 0 1-15.5 6.3"/><path d="M3 12A9 9 0 0 1 18.5 5.7"/><path d="M18 2v5h5"/><path d="M6 22v-5H1"/></svg>',
  plus: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>',
  x: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>',
  cursor: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m5 3 7.5 17 2.5-7 6-2.5Z"/></svg>',
  crosshair: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v5M12 16v5M3 12h5M16 12h5"/><circle cx="12" cy="12" r="3"/></svg>',
  fit: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H3v5M16 3h5v5M8 21H3v-5M16 21h5v-5"/><path d="M3 3l6 6M21 3l-6 6M3 21l6-6M21 21l-6-6"/></svg>',
  gear: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.9.3l-.1.1A2 2 0 1 1 4.2 17l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1A2 2 0 1 1 7 4.2l.1.1a1.7 1.7 0 0 0 1.9.3 1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.9-.3l.1-.1A2 2 0 1 1 19.8 7l-.1.1a1.7 1.7 0 0 0-.3 1.9 1.7 1.7 0 0 0 1.5 1h.1a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1Z"/></svg>',
  chevron: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>'
};

const S = {
  stage: "source",
  catalog: [],
  projectName: "SciPlot project",
  dataTypeId: "",
  experimentTypeId: "",
  experimentTouched: false,
  groups: [{ sample: "Sample 1", files: [] }],
  activeGroup: 0,
  previewKey: "",
  tablePreviews: {},
  columnRoles: {},
  figureSize: "60x55",
  figureSizeTouched: false,
  exports: ["pdf", "tiff_300"],
  replicateMode: "mean",
  plotOutput: "runs/run_001",
  lastProject: null,
  projectStatus: null,
  activeFigure: 0,
  inspectorTab: "axes",
  refineOptions: {},
  clearRenderOptions: [],
  splitPolicy: null,
  refineDirty: false,
  busy: "",
  toast: "",
  error: "",
  fileSequence: 0
};

function esc(value) {
  return String(value ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;");
}
function fmtBytes(value) {
  const n = Number(value || 0);
  if (!Number.isFinite(n) || n <= 0) return "";
  if (n < 1024) return `${n} B`;
  if (n < 1048576) return `${(n / 1024).toFixed(1)} KB`;
  return `${(n / 1048576).toFixed(1)} MB`;
}
function currentDataType() {
  return S.catalog.find(item => item.id === S.dataTypeId) || S.catalog[0] || null;
}
function currentExperiment() {
  const dt = currentDataType();
  return (dt?.experiments || []).find(item => item.id === S.experimentTypeId) || (dt?.experiments || [])[0] || null;
}
function currentExperimentRenderOptions() {
  const options = currentExperiment()?.render_options;
  return options && typeof options === "object" ? options : {};
}
function applyCurrentExperimentDefaults({ forceSize = false } = {}) {
  const options = currentExperimentRenderOptions();
  if (options.size && (forceSize || !S.figureSizeTouched)) {
    S.figureSize = String(options.size);
  }
  if (S.stage === "review") {
    const next = { ...S.refineOptions };
    ["palette_preset", "series_label_mode", "baseline", "reverse_x", "x_min", "x_max", "x_tick_density"].forEach(key => {
      if (options[key] !== undefined && next[key] === undefined) next[key] = options[key];
    });
    S.refineOptions = next;
  }
}
function allFiles() {
  const files = [];
  S.groups.forEach((group, groupIndex) => {
    (group.files || []).forEach((file, fileIndex) => {
      if (!file.key) file.key = `file-${++S.fileSequence}`;
      files.push({ group, groupIndex, file, fileIndex, key: file.key });
    });
  });
  return files;
}
function visibleGroups() {
  return S.groups.filter(group => group.sample.trim() && group.files.length);
}
function canInspect() {
  return visibleGroups().length > 0;
}
function canRender() {
  return canInspect() && S.exports.length > 0 && !S.busy;
}
function savedRenderOptions() {
  return S.projectStatus?.manifest?.plot_options?.render_options || S.lastProject?.plot_options?.render_options || {};
}
function renderOptionsPayload() {
  const options = {};
  Object.entries(S.refineOptions).forEach(([key, value]) => {
    if (value !== "" && value !== null && value !== undefined) options[key] = value;
  });
  options.size = S.figureSize;
  return options;
}
function clearRenderOptionsPayload() {
  return Array.from(new Set(S.clearRenderOptions.filter(Boolean)));
}
function splitPolicyPayload() {
  if (!S.splitPolicy || typeof S.splitPolicy !== "object") return null;
  return Object.keys(S.splitPolicy).length ? S.splitPolicy : null;
}
function workbenchPayload(extra = {}) {
  const splitPolicy = splitPolicyPayload();
  return {
    exports: S.exports,
    render_options: renderOptionsPayload(),
    clear_render_options: clearRenderOptionsPayload(),
    ...(splitPolicy ? { split_policy: splitPolicy } : {}),
    series_order: selectedSeriesOrder(),
    ...extra
  };
}
function selectedSeriesOrder() {
  return visibleGroups().map(group => group.sample.trim()).filter(Boolean);
}
function hasFigureSize(size) {
  return figureSizeOptions.some(item => item.v === size);
}
function tallerFigureSize(size) {
  const parts = String(size || "").split("x");
  if (parts.length !== 2) return "";
  const width = Number(parts[0]);
  const height = Number(parts[1]);
  if (!Number.isFinite(width) || !Number.isFinite(height)) return "";
  const tall = `${width}x110`;
  if (height < 110 && hasFigureSize(tall)) return tall;
  return "";
}
function draftFigureSize(size) {
  if (!hasFigureSize(size)) return false;
  S.figureSize = size;
  const next = { ...S.refineOptions };
  delete next.size;
  S.refineOptions = next;
  return true;
}
function resultFigures() {
  const figures = (S.projectStatus?.figures || S.lastProject?.last_run?.figures?.map(path => ({
    name: String(path).split("/").pop(),
    path: String(path),
    url: "",
    exists: true
  })) || []).filter(item => item?.exists !== false);
  const grouped = new Map();
  figures.forEach(item => {
    const name = String(item.name || "Figure");
    const stem = name.replace(/\.(pdf|png|jpe?g|tiff?)$/i, "").replace(/_300dpi$/i, "");
    const prior = grouped.get(stem);
    const score = /\.(png|jpe?g)$/i.test(name) ? 2 : 1;
    if (!prior || score > prior.score) grouped.set(stem, { ...item, score, stem });
  });
  return Array.from(grouped.values());
}
function currentFigure() {
  const figures = resultFigures();
  return figures[S.activeFigure] || figures[0] || null;
}
function artifact(name) {
  return S.projectStatus?.artifacts?.[name] || null;
}
function hasRenderedArtifacts() {
  return Boolean(S.projectStatus?.preview_figure?.url || currentFigure()?.url || resultFigures().length);
}
function oneStepStatus() {
  return S.projectStatus?.last_run?.one_step || S.projectStatus?.manifest?.one_step || {};
}
function oneStepStateLabel() {
  const state = String(oneStepStatus()?.state || "").replace(/_/g, " ");
  return state ? titleCase(state) : "";
}
function exportInkLabel() {
  const reports = oneStepStatus()?.figure_qa_report?.export_visual_qa || [];
  const first = Array.isArray(reports) ? reports.find(item => item?.visual_qa?.ink_fraction !== undefined) : null;
  const value = Number(first?.visual_qa?.ink_fraction);
  return Number.isFinite(value) ? `${(value * 100).toFixed(2)}%` : "n/a";
}
function qualityActions() {
  const actions = oneStepStatus()?.figure_qa_report?.quality_actions || [];
  return Array.isArray(actions) ? actions.filter(action => action && action.id) : [];
}
function stageLabel() {
  if (S.busy) return S.busy;
  if (S.error) return S.error;
  if (S.stage === "source") return `${allFiles().length} file(s)`;
  if (S.stage === "inspect") return "Ready to render with SciPlot";
  const oneStep = oneStepStateLabel();
  if (oneStep) return `Review · ${oneStep}`;
  const qa = S.projectStatus?.last_run?.qa?.status || "";
  if (qa) return `Review · QA ${qa}`;
  return S.refineDirty ? "Review · unapplied changes" : "Review";
}
function topbarStateLabel() {
  if (S.busy) return `${titleCase(S.stage)}  •  ${S.busy}`;
  if (S.error) return `${titleCase(S.stage)}  •  Needs attention`;
  if (S.stage === "source") return `Source  •  ${allFiles().length} file(s)`;
  if (S.stage === "inspect") return "Inspect  •  Confirm columns";
  const oneStep = oneStepStateLabel();
  if (oneStep) return `Review  •  ${oneStep}`;
  const qa = String(S.projectStatus?.last_run?.qa?.status || "").toLowerCase();
  if (qa === "passed") return "Review  •  QA ready";
  if (qa) return `Review  •  QA ${qa}`;
  return S.refineDirty ? "Review  •  Draft changes" : "Review  •  Ready";
}
function titleCase(value) {
  const text = String(value || "");
  return text ? `${text[0].toUpperCase()}${text.slice(1)}` : "";
}

function showToast(message) {
  S.toast = message || "";
  renderToast();
  if (message) setTimeout(() => {
    if (S.toast === message) {
      S.toast = "";
      renderToast();
    }
  }, 2600);
}

function setStage(stage) {
  if (stage === "inspect" && !canInspect()) return;
  if (stage === "review" && !S.lastProject) return;
  S.stage = stage;
  render();
}

function render() {
  document.getElementById("projectNameLabel").textContent = "SciPlot";
  document.getElementById("projectStateLabel").textContent = topbarStateLabel();
  document.querySelectorAll("[data-stage-button]").forEach(button => {
    const stage = button.dataset.stageButton;
    button.classList.toggle("active", stage === S.stage);
    button.disabled = (stage === "inspect" && !canInspect()) || (stage === "review" && !S.lastProject);
  });
  renderActions();
  if (S.stage === "review") {
    document.getElementById("flowScreen").classList.add("hidden");
    document.getElementById("workbenchScreen").classList.remove("hidden");
    renderWorkbench();
  } else {
    document.getElementById("workbenchScreen").classList.add("hidden");
    document.getElementById("flowScreen").classList.remove("hidden");
    renderFlow();
  }
  renderToast();
}

function renderActions() {
  const busy = Boolean(S.busy);
  const actions = document.getElementById("topActions");
  if (S.stage === "review") {
    actions.innerHTML = `
      <button class="button primary" id="applyBtn" ${busy || !S.lastProject ? "disabled" : ""}>${icon.check}Apply</button>
      <button class="button" id="exportBtn" ${busy || !S.lastProject ? "disabled" : ""}>${icon.download}Export</button>
      <button class="icon-button" id="openProjectBtn" title="More">${icon.more}</button>
    `;
    return;
  }
  if (S.stage === "inspect") {
    actions.innerHTML = `
      <button class="button subtle" id="backToSourceBtn">Source</button>
      <button class="button primary" id="renderProjectBtn" ${canRender() ? "" : "disabled"}>${icon.play}${busy ? "Rendering" : "Render"}</button>
    `;
    return;
  }
  actions.innerHTML = `
    <button class="button subtle" id="openProjectBtn">${icon.folder}Open</button>
    <button class="button" id="addFolderBtn">${icon.folder}Folder</button>
    <button class="button" id="addFilesBtn">${icon.files}Files</button>
    <button class="button primary" id="continueInspectBtn" ${canInspect() ? "" : "disabled"}>Inspect</button>
  `;
}

function renderFlow() {
  document.getElementById("flowScreen").innerHTML = S.stage === "inspect" ? renderInspectFlow() : renderSourceFlow();
  bindDropzone();
}

function renderSourceFlow() {
  return `
    <div class="flow-shell">
      <section class="flow-panel">
        <div class="panel-head">
          <div class="panel-title">Sources</div>
          <button class="icon-button" id="newSampleBtn" title="Add sample">${icon.plus}</button>
        </div>
        <div class="panel-body">
          <div class="sample-list">${renderSampleRows()}</div>
        </div>
        <div class="panel-foot">
          <span class="preview-meta">${visibleGroups().length} sample group(s)</span>
          <button class="button primary" id="continueInspectInline" ${canInspect() ? "" : "disabled"}>Inspect</button>
        </div>
      </section>
      <section class="flow-main">
        <div class="panel-head">
          <div class="panel-title">Import</div>
          <button class="button" id="addFilesInline">${icon.files}Files</button>
        </div>
        <div class="panel-body">
          <div class="dropzone" id="dropzone">
            <div class="icon">${icon.files}</div>
            <div><strong>Drop data here</strong><br>${allFiles().length ? `${allFiles().length} file(s) selected` : "Add files or a folder"}</div>
          </div>
          <div class="detected-grid">${renderFamilyCards()}</div>
        </div>
        <div class="panel-foot">
          <span class="preview-meta">SciPlot renders after Inspect confirmation.</span>
          <button class="button" id="addFolderInline">${icon.folder}Folder</button>
        </div>
      </section>
      <aside class="inspector">
        <div class="inspector-head">Project<button class="inspector-close" id="openProjectInline" title="Open project">${icon.folder}</button></div>
        <div class="inspector-body">
          <div class="section">
            <div class="section-title">Identity</div>
            <div class="field">
              <label class="label" for="projectNameInput">Project</label>
              <input class="input" id="projectNameInput" value="${esc(S.projectName)}" autocomplete="off">
            </div>
            <select class="select" id="experimentSelect">${renderExperimentOptions()}</select>
          </div>
          <div class="compact-box">
            <div class="section-title">Figure</div>
            <div class="segmented">${figureSizeOptions.map(item => `<button class="segment${S.figureSize === item.v ? " active" : ""}" data-size="${esc(item.v)}">${esc(item.l)}</button>`).join("")}</div>
            <div class="segmented">${exportOptions.map(item => `<button class="segment${S.exports.includes(item.v) ? " active" : ""}" data-export="${esc(item.v)}">${esc(item.l)}</button>`).join("")}</div>
          </div>
          <div class="collapsed-row"><span>Samples</span>${icon.chevron}</div>
          <div class="collapsed-row"><span>Output</span>${icon.chevron}</div>
        </div>
      </aside>
    </div>
  `;
}

function renderInspectFlow() {
  const files = allFiles();
  if (!S.previewKey && files[0]) S.previewKey = files[0].key;
  const selected = files.find(item => item.key === S.previewKey) || files[0];
  return `
    <div class="flow-shell">
      <section class="flow-panel">
        <div class="panel-head">
          <div class="panel-title">Samples</div>
          <button class="button subtle" id="backSourceInline">Back</button>
        </div>
        <div class="panel-body">
          <div class="sample-list">${renderSampleRows()}</div>
        </div>
        <div class="panel-foot">
          <span class="preview-meta">${files.length} file(s)</span>
          <button class="button primary" id="renderProjectInline" ${canRender() ? "" : "disabled"}>${icon.play}Render</button>
        </div>
      </section>
      <section class="flow-main">
        <div class="panel-head">
          <div class="panel-title">Inspect</div>
          <select class="select" id="previewFileSelect" style="max-width:320px">
            ${files.map(item => `<option value="${esc(item.key)}"${selected?.key === item.key ? " selected" : ""}>${esc(item.group.sample)} / ${esc(item.file.name)}</option>`).join("")}
          </select>
        </div>
        <div class="panel-body">
          <div>${renderTablePreview(selected)}</div>
        </div>
        <div class="panel-foot">
          <span class="preview-meta">Column roles are sent as confirmations when available.</span>
          <button class="button" id="loadPreviewBtn">${icon.refresh}Refresh Preview</button>
        </div>
      </section>
      <aside class="inspector">
        <div class="inspector-head">Mapping<button class="inspector-close" id="backSourceInline" title="Back">${icon.x}</button></div>
        <div class="inspector-body">
          <div class="section">
            <div class="section-title">Experiment</div>
            <select class="select" id="experimentSelect">${renderExperimentOptions()}</select>
          </div>
          <div class="section">
            <div class="section-title">Output</div>
            <input class="input" id="plotOutputInput" value="${esc(S.plotOutput)}">
            <div class="segmented">${figureSizeOptions.map(item => `<button class="segment${S.figureSize === item.v ? " active" : ""}" data-size="${esc(item.v)}">${esc(item.l)}</button>`).join("")}</div>
            <div class="segmented">${exportOptions.map(item => `<button class="segment${S.exports.includes(item.v) ? " active" : ""}" data-export="${esc(item.v)}">${esc(item.l)}</button>`).join("")}</div>
          </div>
          <div class="collapsed-row"><span>Named samples</span><strong>${visibleGroups().length}</strong></div>
          <div class="collapsed-row"><span>Files</span><strong>${files.length}</strong></div>
          <div class="collapsed-row"><span>Columns loaded</span><strong>${Object.keys(S.tablePreviews).length}</strong></div>
        </div>
      </aside>
    </div>
  `;
}

function renderQualityActions(actions) {
  if (!actions.length) return "";
  return `<div class="quality-actions">${actions.map(action => {
    const status = String(action.status || "suggested");
    const canApply = qualityActionCanApply(action);
    const detail = qualityActionDetails(action);
    return `
      <div class="quality-action">
        <div class="quality-action-head">
          <div class="quality-action-title">${esc(action.label || action.id)}</div>
          <div class="quality-action-status">${esc(status)}</div>
        </div>
        <div class="quality-action-reason">${esc(action.reason || action.evidence_id || "")}</div>
        ${detail ? `<div class="quality-action-reason">${esc(detail)}</div>` : ""}
        ${canApply ? `<button class="quality-action-button" data-quality-action="${esc(action.id)}">Draft refine</button>` : ""}
      </div>
    `;
  }).join("")}</div>`;
}
function qualityActionCanApply(action) {
  if (!action || String(action.status || "suggested") === "applied" || !action.can_apply_as_refine_draft) return false;
  if (action.render_options_patch || action.clear_render_options || action.series_style_patch) return true;
  if (action.split_policy) return true;
  const sizePatch = action.figure_size_patch && typeof action.figure_size_patch === "object" ? action.figure_size_patch : null;
  if (sizePatch?.mode === "increase_height") {
    return Boolean(tallerFigureSize(S.figureSize) || (!hasFigureSize(S.figureSize) && sizePatch.fallback_size));
  }
  return Boolean(sizePatch);
}
function qualityActionDetails(action) {
  const strategy = action.layout_strategy && typeof action.layout_strategy === "object" ? action.layout_strategy : null;
  if (Array.isArray(strategy?.fallback_order) && strategy.fallback_order.length) {
    return `Fallback: ${strategy.fallback_order.join(" -> ")}`;
  }
  const split = action.split_policy && typeof action.split_policy === "object" ? action.split_policy : null;
  if (split?.mode) {
    const count = split.max_series_per_panel ? `, max ${split.max_series_per_panel} series/panel` : "";
    return `Split policy: ${split.mode}${count}`;
  }
  const sizePatch = action.figure_size_patch && typeof action.figure_size_patch === "object" ? action.figure_size_patch : null;
  if (sizePatch?.mode === "increase_height") return "Draft: taller figure preset";
  return "";
}

function artifactLink(label, info) {
  if (!info?.url) return `<span class="artifact-link">${esc(label)}</span>`;
  return `<a class="artifact-link ready" href="${esc(info.url)}" target="_blank" rel="noreferrer">${esc(label)}</a>`;
}

function selectOptions(options, value) {
  return options.map(item => `<option value="${esc(item.v)}"${(value || "") === item.v ? " selected" : ""}>${esc(item.l)}</option>`).join("");
}
function refineVal(key) {
  return S.refineOptions[key] ?? "";
}
function refineChecked(key, fallback = false) {
  const value = S.refineOptions[key];
  const checked = value === "" || value === undefined ? Boolean(fallback) : Boolean(value);
  return checked ? "checked" : "";
}
function markClearRenderOption(key) {
  if (!key || key === "size") return;
  S.clearRenderOptions = Array.from(new Set([...S.clearRenderOptions, key]));
}
function unmarkClearRenderOption(key) {
  S.clearRenderOptions = S.clearRenderOptions.filter(item => item !== key);
}
function setRefine(key, value) {
  S.refineOptions = { ...S.refineOptions, [key]: value };
  if (value === "" || value === null || value === undefined) {
    if (Object.prototype.hasOwnProperty.call(savedRenderOptions(), key)) markClearRenderOption(key);
  } else {
    unmarkClearRenderOption(key);
  }
  S.refineDirty = true;
  render();
}
function seriesStyles() {
  return Array.isArray(S.refineOptions.series_styles) ? S.refineOptions.series_styles : [];
}
function seriesStyle(label, key, fallback) {
  const item = seriesStyles().find(style => String(style.series_id || "") === label) || {};
  return item[key] === undefined || item[key] === null ? fallback : item[key];
}
function writeSeriesStyle(label, key, value) {
  const existing = seriesStyles().filter(style => String(style.series_id || "") !== label);
  const current = { ...(seriesStyles().find(style => String(style.series_id || "") === label) || {}), series_id: label };
  if (key === "enabled") current[key] = Boolean(value);
  else if (value === "" || value === null || value === undefined) delete current[key];
  else current[key] = value;
  S.refineOptions = { ...S.refineOptions, series_styles: [...existing, current] };
}
function setSeriesStyle(label, key, value) {
  writeSeriesStyle(label, key, value);
  S.refineDirty = true;
  render();
}
function currentSeriesLabels() {
  const series = visibleGroups().map(group => ({ label: group.sample }));
  return series.map(item => String(item.label || item.series_id || "").trim()).filter(Boolean);
}
function applyQualityActionDraft(actionId) {
  const action = qualityActions().find(item => String(item.id) === String(actionId));
  if (!action) return;
  const renderPatch = action.render_options_patch && typeof action.render_options_patch === "object" ? action.render_options_patch : {};
  Object.entries(renderPatch).forEach(([key, value]) => {
    if (value === null || value === undefined || value === "") {
      const next = { ...S.refineOptions };
      delete next[key];
      S.refineOptions = next;
      markClearRenderOption(key);
    } else if (key === "size") {
      if (draftFigureSize(String(value))) unmarkClearRenderOption(key);
    } else {
      S.refineOptions = { ...S.refineOptions, [key]: value };
      unmarkClearRenderOption(key);
    }
  });
  const sizePatch = action.figure_size_patch && typeof action.figure_size_patch === "object" ? action.figure_size_patch : null;
  if (sizePatch?.mode === "increase_height") {
    const nextSize = tallerFigureSize(S.figureSize) || (!hasFigureSize(S.figureSize) ? String(sizePatch.fallback_size || "") : "");
    if (nextSize) draftFigureSize(nextSize);
  }
  const clearKeys = Array.isArray(action.clear_render_options) ? action.clear_render_options : [];
  clearKeys.forEach(key => {
    const next = { ...S.refineOptions };
    delete next[key];
    S.refineOptions = next;
    markClearRenderOption(String(key));
  });
  const seriesPatch = action.series_style_patch && typeof action.series_style_patch === "object" ? action.series_style_patch : null;
  if (seriesPatch?.target === "visible_series") {
    const labels = currentSeriesLabels();
    labels.forEach(label => {
      Object.entries(seriesPatch).forEach(([key, value]) => {
        if (key !== "target") writeSeriesStyle(label, key, value);
      });
    });
  }
  const splitPatch = action.split_policy && typeof action.split_policy === "object" ? action.split_policy : null;
  if (splitPatch?.mode) S.splitPolicy = { ...splitPatch };
  S.refineDirty = true;
  showToast("QA refine draft ready");
  render();
}

function renderToast() {
  const toast = document.getElementById("toast");
  toast.classList.toggle("hidden", !S.toast);
  toast.textContent = S.toast || "";
}

function bindDropzone() {
  const zone = document.getElementById("dropzone");
  if (!zone) return;
  zone.addEventListener("click", () => document.getElementById("fileInput").click());
  ["dragenter", "dragover"].forEach(name => zone.addEventListener(name, event => {
    event.preventDefault();
    zone.classList.add("over");
  }));
  ["dragleave", "drop"].forEach(name => zone.addEventListener(name, event => {
    event.preventDefault();
    zone.classList.remove("over");
  }));
  zone.addEventListener("drop", event => addFiles(Array.from(event.dataTransfer.files || [])));
}

function addFiles(files) {
  if (!files.length) return;
  const group = S.groups[S.activeGroup] || S.groups[0];
  group.files.push(...files.map(file => ({ name: file.name, size: file.size, file, key: `file-${++S.fileSequence}` })));
  if (!S.projectName || S.projectName === "SciPlot project") S.projectName = files[0].name.replace(/\.[^.]+$/, "") || "SciPlot project";
  showToast(`${files.length} file(s) added`);
  render();
}
function addGroup() {
  S.groups.push({ sample: `Sample ${S.groups.length + 1}`, files: [] });
  S.activeGroup = S.groups.length - 1;
  render();
}
function removeGroup(index) {
  if (S.groups.length <= 1) {
    S.groups[0].files = [];
    S.groups[0].sample = "Sample 1";
  } else {
    S.groups.splice(index, 1);
    S.activeGroup = Math.max(0, Math.min(S.activeGroup, S.groups.length - 1));
  }
  render();
}
function moveGroup(fromIndex, toIndex) {
  if (fromIndex === toIndex || fromIndex < 0 || toIndex < 0 || fromIndex >= S.groups.length || toIndex >= S.groups.length) return;
  const [item] = S.groups.splice(fromIndex, 1);
  S.groups.splice(toIndex, 0, item);
  S.activeGroup = toIndex;
  render();
}
function selectFamily(id) {
  S.dataTypeId = id;
  const firstExperiment = currentDataType()?.experiments?.[0];
  S.experimentTypeId = firstExperiment?.id || "";
  S.experimentTouched = true;
  applyCurrentExperimentDefaults({ forceSize: !S.figureSizeTouched });
  render();
}
function toggleExport(value) {
  S.exports = S.exports.includes(value) ? S.exports.filter(item => item !== value) : [...S.exports, value];
  if (!S.exports.length) S.exports = ["pdf"];
  S.refineDirty = S.stage === "review" ? true : S.refineDirty;
  render();
}
function setSize(value) {
  S.figureSizeTouched = true;
  S.figureSize = value;
  if (S.stage === "review") setRefine("size", value);
  else render();
}

async function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(String(reader.result).split(",", 2)[1] || "");
    reader.onerror = () => reject(reader.error);
    reader.readAsDataURL(file);
  });
}
async function incomingFilesForGroup(group) {
  const files = [];
  for (const item of group.files) {
    if (item.source_path) files.push({ name: item.name, source_path: item.source_path });
    else files.push({ name: item.name, content_base64: await fileToBase64(item.file) });
  }
  return files;
}
async function projectGroupsPayload() {
  const groups = [];
  for (const group of visibleGroups()) {
    groups.push({ sample: group.sample.trim(), files: await incomingFilesForGroup(group) });
  }
  return groups;
}
function collectColumnConfirmations() {
  const confirmations = [];
  allFiles().forEach(item => {
    const preview = S.tablePreviews[item.key];
    if (!preview?.columns?.length) return;
    confirmations.push({
      sample: item.group.sample,
      file_name: item.file.name,
      source_path: item.file.source_path || "",
      sheet: preview.sheet || null,
      columns: preview.columns.map(column => {
        const role = S.columnRoles[`${item.key}:${column.index}`] ?? column.suggested_role ?? "auto";
        return {
          index: column.index,
          name: column.name,
          inferred_type: column.inferred_type || "auto",
          confirmed_type: column.inferred_type || "auto",
          role
        };
      })
    });
  });
  return confirmations;
}

async function ensureTablePreview(item) {
  if (!item || S.tablePreviews[item.key]) return;
  S.tablePreviews = { ...S.tablePreviews, [item.key]: { loading: true } };
  try {
    const payload = { name: item.file.name };
    if (item.file.source_path) payload.source_path = item.file.source_path;
    else payload.content_base64 = await fileToBase64(item.file.file);
    const response = await fetch("/api/table-preview", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    const json = await response.json();
    if (!response.ok) throw new Error(json.error || "Preview failed");
    S.tablePreviews = { ...S.tablePreviews, [item.key]: json };
  } catch (error) {
    S.tablePreviews = { ...S.tablePreviews, [item.key]: { error: error.message } };
  }
  render();
}

async function createAndRenderProject() {
  if (!canRender()) return;
  S.busy = "Rendering with SciPlot";
  S.error = "";
  render();
  try {
    const payload = {
      project_name: S.projectName.trim() || "SciPlot project",
      data_type_id: S.dataTypeId,
      experiment_type_id: S.experimentTypeId,
      groups: await projectGroupsPayload(),
      plot_output: S.plotOutput || "runs/run_001",
      exports: S.exports,
      render_options: { size: S.figureSize },
      replicate_mode: S.replicateMode,
      column_confirmations: collectColumnConfirmations(),
      run_after_create: true
    };
    const response = await fetch("/api/projects", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    const json = await response.json();
    if (!response.ok) throw new Error(json.error || "Render failed");
    S.lastProject = json;
    await refreshStatus();
    resetRefine();
    S.stage = "review";
    S.busy = "";
    showToast(json.run_failed ? "Render needs attention" : "SciPlot artifacts ready");
  } catch (error) {
    S.error = error.message;
    S.busy = "";
    showToast(error.message);
  }
  render();
}

async function refreshStatus() {
  if (!S.lastProject?.project_slug) return;
  const response = await fetch(`/api/projects/${encodeURIComponent(S.lastProject.project_slug)}/status`);
  const json = await response.json();
  if (!response.ok) throw new Error(json.error || "Status failed");
  S.projectStatus = json;
  if (json.manifest) applyManifest(json.manifest);
}

function applyManifest(manifest) {
  S.projectName = manifest.project_name || S.projectName;
  if (manifest.data_type?.id) S.dataTypeId = manifest.data_type.id;
  if (manifest.experiment?.id) S.experimentTypeId = manifest.experiment.id;
  if (manifest.groups?.length) {
    S.groups = manifest.groups.map(group => ({
      sample: group.sample || "Sample",
      files: (group.files || []).map(file => ({
        name: file.original_name || String(file.source_path || "").split("/").pop() || "data",
        source_path: file.source_path,
        size: file.size_bytes,
        key: `file-${++S.fileSequence}`
      }))
    }));
  }
  const plotOptions = manifest.plot_options || {};
  if (plotOptions.output) S.plotOutput = plotOptions.output;
  if (plotOptions.exports?.length) S.exports = plotOptions.exports;
  if (plotOptions.render_options?.size) S.figureSize = plotOptions.render_options.size;
  if (plotOptions.split_policy && typeof plotOptions.split_policy === "object") {
    S.splitPolicy = plotOptions.split_policy;
  }
}

function resetRefine() {
  const options = S.projectStatus?.manifest?.plot_options?.render_options || S.lastProject?.plot_options?.render_options || {};
  const splitPolicy = S.projectStatus?.manifest?.plot_options?.split_policy || S.lastProject?.plot_options?.split_policy || null;
  S.refineOptions = {
    size: options.size || S.figureSize,
    xscale: options.xscale || "",
    yscale: options.yscale || "",
    x_min: options.x_min ?? "",
    x_max: options.x_max ?? "",
    y_min: options.y_min ?? "",
    y_max: options.y_max ?? "",
    reverse_x: options.reverse_x ?? "",
    x_tick_density: options.x_tick_density || "",
    y_tick_density: options.y_tick_density || "",
    x_label_override: options.x_label_override || "",
    y_label_override: options.y_label_override || "",
    legend_position: options.legend_position || "",
    series_label_mode: options.series_label_mode || "",
    style_preset: options.style_preset || "",
    palette_preset: options.palette_preset || "",
    baseline: options.baseline || "",
    stack_spacing_scale: options.stack_spacing_scale ?? "",
    series_styles: Array.isArray(options.series_styles) ? options.series_styles : []
  };
  S.clearRenderOptions = [];
  S.splitPolicy = splitPolicy && typeof splitPolicy === "object" ? splitPolicy : null;
  S.refineDirty = false;
}

async function applyProject() {
  if (!S.lastProject?.project_slug || S.busy) return;
  S.busy = "Applying";
  S.error = "";
  render();
  try {
    const response = await fetch(`/api/projects/${encodeURIComponent(S.lastProject.project_slug)}/workbench/apply`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(workbenchPayload({ review_note: "" }))
    });
    const json = await response.json();
    if (!response.ok) throw new Error(json.error || "Apply failed");
    S.lastProject = { ...S.lastProject, ...json };
    await refreshStatus();
    resetRefine();
    showToast("Applied");
  } catch (error) {
    S.error = error.message;
    showToast(error.message);
  }
  S.busy = "";
  render();
}

async function exportProject() {
  if (!S.lastProject?.project_slug || S.busy) return;
  S.busy = "Exporting";
  S.error = "";
  render();
  try {
    const response = await fetch(`/api/projects/${encodeURIComponent(S.lastProject.project_slug)}/rerun`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(workbenchPayload({ review_note: "" }))
    });
    const json = await response.json();
    if (!response.ok) throw new Error(json.error || "Export failed");
    S.lastProject = json;
    await refreshStatus();
    resetRefine();
    showToast(json.run_failed ? "Export needs attention" : "Export complete");
  } catch (error) {
    S.error = error.message;
    showToast(error.message);
  }
  S.busy = "";
  render();
}

async function loadProject(slug) {
  try {
    const response = await fetch(`/api/projects/${encodeURIComponent(slug)}/status`);
    const json = await response.json();
    if (!response.ok) throw new Error(json.error || "Open failed");
    S.projectStatus = json;
    S.lastProject = {
      project_slug: json.project_slug,
      project_dir: json.project_dir,
      plot_request: json.plot_request,
      outputs_dir: json.outputs_dir,
      last_run: json.last_run,
      download_name: `${json.project_slug}.zip`
    };
    if (json.manifest) applyManifest(json.manifest);
    resetRefine();
    S.stage = hasRenderedArtifacts() ? "review" : "inspect";
    showToast("Project opened");
  } catch (error) {
    showToast(error.message);
  }
  render();
}

function openProjectBrowser() {
  document.getElementById("projectModal").classList.remove("hidden");
  document.getElementById("projectSearch").value = "";
  document.getElementById("projectSearch").focus();
  searchProjects("");
}
async function searchProjects(query) {
  const list = document.getElementById("projectList");
  list.innerHTML = `<div class="empty-state"><b>Loading</b></div>`;
  try {
    const response = await fetch(`/api/projects${query ? `?search=${encodeURIComponent(query)}` : ""}`);
    const json = await response.json();
    const projects = json.projects || [];
    if (!projects.length) {
      list.innerHTML = `<div class="empty-state"><b>No projects</b></div>`;
      return;
    }
    list.innerHTML = projects.map(project => {
      const kind = [project.data_type?.label, project.experiment?.label].filter(Boolean).join(" / ") || "SciPlot";
      return `<button class="modal-row" data-open-project="${esc(project.slug)}"><span><strong>${esc(project.project_name || project.slug)}</strong><br><span class="preview-meta">${esc(kind)}</span></span><span class="preview-meta">${project.figure_count || 0} figs</span></button>`;
    }).join("");
  } catch (_error) {
    list.innerHTML = `<div class="empty-state"><b>Failed to load</b></div>`;
  }
}

async function fetchCatalog() {
  try {
    const response = await fetch("/api/catalog");
    const json = await response.json();
    S.catalog = json.data_types || [];
    if (!S.dataTypeId && S.catalog[0]) {
      S.dataTypeId = S.catalog[0].id;
      S.experimentTypeId = S.catalog[0].experiments?.[0]?.id || "";
    }
  } catch (_error) {
  }
}
async function loadFromSession() {
  const session = new URLSearchParams(window.location.search).get("session");
  if (!session) return;
  try {
    const response = await fetch(`/api/session/${encodeURIComponent(session)}`);
    const json = await response.json();
    if (!response.ok) return;
    S.projectName = json.project_name || S.projectName;
    if (json.data_type_id) S.dataTypeId = json.data_type_id;
    if (json.experiment_type_id) S.experimentTypeId = json.experiment_type_id;
    applyCurrentExperimentDefaults({ forceSize: !S.figureSizeTouched });
    if (json.groups?.length) {
      S.groups = json.groups.map(group => ({
        sample: group.sample || "Sample",
        files: (group.files || []).map(file => ({
          name: file.name || String(file.source_path || "").split("/").pop() || "data",
          source_path: file.source_path,
          size: file.size_bytes,
          key: `file-${++S.fileSequence}`
        }))
      }));
    }
  } catch (_error) {
  }
}
async function loadFromQuery() {
  const slug = new URLSearchParams(window.location.search).get("project");
  if (slug) await loadProject(slug);
}

document.addEventListener("click", event => {
  const target = event.target.closest("button, a");
  if (!target) return;
  if (target.id === "openProjectBtn" || target.id === "openProjectInline") openProjectBrowser();
  if (target.id === "addFilesBtn" || target.id === "addFilesInline") document.getElementById("fileInput").click();
  if (target.id === "addFolderBtn" || target.id === "addFolderInline") document.getElementById("folderInput").click();
  if (target.id === "continueInspectBtn" || target.id === "continueInspectInline") setStage("inspect");
  if (target.id === "backToSourceBtn" || target.id === "backSourceInline") setStage("source");
  if (target.id === "newSampleBtn") addGroup();
  if (target.id === "renderProjectBtn" || target.id === "renderProjectInline") createAndRenderProject();
  if (target.id === "applyBtn" || target.id === "applyFloatBtn") applyProject();
  if (target.id === "exportBtn" || target.id === "exportFloatBtn") exportProject();
  if (target.id === "loadPreviewBtn") {
    const selected = allFiles().find(item => item.key === S.previewKey) || allFiles()[0];
    if (selected) {
      delete S.tablePreviews[selected.key];
      ensureTablePreview(selected);
    }
  }
  if (target.dataset.family) selectFamily(target.dataset.family);
  if (target.dataset.size) setSize(target.dataset.size);
  if (target.dataset.export) toggleExport(target.dataset.export);
  if (target.dataset.qualityAction) applyQualityActionDraft(target.dataset.qualityAction);
  if (target.dataset.stageButton) setStage(target.dataset.stageButton);
  if (target.dataset.figureIndex) {
    S.activeFigure = Number(target.dataset.figureIndex);
    render();
  }
  if (target.dataset.tab) {
    S.inspectorTab = target.dataset.tab;
    render();
  }
  if (target.dataset.removeGroup) removeGroup(Number(target.dataset.removeGroup));
  if (target.dataset.openProject) {
    document.getElementById("projectModal").classList.add("hidden");
    loadProject(target.dataset.openProject);
  }
});

document.addEventListener("input", event => {
  const target = event.target;
  if (target.id === "projectNameInput") {
    S.projectName = target.value;
    document.getElementById("projectStateLabel").textContent = topbarStateLabel();
  }
  if (target.id === "plotOutputInput") S.plotOutput = target.value;
  if (target.dataset.sampleName !== undefined) S.groups[Number(target.dataset.sampleName)].sample = target.value;
  if (target.dataset.refine) setRefine(target.dataset.refine, target.value);
});

document.addEventListener("change", event => {
  const target = event.target;
  if (target.id === "experimentSelect") {
    S.experimentTypeId = target.value;
    S.experimentTouched = true;
    applyCurrentExperimentDefaults({ forceSize: true });
    render();
  }
  if (target.id === "previewFileSelect") {
    S.previewKey = target.value;
    render();
  }
  if (target.dataset.columnRole) S.columnRoles[target.dataset.columnRole] = target.value;
  if (target.dataset.refine) setRefine(target.dataset.refine, target.value);
  if (target.dataset.refineCheck) setRefine(target.dataset.refineCheck, target.checked);
  if (target.dataset.seriesEnabled) setSeriesStyle(target.dataset.seriesEnabled, "enabled", target.checked);
  if (target.dataset.seriesColor) setSeriesStyle(target.dataset.seriesColor, "color", target.value);
  if (target.dataset.seriesLineWidth) setSeriesStyle(target.dataset.seriesLineWidth, "line_width", target.value);
});

document.addEventListener("dragstart", event => {
  const row = event.target.closest("[data-drag-index]");
  if (row) event.dataTransfer.setData("text/plain", row.dataset.dragIndex);
});
document.addEventListener("dragover", event => {
  if (event.target.closest("[data-drag-index]")) event.preventDefault();
});
document.addEventListener("drop", event => {
  const row = event.target.closest("[data-drag-index]");
  if (!row) return;
  event.preventDefault();
  moveGroup(Number(event.dataTransfer.getData("text/plain")), Number(row.dataset.dragIndex));
});

document.getElementById("fileInput").addEventListener("change", event => {
  addFiles(Array.from(event.target.files || []));
  event.target.value = "";
});
document.getElementById("folderInput").addEventListener("change", event => {
  addFiles(Array.from(event.target.files || []));
  event.target.value = "";
});
document.getElementById("projectSearch").addEventListener("input", event => searchProjects(event.target.value.trim()));
document.getElementById("projectClose").addEventListener("click", () => document.getElementById("projectModal").classList.add("hidden"));
document.getElementById("projectModal").addEventListener("click", event => {
  if (event.target === event.currentTarget) event.currentTarget.classList.add("hidden");
});

async function boot() {
  await fetchCatalog();
  await loadFromSession();
  await loadFromQuery();
  render();
}
boot();
</script>
</body>
</html>
