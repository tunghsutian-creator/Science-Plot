<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SciPlot</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eae8e4;
      --surface: #f5f3ef;
      --canvas-bg: #fefefd;
      --panel-bg: #faf9f6;
      --rail-bg: #e6e4df;
      --panel: #ffffff;
      --ink: #1a1a18;
      --muted: #6e6d69;
      --quiet: #a8a6a0;
      --line: #e4e1da;
      --line-strong: #c5c1b7;
      --green: #0b8a7a;
      --green-soft: #e3f4f0;
      --green-hover: #097065;
      --blue: #3366e0;
      --blue-soft: #e9effc;
      --orange: #c7780a;
      --orange-soft: #fdf0db;
      --rose: #d9394a;
      --rose-soft: #fde8eb;
      --shadow-xs: 0 1px 2px rgba(0,0,0,0.03);
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.05);
      --shadow: 0 6px 20px rgba(0,0,0,0.07);
      --shadow-md: 0 12px 36px rgba(0,0,0,0.08);
      --shadow-lg: 0 20px 56px rgba(0,0,0,0.09);
      --radius-sm: 10px;
      --radius: 14px;
      --radius-lg: 20px;
      --radius-xl: 28px;
      --ease-spring-slow: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-spring-bounce: cubic-bezier(0.68, -0.6, 0.32, 1.6);
      --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", system-ui, sans-serif;
      letter-spacing: -0.01em;
      -webkit-font-smoothing: antialiased;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overflow: hidden;
      color: var(--ink);
      background: var(--bg);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
      letter-spacing: 0;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .app-shell {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-columns: 76px minmax(0, 1fr) 336px;
      background: var(--bg);
      overflow: hidden;
    }

    .stage-rail {
      min-width: 0;
      min-height: 0;
      padding: 16px 8px;
      border-right: 1px solid var(--line);
      background: var(--rail-bg);
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 18px;
      position: relative;
    }

    .mark {
      width: 40px;
      height: 40px;
      margin: 0 auto;
      border-radius: 13px;
      display: grid;
      place-items: center;
      color: #ffffff;
      background: #141413;
      box-shadow: var(--shadow-sm);
    }

    .mark svg,
    .icon-button svg,
    .stage-button svg,
    .primary-action svg,
    .micro-button svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .stage-stack {
      display: grid;
      align-content: start;
      gap: 0;
      position: relative;
    }

    .stage-item {
      display: grid;
      grid-template-rows: auto auto;
      justify-items: center;
      gap: 3px;
      position: relative;
    }

    .stage-connector {
      width: 2px;
      height: 14px;
      margin: 0 auto;
      background: var(--line);
      border-radius: 999px;
      transition: background 280ms var(--ease-out);
    }

    .stage-connector.done {
      background: var(--green);
    }

    .stage-button {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      color: var(--quiet);
      background: transparent;
      transition: background 200ms var(--ease-out), color 200ms var(--ease-out), transform 200ms var(--ease-spring), box-shadow 200ms var(--ease-out);
      position: relative;
      z-index: 1;
    }

    .stage-button.active {
      color: var(--ink);
      background: #ffffff;
      box-shadow: var(--shadow);
    }

    .stage-button:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.8);
    }

    .stage-button:active {
      transform: scale(0.94);
    }

    .stage-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--quiet);
      transition: background 200ms ease, box-shadow 200ms ease;
    }

    .stage-dot.ready { background: var(--green); box-shadow: 0 0 0 5px var(--green-soft); }
    .stage-dot.busy { background: var(--orange); animation: pulse-dot 1.2s var(--ease-in-out) infinite; }
    .stage-dot.warn { background: var(--rose); }

    .stage-label {
      color: var(--quiet);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      transition: color 200ms ease;
    }

    .stage-item.active .stage-label {
      color: var(--ink);
    }

    .status-strip {
      display: grid;
      gap: 8px;
      justify-items: center;
    }

    .status-light {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--green);
      box-shadow: 0 0 0 6px var(--green-soft);
      transition: box-shadow 400ms ease;
    }

    .status-light.warn {
      background: var(--orange);
      box-shadow: 0 0 0 6px var(--orange-soft);
    }

    .main-space {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: 56px minmax(0, 1fr);
      overflow: hidden;
    }

    .topbar {
      min-width: 0;
      padding: 10px 18px 8px;
      display: grid;
      grid-template-columns: minmax(140px, 300px) 1fr auto;
      align-items: center;
      gap: 12px;
    }

    .project-input {
      width: 100%;
      height: 36px;
      padding: 0 12px;
      border: 1px solid transparent;
      border-radius: 10px;
      outline: none;
      background: transparent;
      color: var(--ink);
      font-size: 14px;
      font-weight: 700;
      transition: border-color 160ms ease, background 160ms ease;
      box-shadow: none;
    }

    .project-input:hover {
      background: rgba(255, 255, 255, 0.54);
    }

    .project-input:focus {
      border-color: var(--line);
      background: #ffffff;
      box-shadow: var(--shadow-sm);
    }

    .tool-strip {
      min-width: 0;
      justify-self: center;
      height: 36px;
      padding: 2px 4px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.6);
      display: flex;
      align-items: center;
      gap: 2px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 240ms ease;
    }

    .tool-strip.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .icon-button,
    .micro-button {
      width: 30px;
      height: 28px;
      border-radius: 9px;
      display: grid;
      place-items: center;
      color: var(--muted);
      background: transparent;
      transition: color 160ms ease, background 160ms ease;
    }

    .icon-button.active,
    .icon-button:hover,
    .micro-button:hover {
      color: var(--ink);
      background: #ffffff;
      box-shadow: var(--shadow-sm);
    }

    .icon-button:active {
      transform: scale(0.93);
    }

    .zoom-range {
      width: 96px;
      accent-color: var(--green);
    }

    .primary-action {
      height: 38px;
      min-width: 104px;
      padding: 0 16px;
      border-radius: 19px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: #ffffff;
      background: #141413;
      box-shadow: var(--shadow-sm);
      font-weight: 640;
      font-size: 14px;
      transition: transform 150ms var(--ease-spring), box-shadow 200ms ease, opacity 200ms ease;
    }

    .primary-action:hover:not(:disabled) {
      box-shadow: var(--shadow);
      transform: translateY(-1px);
    }

    .primary-action:active:not(:disabled) {
      transform: scale(0.96);
    }

    .primary-action:disabled {
      color: var(--quiet);
      background: #e8e9e6;
      cursor: not-allowed;
      box-shadow: none;
    }

    .canvas-zone {
      min-width: 0;
      min-height: 0;
      padding: 0 18px 18px;
      overflow: hidden;
    }

    .visual-canvas {
      position: relative;
      width: 100%;
      height: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: var(--canvas-bg);
      box-shadow: var(--shadow);
      overflow: hidden;
      user-select: none;
    }

    .visual-board {
      position: absolute;
      inset: 0;
      min-width: 0;
      min-height: 0;
      transform-origin: center;
      transition: transform 200ms var(--ease-out);
    }

    .canvas-watermark {
      position: absolute;
      right: 14px;
      top: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 11px;
      z-index: 5;
      opacity: 0.7;
    }

    .phase-chip {
      min-height: 24px;
      padding: 0 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      font-size: 11px;
      font-weight: 640;
      white-space: nowrap;
    }

    .pulse {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--green);
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.45; transform: scale(2); }
    }

    @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    @keyframes scale-in {
      from { opacity: 0; transform: scale(0.92); }
      to { opacity: 1; transform: scale(1); }
    }

    .anim-enter {
      animation: fade-in-up 340ms var(--ease-spring-slow) both;
    }

    .anim-enter-fast {
      animation: fade-in 200ms var(--ease-smooth) both;
    }

    /* ── Skeleton Loading ── */
    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, #eae7e3 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.6s var(--ease-in-out) infinite;
      border-radius: var(--radius-sm);
      color: transparent !important;
      pointer-events: none;
    }

    .skeleton-text {
      height: 14px;
      border-radius: 7px;
    }

    .skeleton-card {
      min-height: 120px;
    }

    /* ── Hover Micro-interactions ── */
    .btn,
    .option,
    .canvas-command {
      transition: transform 200ms var(--ease-spring-bounce), box-shadow 200ms var(--ease-out), background 160ms ease, border-color 160ms ease, color 160ms ease;
    }

    .btn:hover:not(:disabled),
    .option:hover:not(:disabled) {
      transform: scale(1.03);
    }

    .btn:active:not(:disabled),
    .option:active:not(:disabled) {
      transform: scale(0.95);
      transition: transform 100ms var(--ease-smooth);
    }

    .primary-action,
    .icon-button,
    .micro-button {
      transition: transform 200ms var(--ease-spring-bounce), box-shadow 200ms var(--ease-out), background 160ms ease, color 160ms ease;
    }

    .primary-action:hover:not(:disabled) {
      transform: scale(1.04);
    }

    .primary-action:active:not(:disabled) {
      transform: scale(0.94);
      transition: transform 100ms var(--ease-smooth);
    }

    .icon-button:active,
    .micro-button:active {
      transform: scale(0.88);
    }

    .flow-map,
    .mapping-map,
    .render-map,
    .review-map {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
    }

    /* ── Start Stage: Cards Grid + Drop Strip ── */

    .start-stage {
      width: min(1060px, 94%);
      min-height: 440px;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      gap: 20px;
      align-items: start;
      padding: 18px 0;
    }

    .template-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      align-content: start;
    }

    .template-card {
      min-width: 0;
      padding: 20px 16px 16px;
      border: 1.5px solid var(--line);
      border-radius: var(--radius-lg);
      background: var(--surface);
      box-shadow: var(--shadow-xs);
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 10px;
      cursor: pointer;
      transition: transform 240ms var(--ease-spring), box-shadow 240ms var(--ease-out), border-color 200ms ease, opacity 200ms ease, background 200ms ease;
      position: relative;
      overflow: hidden;
    }

    .template-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-md);
      border-color: var(--line-strong);
      background: #ffffff;
    }

    .template-card:active {
      transform: scale(0.97);
      transition: transform 120ms var(--ease-smooth);
    }

    .template-card.selected {
      border-color: var(--green);
      background: var(--green-soft);
      box-shadow: 0 0 0 4px var(--green-soft), var(--shadow-md);
    }

    .template-card.selected:hover {
      background: #daf2ed;
    }

    .template-card.selected::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      border: 2px solid var(--green);
      pointer-events: none;
    }

    .template-card.dimmed {
      opacity: 0.5;
    }

    .template-icon {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      color: #ffffff;
      background: var(--green);
      transition: transform 200ms var(--ease-spring);
    }

    .template-card:hover .template-icon {
      transform: scale(1.06);
    }

    .template-icon svg {
      width: 26px;
      height: 26px;
    }

    .template-icon.blue { background: var(--blue); }
    .template-icon.orange { background: var(--orange); }
    .template-icon.rose { background: var(--rose); }
    .template-icon.violet { background: #7c3aed; }

    .template-name {
      color: var(--ink);
      font-size: 18px;
      font-weight: 700;
      line-height: 1.15;
    }

    .template-sub {
      color: var(--quiet);
      font-size: 12px;
      line-height: 1.4;
    }

    .template-badge {
      min-height: 24px;
      padding: 0 9px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--green);
      background: var(--green-soft);
      font-size: 11px;
      font-weight: 680;
      white-space: nowrap;
      width: fit-content;
    }

    .template-badge svg {
      width: 12px;
      height: 12px;
    }

    .more-card {
      display: grid;
      place-items: center;
      color: var(--quiet);
      background: rgba(255, 255, 255, 0.5);
      border-style: dashed;
    }

    .more-card:hover {
      color: var(--muted);
      border-color: var(--line-strong);
    }

    .more-label {
      font-size: 15px;
      font-weight: 680;
    }

    /* ── Drop Strip ── */

    .drop-strip {
      min-height: 68px;
      padding: 14px 20px;
      border: 1.5px dashed var(--line-strong);
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.44);
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
      transition: border-color 200ms ease, background 200ms ease, transform 200ms var(--ease-spring), min-height 240ms var(--ease-out);
      cursor: pointer;
    }

    .drop-strip:hover,
    .drop-strip.dragover {
      border-color: var(--green);
      background: var(--green-soft);
      transform: translateY(-2px);
      min-height: 82px;
    }

    .drop-strip.dragover {
      border-style: solid;
      box-shadow: 0 0 0 4px var(--green-soft);
    }

    .drop-icon {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      color: var(--green);
      background: var(--green-soft);
    }

    .drop-icon svg {
      width: 18px;
      height: 18px;
    }

    .drop-hint {
      color: var(--muted);
      font-size: 14px;
      font-weight: 640;
    }

    .drop-hint strong {
      color: var(--ink);
      font-weight: 720;
    }

    .drop-menu-btn {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      border: 1px solid var(--line);
      display: grid;
      place-items: center;
      color: var(--muted);
      background: #ffffff;
      transition: color 160ms ease, background 160ms ease;
    }

    .drop-menu-btn:hover {
      color: var(--ink);
      background: #f5f5f2;
    }

    .drop-strip.dragover .drop-menu-btn {
      display: none;
    }

    .file-strip,
    .sample-track,
    .column-track,
    .metric-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .pill,
    .sample-pill,
    .role-pill,
    .figure-pill {
      min-height: 26px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #ffffff;
      color: var(--ink);
      font-size: 11px;
      font-weight: 640;
      white-space: nowrap;
    }

    .pill.muted {
      color: var(--quiet);
      background: #f4f5f2;
    }

    .pill.ok {
      color: var(--green);
      background: var(--green-soft);
      border-color: transparent;
    }

    .pill.warn {
      color: var(--orange);
      background: var(--orange-soft);
      border-color: transparent;
    }

    .mapping-stage {
      width: min(1080px, 92%);
      min-height: 440px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 14px;
      align-items: start;
      align-content: start;
    }

    /* ── Map: Empty State (Path A) ── */
    .map-empty-state {
      display: grid;
      gap: 20px;
      align-content: center;
      min-height: 380px;
    }

    .map-figure-queue {
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: var(--surface);
      box-shadow: var(--shadow-xs);
      display: grid;
      gap: 14px;
    }

    .map-queue-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .map-experiment-label {
      color: var(--ink);
      font-size: 16px;
      font-weight: 700;
    }

    .map-queue-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 8px;
    }

    .map-queue-card {
      min-height: 56px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: #ffffff;
      display: grid;
      grid-template-columns: auto 1fr;
      grid-template-rows: auto auto;
      gap: 2px 10px;
      align-items: center;
    }

    .map-queue-card .queue-index {
      grid-row: span 2;
    }

    .map-import-zone {
      min-height: 80px;
      padding: 16px 20px;
      border: 1.5px dashed var(--line-strong);
      border-radius: var(--radius-lg);
      background: var(--surface);
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: border-color 200ms ease, background 200ms ease, transform 200ms var(--ease-spring), min-height 240ms var(--ease-out);
    }

    .map-import-zone:hover,
    .map-import-zone.dragover {
      border-color: var(--green);
      background: var(--green-soft);
      transform: translateY(-2px);
      min-height: 94px;
    }

    .map-import-zone.dragover {
      border-style: solid;
      box-shadow: 0 0 0 4px var(--green-soft);
    }

    /* ── Map: Figure Bar (Path B) ── */
    .map-figure-bar {
      min-height: 36px;
      padding: 6px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: #ffffff;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: var(--shadow-xs);
    }

    .map-queue-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 640;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .mapping-table {
      min-width: 0;
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #ffffff;
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .mapping-header,
    .mapping-row {
      min-width: 0;
      display: grid;
      grid-template-columns: minmax(180px, 1.4fr) 84px 148px minmax(150px, 1fr) 110px;
      align-items: center;
      gap: 10px;
    }

    .mapping-header {
      min-height: 38px;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      background: var(--surface);
      font-size: 11px;
      font-weight: 820;
      text-transform: uppercase;
    }

    .mapping-row {
      min-height: 58px;
      padding: 9px 14px;
      border-bottom: 1px solid var(--line);
      color: var(--ink);
      background: #ffffff;
      cursor: pointer;
    }

    .mapping-row:last-child {
      border-bottom: 0;
    }

    .mapping-row.active {
      background: #f3fbf8;
      box-shadow: inset 3px 0 0 var(--green);
    }

    .sample-cell {
      min-width: 0;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 8px;
      align-items: center;
    }

    .sample-lane {
      min-width: 0;
      min-height: 52px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 15px;
      background: #f8faf7;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px;
    }

    .sample-lane.active {
      border-color: var(--green);
      background: #ffffff;
    }

    .series-lane {
      grid-template-columns: auto minmax(110px, 1fr);
      align-items: stretch;
    }

    .series-lane-main {
      min-width: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .series-tools {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .series-tools .field {
      min-width: 0;
    }

    .series-tools input[type="color"] {
      padding: 3px;
    }

    .series-tools input[type="range"] {
      padding: 0;
    }

    .drag-handle {
      width: 28px;
      height: 28px;
      border-radius: 10px;
      color: var(--quiet);
      background: transparent;
      display: grid;
      place-items: center;
      cursor: grab;
    }

    .sample-input {
      min-width: 0;
      height: 32px;
      border: 0;
      border-radius: 10px;
      padding: 0 8px;
      background: transparent;
      color: var(--ink);
      outline: none;
      font-weight: 700;
    }

    .sample-input:focus {
      background: #ffffff;
      box-shadow: inset 0 0 0 1px var(--line);
    }

    .file-count {
      min-width: 24px;
      height: 24px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      color: var(--muted);
      background: #ffffff;
      font-size: 12px;
      font-weight: 760;
    }

    .mapping-count,
    .mapping-mode,
    .mapping-experiment {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
      font-size: 13px;
      font-weight: 720;
    }

    .status-pill {
      min-height: 26px;
      padding: 0 9px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      background: #edf1f1;
      font-size: 12px;
      font-weight: 760;
      white-space: nowrap;
    }

    .status-pill.ok {
      color: var(--green);
      background: var(--green-soft);
    }

    .status-pill.warn {
      color: var(--orange);
      background: var(--orange-soft);
    }

    .mapping-detail {
      min-width: 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #ffffff;
      box-shadow: var(--shadow-sm);
      display: grid;
      gap: 12px;
    }

    .mapping-detail-head {
      min-width: 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .render-sheet {
      width: min(840px, 90%);
      min-height: 420px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #ffffff;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 0;
      overflow: hidden;
    }

    .render-head,
    .render-foot {
      min-width: 0;
      min-height: 54px;
      padding: 14px 18px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      background: var(--surface);
    }

    .render-head {
      border-bottom: 1px solid var(--line);
    }

    .render-foot {
      border-top: 1px solid var(--line);
    }

    .figure-queue {
      min-width: 0;
      min-height: 0;
      padding: 16px;
      display: grid;
      align-content: start;
      gap: 10px;
    }

    .figure-queue-row {
      min-width: 0;
      min-height: 54px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      background: #ffffff;
    }

    .queue-index {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      color: var(--green);
      background: var(--green-soft);
      font-size: 12px;
      font-weight: 820;
    }

    .progress {
      height: 8px;
      border-radius: 999px;
      background: #e8eee8;
      overflow: hidden;
    }

    .progress span {
      display: block;
      width: 42%;
      height: 100%;
      border-radius: inherit;
      background: var(--green);
    }

    .review-map {
      padding: 42px 46px;
      grid-template-columns: 64px minmax(0, 1fr);
      place-items: stretch;
      align-items: stretch;
      gap: 16px;
    }

    .review-stage {
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
      padding: 0;
      display: grid;
      place-items: stretch;
    }

    .figure-frame {
      width: 100%;
      height: 100%;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #ffffff;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: grid;
      place-items: center;
    }

    .figure-frame img,
    .figure-frame object,
    .figure-frame iframe {
      width: 100%;
      height: 100%;
      display: block;
      border: 0;
      background: #ffffff;
    }

    .figure-frame img {
      object-fit: contain;
    }

    .live-chart-frame {
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: #ffffff;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      overflow: hidden;
    }

    .live-chart-frame.updating {
      box-shadow: 0 0 0 4px var(--blue-soft), var(--shadow);
    }

    .live-chart {
      width: 100%;
      height: 100%;
      display: block;
      cursor: crosshair;
      min-height: 300px;
      touch-action: none;
    }

    .chart-grid {
      stroke: #e8e5de;
      stroke-width: 1;
    }

    .chart-axis {
      stroke: var(--ink);
      stroke-width: 1.5;
    }

    .chart-zero-line {
      stroke: var(--line-strong);
      stroke-width: 1.2;
      stroke-dasharray: 4 5;
    }

    .chart-tick {
      fill: var(--muted);
      font-size: 12px;
      font-weight: 620;
    }

    .chart-label {
      fill: var(--ink);
      font-size: 14px;
    }

    .live-series {
      fill: none;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: opacity 200ms ease;
    }

    .live-series-group.active .live-series {
      stroke-width: 4;
    }

    .live-series.hidden {
      opacity: 0.1;
    }

    .live-point {
      stroke: #ffffff;
      stroke-width: 1.6;
      transition: r 150ms var(--ease-spring);
      cursor: pointer;
    }

    .live-point:hover {
      r: 7;
    }

    .live-direct-label {
      paint-order: stroke;
      stroke: #ffffff;
      stroke-width: 4px;
      fill: var(--ink);
      font-size: 11px;
      font-weight: 760;
      pointer-events: none;
    }

    .live-series-group.hidden .live-series,
    .live-series-group.hidden .live-point,
    .live-series-group.hidden .live-direct-label {
      opacity: 0.12;
      pointer-events: none;
    }

    .chart-hit-area {
      fill: transparent;
      cursor: crosshair;
    }

    .chart-crosshair {
      pointer-events: none;
      opacity: 0;
      transition: opacity 100ms ease;
    }

    .chart-crosshair.visible {
      opacity: 1;
    }

    .chart-crosshair-line {
      stroke: var(--muted);
      stroke-width: 1;
      stroke-dasharray: 3 4;
    }

    .chart-focus-dot {
      fill: #ffffff;
      stroke: var(--green);
      stroke-width: 2.4;
    }

    /* ── Chart Tooltip ── */
    .chart-tooltip {
      pointer-events: none;
      transition: visibility 80ms ease;
    }

    /* ── Chart Legend ── */
    .live-chart-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 8px 12px;
      border-top: 1px solid var(--line);
      background: var(--surface);
    }

    .live-legend-item {
      min-height: 28px;
      padding: 0 9px;
      border: 1px solid transparent;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--ink);
      background: transparent;
      font-size: 11px;
      font-weight: 640;
      transition: background 160ms ease, border-color 160ms ease, opacity 160ms ease;
      cursor: pointer;
    }

    .live-legend-item:hover {
      background: #ffffff;
      border-color: var(--line);
    }

    .live-legend-item.toggled-off {
      opacity: 0.45;
    }

    .live-legend-item.active {
      border-color: var(--line-strong);
      background: #ffffff;
      box-shadow: var(--shadow-xs);
    }

    .live-legend-color {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      flex-shrink: 0;
    }

    .empty-figure {
      width: min(560px, 84%);
      min-height: 300px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: #ffffff;
      display: grid;
      place-items: center;
      color: var(--muted);
      box-shadow: var(--shadow-sm);
    }

    .figure-bar {
      position: absolute;
      left: 18px;
      bottom: 16px;
      right: 18px;
      min-height: 44px;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.86);
      display: flex;
      align-items: center;
      gap: 6px;
      overflow-x: auto;
      z-index: 10;
    }

    .figure-list {
      min-width: 0;
      min-height: 0;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.84);
      display: grid;
      align-content: start;
      gap: 8px;
      overflow: auto;
    }

    .figure-tab {
      min-width: 34px;
      height: 32px;
      border-radius: 11px;
      padding: 0 10px;
      color: var(--muted);
      background: transparent;
      font-weight: 760;
    }

    .figure-tab.active,
    .figure-tab:hover {
      color: var(--ink);
      background: #ffffff;
      box-shadow: var(--shadow-sm);
    }

    .figure-list .figure-tab {
      width: 100%;
      min-width: 0;
      height: 38px;
    }

    .side-panel {
      min-width: 0;
      min-height: 0;
      padding: 12px 14px 16px 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 6px;
      overflow: hidden;
      background: var(--panel-bg);
    }

    .panel-head {
      min-height: 44px;
      border-bottom: 1px solid var(--line);
      display: grid;
      align-content: center;
      gap: 2px;
      padding: 4px 2px 10px;
    }

    .stage-name {
      color: var(--ink);
      font-size: 15px;
      font-weight: 700;
      line-height: 1.15;
    }

    .stage-status {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
    }

    .panel-body {
      min-width: 0;
      min-height: 0;
      overflow: auto;
      display: grid;
      align-content: start;
      gap: 0;
      padding-right: 2px;
      scroll-behavior: smooth;
    }

    .section {
      min-width: 0;
      border-top: 1px solid var(--line);
      background: transparent;
      padding: 14px 2px;
      display: grid;
      gap: 10px;
    }

    .panel-body .section:first-child {
      border-top: 0;
      padding-top: 8px;
    }

    .section-title {
      margin: 0;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .panel-row {
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 680;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .panel-value {
      color: var(--ink);
      font-size: 42px;
      font-weight: 700;
      text-transform: none;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 680;
    }

    .field input,
    .field select,
    .field textarea,
    .input,
    .select {
      width: 100%;
      min-height: 34px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      outline: none;
      background: var(--surface);
      color: var(--ink);
      font-size: 13px;
      transition: border-color 160ms ease, background 160ms ease, box-shadow 160ms ease;
    }

    .field textarea {
      min-height: 80px;
      padding: 10px;
      resize: vertical;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus,
    .input:focus,
    .select:focus {
      border-color: var(--green);
      background: #ffffff;
      box-shadow: 0 0 0 3px var(--green-soft);
    }

    .action-row,
    .option-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .experiment-current {
      min-width: 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #ffffff;
      display: grid;
      gap: 4px;
      text-align: left;
    }

    .experiment-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--ink);
      font-size: 18px;
      font-weight: 820;
    }

    .experiment-meta {
      color: var(--muted);
      font-size: 12px;
      font-weight: 680;
    }

    .experiment-family-list {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .experiment-family {
      min-height: 30px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: #ffffff;
      font-size: 12px;
      font-weight: 760;
    }

    .experiment-family.active,
    .experiment-family:hover {
      border-color: transparent;
      color: var(--green);
      background: var(--green-soft);
    }

    .experiment-type-list {
      display: grid;
      gap: 7px;
    }

    .experiment-type {
      min-width: 0;
      min-height: 42px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: #ffffff;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
      color: var(--ink);
      text-align: left;
      font-weight: 760;
    }

    .experiment-type.active,
    .experiment-type:hover {
      border-color: var(--green);
      background: #fbfffc;
    }

    .experiment-type-code {
      color: var(--quiet);
      font-size: 11px;
      font-weight: 760;
    }

    .inspector-tabs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
    }

    .inspector-tab {
      min-width: 0;
      min-height: 32px;
      border: 1px solid var(--line);
      border-radius: 11px;
      color: var(--muted);
      background: #ffffff;
      font-size: 12px;
      font-weight: 760;
    }

    .inspector-tab.active,
    .inspector-tab:hover {
      color: var(--ink);
      border-color: var(--line-strong);
      background: var(--surface);
    }

    .review-command-bar {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 7px;
    }

    .btn,
    .option {
      min-height: 34px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      color: var(--ink);
      background: #ffffff;
      font-weight: 720;
    }

    .btn.icon-only {
      min-height: 42px;
      justify-content: flex-start;
    }

    .btn:hover,
    .option:hover,
    .option.selected {
      border-color: var(--line-strong);
      background: #f8faf7;
    }

    .btn.primary {
      border-color: #111411;
      color: #ffffff;
      background: #111411;
    }

    .btn.warning {
      color: var(--orange);
      border-color: transparent;
      background: var(--orange-soft);
    }

    .btn:disabled,
    .option:disabled {
      color: var(--quiet);
      background: #edf0ed;
      cursor: not-allowed;
    }

    .hidden-input {
      display: none;
    }

    .file-list,
    .compact-list {
      display: grid;
      gap: 8px;
    }

    .file-row,
    .compact-row {
      min-width: 0;
      min-height: 42px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: #f8faf7;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
    }

    .row-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--ink);
      font-size: 13px;
      font-weight: 760;
    }

    .row-sub {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
      font-size: 12px;
    }

    .dropzone {
      min-height: 84px;
      border: 1px dashed var(--line-strong);
      border-radius: 16px;
      background: #fbfcf8;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 13px;
    }

    .quiet-line {
      min-height: 34px;
      display: flex;
      align-items: center;
      color: var(--quiet);
      font-size: 13px;
    }

    .dropzone.dragover {
      border-color: var(--green);
      color: var(--green);
      background: var(--green-soft);
    }

    .warning-box {
      padding: 10px 12px;
      border-radius: 14px;
      color: var(--orange);
      background: var(--orange-soft);
      font-size: 13px;
      line-height: 1.4;
    }

    .codex-panel {
      border-color: transparent;
      background: var(--orange-soft);
    }

    .canvas-tooltip {
      position: absolute;
      left: 18px;
      top: 16px;
      z-index: 5;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-width: min(620px, 70%);
    }

    @media (max-width: 1100px) {
      .app-shell {
        grid-template-columns: 64px minmax(0, 1fr);
      }

      .side-panel {
        position: fixed;
        right: 12px;
        top: 82px;
        bottom: 14px;
        width: min(330px, calc(100vw - 88px));
        padding: 0;
        z-index: 20;
      }

      .side-panel.collapsed {
        display: none;
      }
    }

    @media (max-width: 720px) {
      body { overflow: auto; }

      .app-shell {
        min-height: 100vh;
        height: auto;
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
        overflow: visible;
      }

      .stage-rail {
        grid-template-columns: auto 1fr auto;
        grid-template-rows: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .stage-stack {
        grid-auto-flow: column;
        align-content: center;
        justify-content: center;
        overflow-x: auto;
      }

      .main-space {
        min-height: 72vh;
        grid-template-rows: auto minmax(560px, 1fr);
      }

      .topbar {
        grid-template-columns: 1fr;
      }

      .tool-strip {
        justify-self: stretch;
        overflow-x: auto;
      }

      .side-panel {
        position: static;
        width: auto;
        padding: 0 12px 16px;
      }

      .source-landing,
      .mapping-stage,
      .render-sheet {
        width: 88%;
        grid-template-columns: 1fr;
      }

      .source-drop {
        min-height: 360px;
      }

      .render-sheet {
        aspect-ratio: auto;
      }

      .source-title {
        font-size: 34px;
      }

      .mapping-header,
      .mapping-row {
        grid-template-columns: minmax(150px, 1.4fr) 64px 96px;
      }

      .mapping-header span:nth-child(4),
      .mapping-header span:nth-child(5),
      .mapping-row > span:nth-child(4),
      .mapping-row > span:nth-child(5) {
        display: none;
      }

      .review-map {
        grid-template-columns: 1fr;
        padding: 24px;
      }
    }

    /* ── Project Browser Modal ── */
    .project-browser-overlay {
      position: fixed;
      inset: 0;
      z-index: 2000;
      background: rgba(26, 26, 24, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.12s var(--ease-out);
    }

    .project-browser-overlay.hidden {
      display: none;
    }

    .project-browser {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      width: min(560px, calc(100vw - 48px));
      max-height: min(520px, calc(100vh - 120px));
      display: flex;
      flex-direction: column;
      animation: scaleIn 0.18s var(--ease-spring);
    }

    .project-browser-header {
      padding: 18px 22px 6px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--line);
    }

    .project-browser-header input {
      flex: 1;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      font-size: 14px;
      background: var(--canvas-bg);
      color: var(--ink);
      outline: none;
    }

    .project-browser-header input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px var(--blue-soft);
    }

    .project-browser-header button {
      padding: 8px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      background: var(--line);
      color: var(--muted);
    }

    .project-browser-header button:hover {
      background: var(--line-strong);
      color: var(--ink);
    }

    .project-browser-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 16px 16px;
    }

    .project-browser-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.1s;
    }

    .project-browser-row:hover {
      background: var(--canvas-bg);
    }

    .project-browser-row-meta {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .project-browser-row-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .project-browser-row-info {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .project-browser-row-chip {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 6px;
      background: var(--canvas-bg);
      color: var(--muted);
      white-space: nowrap;
    }

    .project-browser-row-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .project-browser-row-arrow {
      color: var(--quiet);
      flex-shrink: 0;
    }

    .project-browser-empty {
      text-align: center;
      padding: 40px 16px;
      color: var(--muted);
      font-size: 14px;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }

    /* ── Data Table Preview ── */
    .data-table-preview {
      margin-top: 8px;
      overflow-x: auto;
      max-height: 160px;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--canvas-bg);
    }

    .data-table-preview table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }

    .data-table-preview th {
      padding: 4px 8px;
      text-align: left;
      font-weight: 500;
      color: var(--muted);
      border-bottom: 1px solid var(--line);
      white-space: nowrap;
      position: sticky;
      top: 0;
      background: var(--canvas-bg);
    }

    .data-table-preview td {
      padding: 2px 8px;
      color: var(--ink);
      white-space: nowrap;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <div class="app-shell" id="appShell">
    <aside class="stage-rail" aria-label="Stages">
      <div class="mark" title="SciPlot" aria-label="SciPlot">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 16.5h14M7 14c2.4-5.4 4.5-6.4 6.5-2.8 1.8 3.2 3.4 2.6 5.5-3.2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </div>
      <nav class="stage-stack" id="stageNav"></nav>
      <div class="status-strip">
        <span class="status-light" id="statusLight" title="Ready"></span>
      </div>
    </aside>

    <main class="main-space">
      <header class="topbar">
        <input id="projectName" class="project-input" value="SciPlot project" aria-label="Project name">
        <div class="tool-strip" aria-label="Canvas tools">
          <button class="icon-button active" type="button" data-canvas-tool="select" title="Select" aria-label="Select">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 4l11 7-5 1.3 3.1 5.4-2.4 1.4-3.1-5.4-3.6 3.7V4Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
          </button>
          <button class="icon-button" type="button" data-canvas-tool="pan" title="Pan" aria-label="Pan">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v18M3 12h18M7 7l-4 5 4 5M17 7l4 5-4 5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button class="icon-button" type="button" data-canvas-tool="zoom" title="Zoom" aria-label="Zoom">
            <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="10.5" cy="10.5" r="5.5" fill="none" stroke="currentColor" stroke-width="2"/><path d="m15 15 5 5M10.5 8v5M8 10.5h5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
          <input id="zoomRange" class="zoom-range" type="range" min="70" max="160" value="100" aria-label="Zoom">
          <button class="icon-button" type="button" id="fitButton" title="Fit" aria-label="Fit">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 4H4v4M16 4h4v4M8 20H4v-4M16 20h4v-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
        </div>
        <button id="primaryAction" class="primary-action" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Continue</span>
        </button>
      </header>

      <section class="canvas-zone">
        <div id="visualCanvas" class="visual-canvas" aria-label="SciPlot canvas"></div>
      </section>
    </main>

    <aside class="side-panel" id="sidePanel">
      <div class="panel-head">
        <div class="stage-name" id="panelTitle">Start</div>
        <div class="stage-status" id="panelStatus">Ready</div>
      </div>
      <div class="panel-body" id="panelBody"></div>
    </aside>
  </div>

  <!-- Project Browser Modal -->
  <div class="project-browser-overlay hidden" id="projectBrowserOverlay">
    <div class="project-browser">
      <div class="project-browser-header">
        <input id="projectBrowserSearch" type="text" placeholder="搜索项目..." autocomplete="off">
        <button id="projectBrowserClose" type="button">取消</button>
      </div>
      <div class="project-browser-list" id="projectBrowserList"></div>
    </div>
  </div>

  <script>
    const stageOrder = ["import", "mapping", "generate", "review"];
    const stageMeta = {
      import: { label: "Start", title: "Start", icon: "folder" },
      mapping: { label: "Map", title: "Map", icon: "map" },
      generate: { label: "Render", title: "Render", icon: "play" },
      review: { label: "Review", title: "Review", icon: "figure" }
    };

    const figureSizeOptions = [
      { value: "60x55", label: "60 x 55 mm" },
      { value: "120x55", label: "120 x 55 mm" },
      { value: "180x55", label: "180 x 55 mm" },
      { value: "60x110", label: "60 x 110 mm" },
      { value: "120x110", label: "120 x 110 mm" },
      { value: "180x110", label: "180 x 110 mm" }
    ];

    const exportOptions = [
      { value: "pdf", label: "PDF" },
      { value: "tiff_300", label: "TIFF 300" },
      { value: "png_300", label: "PNG 300" }
    ];

    const replicateModeOptions = [
      { value: "mean", label: "Mean" },
      { value: "representative", label: "Best" },
      { value: "individual", label: "All" }
    ];

    const scaleOptions = [
      { value: "", label: "Auto" },
      { value: "linear", label: "Linear" },
      { value: "log", label: "Log" }
    ];

    const legendPositionOptions = [
      { value: "", label: "Auto" },
      { value: "upper_right", label: "Upper right" },
      { value: "upper_left", label: "Upper left" },
      { value: "lower_right", label: "Lower right" },
      { value: "lower_left", label: "Lower left" }
    ];

    const labelModeOptions = [
      { value: "", label: "Auto" },
      { value: "legend", label: "Legend" },
      { value: "inline", label: "Inline" }
    ];

    const numericRenderOptionKeys = new Set(["x_min", "x_max", "y_min", "y_max"]);

    const markerOptions = [
      { value: "", label: "Auto" },
      { value: "circle", label: "Circle" },
      { value: "square", label: "Square" },
      { value: "triangle", label: "Triangle" },
      { value: "diamond", label: "Diamond" },
      { value: "x", label: "X" },
      { value: "plus", label: "Plus" },
      { value: "none", label: "None" }
    ];

    const tickDensityOptions = [
      { value: "", label: "Auto" },
      { value: "dense", label: "Dense" },
      { value: "sparse", label: "Sparse" }
    ];

    const stylePresetOptions = [
      { value: "", label: "Auto" },
      { value: "nature", label: "Nature" },
      { value: "acs", label: "ACS" },
      { value: "science", label: "Science" },
      { value: "wiley", label: "Wiley" },
      { value: "elsevier", label: "Elsevier" }
    ];

    const palettePresetOptions = [
      { value: "", label: "Auto" },
      { value: "colorblind_safe", label: "Colorblind safe" },
      { value: "vibrant", label: "Vibrant" },
      { value: "muted", label: "Muted" },
      { value: "pastel", label: "Pastel" },
      { value: "dark", label: "Dark" }
    ];

    const reviewInspectorTabs = [
      { value: "page", label: "Page" },
      { value: "axes", label: "Axes" },
      { value: "series", label: "Series" },
      { value: "legend", label: "Legend" },
      { value: "export", label: "Export" }
    ];

    const state = {
      stage: "import",
      projectName: "SciPlot project",
      catalog: [],
      dataTypeId: "",
      experimentTypeId: "",
      groups: [{ sample: "Sample 1", files: [] }],
      activeGroup: 0,
      activePreviewKey: "",
      tablePreviews: {},
      columnConfirmations: {},
      previewLoading: {},
      previewErrors: {},
      plotOutput: "runs/run_001",
      exports: ["pdf", "tiff_300"],
      figureSize: "60x55",
      replicateMode: "mean",
      experimentTouched: false,
      showAdvancedMapping: false,
      activeInspectorTab: "page",
      lastProject: null,
      projectStatus: null,
      activeFigure: 0,
      refineOptions: {},
      refineDirty: false,
      livePreviewBusy: false,
      previewInFlight: false,
      rerunInFlight: false,
      livePreviewQueued: false,
      activeSeries: "",
      statusText: "Ready",
      error: "",
      canvasTool: "select",
      selectedNode: "data",
      zoom: 1,
      panX: 0,
      panY: 0,
      fileSequence: 0
    };

    let livePreviewTimer = null;
    let liveChartModel = null;

    const appShell = document.querySelector("#appShell");
    const stageNav = document.querySelector("#stageNav");
    const statusLight = document.querySelector("#statusLight");
    const projectNameEl = document.querySelector("#projectName");
    const panelTitle = document.querySelector("#panelTitle");
    const panelStatus = document.querySelector("#panelStatus");
    const panelBody = document.querySelector("#panelBody");
    const visualCanvas = document.querySelector("#visualCanvas");
    const primaryAction = document.querySelector("#primaryAction");
    const zoomRange = document.querySelector("#zoomRange");

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function icon(name) {
      const base = 'fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"';
      const paths = {
        folder: `<svg viewBox="0 0 24 24"><path ${base} d="M4 6.5h6l2 2h8v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-11Z"/></svg>`,
        map: `<svg viewBox="0 0 24 24"><path ${base} d="M4 7l5-2 6 2 5-2v12l-5 2-6-2-5 2V7Z"/><path ${base} d="M9 5v12M15 7v12"/></svg>`,
        play: `<svg viewBox="0 0 24 24"><path ${base} d="M8 5v14l11-7-11-7Z"/></svg>`,
        figure: `<svg viewBox="0 0 24 24"><path ${base} d="M5 19h14M6 16c3.4-8 6.2-9 8.7-3.2 1.4 3.3 2.8 2.7 4.3-2.8"/></svg>`,
        upload: `<svg viewBox="0 0 24 24"><path ${base} d="M12 16V4M7 9l5-5 5 5M5 20h14"/></svg>`,
        plus: `<svg viewBox="0 0 24 24"><path ${base} d="M12 5v14M5 12h14"/></svg>`,
        trash: `<svg viewBox="0 0 24 24"><path ${base} d="M5 7h14M10 11v6M14 11v6M8 7l1-3h6l1 3M7 7l1 13h8l1-13"/></svg>`,
        arrow: `<svg viewBox="0 0 24 24"><path ${base} d="M5 12h14M13 6l6 6-6 6"/></svg>`,
        download: `<svg viewBox="0 0 24 24"><path ${base} d="M12 4v10M8 10l4 4 4-4M5 20h14"/></svg>`,
        reset: `<svg viewBox="0 0 24 24"><path ${base} d="M4 12a8 8 0 1 0 3-6.2M4 5v6h6"/></svg>`,
        codex: `<svg viewBox="0 0 24 24"><path ${base} d="M7 8h10M7 12h7M7 16h5"/><path ${base} d="M5 4h14v16H5z"/></svg>`,
        grip: `<svg viewBox="0 0 24 24"><path ${base} d="M9 6h.01M15 6h.01M9 12h.01M15 12h.01M9 18h.01M15 18h.01"/></svg>`
      };
      return paths[name] || paths.figure;
    }

    function formatSize(value) {
      const bytes = Number(value || 0);
      if (!Number.isFinite(bytes) || bytes <= 0) return "";
      if (bytes < 1024) return `${bytes} B`;
      if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
      return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
    }

    function currentDataType() {
      return state.catalog.find((item) => item.id === state.dataTypeId) || state.catalog[0] || null;
    }

    function currentExperiment() {
      const dataType = currentDataType();
      const experiments = dataType?.experiments || [];
      return experiments.find((item) => item.id === state.experimentTypeId) || experiments[0] || null;
    }

    function visibleGroups() {
      return state.groups.filter((group) => group.sample.trim() && group.files.length);
    }

    function sampleSummary() {
      const samples = visibleGroups().length;
      const files = allDataFiles().length;
      if (!files) return "Name samples";
      return `${samples} sample${samples === 1 ? "" : "s"} / ${files} file${files === 1 ? "" : "s"}`;
    }

    function replicateModeLabel() {
      return replicateModeOptions.find((item) => item.value === state.replicateMode)?.label || "Mean";
    }

    function allDataFiles() {
      const items = [];
      state.groups.forEach((group, groupIndex) => {
        (group.files || []).forEach((file, fileIndex) => {
          items.push({ group, groupIndex, file, fileIndex, key: fileKey(file) });
        });
      });
      return items;
    }

    function fileKey(file) {
      if (!file.preview_id) {
        state.fileSequence += 1;
        file.preview_id = `file:${state.fileSequence}:${file.name || "data"}`;
      }
      return file.preview_id;
    }

    function activePreviewItem() {
      const items = allDataFiles();
      if (!items.length) return null;
      return items.find((item) => item.key === state.activePreviewKey) || items[0];
    }

    function setStage(stage) {
      state.stage = stage;
      if (stage !== "review") resetCanvasView();
      render();
      if (stage === "mapping") queueActivePreviewLoad();
    }

    function stageReadiness(stage) {
      if (stage === "import") return allDataFiles().length ? "ready" : "";
      if (stage === "mapping") return visibleGroups().length ? "ready" : "";
      if (stage === "generate") return canRender() ? "ready" : "";
      if (stage === "review") return hasRenderedArtifacts() ? "ready" : "";
      return "";
    }

    function hasRenderedArtifacts() {
      return resultFigures().length > 0 || Boolean(state.projectStatus?.preview_figure?.exists);
    }

    function canRender() {
      return visibleGroups().length > 0 && state.exports.length > 0;
    }

    function validFigureSize(value) {
      return figureSizeOptions.some((item) => item.value === value);
    }

    function selectedFigureSize() {
      return validFigureSize(state.figureSize) ? state.figureSize : "60x55";
    }

    function setStatus(text, error = "") {
      state.statusText = text || "Ready";
      state.error = error || "";
      updateChrome();
    }

    function updateChrome() {
      projectNameEl.value = state.projectName;
      const meta = stageMeta[state.stage];
      panelTitle.textContent = meta.title;
      panelStatus.textContent = state.error || state.statusText || "Ready";
      statusLight.classList.toggle("warn", Boolean(state.error || state.projectStatus?.needs_codex || state.lastProject?.run_failed));
      primaryAction.disabled = primaryDisabled();
      primaryAction.querySelector("span").textContent = primaryLabel();
      primaryAction.style.visibility = state.stage === "review" ? "hidden" : "visible";
      renderStageNav();
      const toolStrip = document.querySelector(".tool-strip");
      if (toolStrip) toolStrip.classList.toggle("visible", false);
    }

    function primaryDisabled() {
      if (state.stage === "import") return allDataFiles().length === 0;
      if (state.stage === "mapping") return visibleGroups().length === 0;
      if (state.stage === "generate") return !canRender() || state.rerunInFlight;
      if (state.stage === "review") return !state.lastProject?.project_slug || state.rerunInFlight;
      return false;
    }

    function primaryLabel() {
      if (state.stage === "import") return "Map";
      if (state.stage === "mapping") return "Render";
      if (state.stage === "generate") return state.lastProject?.project_slug ? "Export" : "Render";
      if (state.stage === "review") return "Export";
      return "Continue";
    }

    function renderStageNav() {
      const items = stageOrder.map((stage, index) => {
        const isActive = state.stage === stage;
        const isPast = stageOrder.indexOf(state.stage) > index;
        const readiness = stageReadiness(stage);
        const connector = index < stageOrder.length - 1
          ? `<span class="stage-connector ${isPast ? "done" : ""}"></span>`
          : "";
        return `
          <div class="stage-item ${isActive ? "active" : ""}">
            <button class="stage-button ${isActive ? "active" : ""}" type="button" data-stage="${stage}" title="${stageMeta[stage].title}" aria-label="${stageMeta[stage].title}">
              ${icon(stageMeta[stage].icon)}
            </button>
            <span class="stage-dot ${readiness}"></span>
            <span class="stage-label">${stageMeta[stage].label}</span>
            ${connector}
          </div>
        `;
      });
      stageNav.innerHTML = items.join("");
      stageNav.querySelectorAll("[data-stage]").forEach((button) => {
        button.addEventListener("click", () => setStage(button.dataset.stage));
      });
    }

    function render() {
      updateChrome();
      panelBody.innerHTML = renderPanel();
      visualCanvas.innerHTML = renderCanvas();
      attachPanelHandlers();
      attachCanvasHandlers();
      updateCanvasTransform();
      animateStageEnter();
    }

    function animateStageEnter() {
      const board = document.querySelector("#visualBoard");
      if (!board) return;
      const staggerMap = {
        import: { selector: ".template-card", delay: 50, cls: "anim-enter" },
        mapping: { selector: ".mapping-row, .map-queue-card", delay: 45, cls: "anim-enter" },
        generate: { selector: ".figure-queue-row, .render-sheet", delay: 60, cls: "anim-enter" },
        review: { selector: ".figure-tab", delay: 40, cls: "anim-enter-fast" }
      };
      const cfg = staggerMap[state.stage];
      if (!cfg) return;
      board.querySelectorAll(cfg.selector).forEach((el, index) => {
        el.classList.add(cfg.cls);
        el.style.animationDelay = `${index * cfg.delay}ms`;
      });
    }

    function renderPanel() {
      if (state.stage === "import") return renderStartPanel();
      if (state.stage === "mapping") return renderMappingPanel();
      if (state.stage === "generate") return renderGeneratePanel();
      if (state.stage === "review") return renderReviewPanel();
      return "";
    }

    function renderCanvas() {
      return `<div class="visual-board" id="visualBoard">${renderCanvasBoard()}</div>`;
    }

    function renderCanvasBoard() {
      if (state.stage === "import") return renderStartCanvas();
      if (state.stage === "mapping") return renderMappingCanvas();
      if (state.stage === "generate") return renderGenerateCanvas();
      if (state.stage === "review") return renderReviewCanvas();
      return "";
    }

    function renderStartCanvas() {
      const files = allDataFiles();
      const fileCount = files.length;
      const detectedFamilyId = state.dataTypeId;
      return `
        <div class="flow-map">
          <div class="start-stage">
            <div class="template-grid" id="templateGrid">
              ${renderStartCards()}
            </div>
            <div class="drop-strip ${fileCount ? "ready" : ""}" id="dropzone">
              <span class="drop-icon">${icon("upload")}</span>
              <span class="drop-hint">
                ${fileCount
                  ? `<strong>${fileCount} file${fileCount === 1 ? "" : "s"}</strong> — ${escapeHtml(files.slice(0, 3).map((item) => item.file.name).join(", "))}`
                  : "拖放文件到此处，或点击导入"}
              </span>
              <button class="drop-menu-btn" type="button" id="openProjectBtn" title="Open project" aria-label="Open project">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
              </button>
            </div>
          </div>
        </div>
      `;
    }

    function renderStartCards() {
      const catalog = state.catalog || [];
      const detectedId = state.dataTypeId;
      const files = allDataFiles();
      const hasFiles = files.length > 0;

      const familyColors = ["", "blue", "orange", "rose", "violet", "blue", "orange"];
      const familyIcons = {
        rheology: `<path d="M3 20h18M5 17c3-7 5-7 7-3 2 4 4 3 7-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>`,
        mechanical: `<path d="M6 4v16M12 4v16M18 4v16M4 8h16M4 16h16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>`,
        thermal: `<path d="M12 3v16M9 7c1-2 2-3 3-3s2 1 3 3-1 4-1 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>`,
        spectroscopy: `<path d="M3 17c3-6 5-8 7-5 2 3 4 2 7-5 3-6 4-2 4 2" fill="none" stroke="currentColor" stroke-width="2"/>`,

          `<path d="M6 4v16M12 4v16M18 4v16M4 8h16M4 16h16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>`,
          `<path d="M12 3v16M9 7c1-2 2-3 3-3s2 1 3 3-1 4-1 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>`,
          `<path d="M3 17c3-6 5-8 7-5 2 3 4 2 7-5 3-6 4-2 4 2" fill="none" stroke="currentColor" stroke-width="2"/>`,
          `<path d="M4 19h16M6 15c2-4 4-5 5-3 1 2 3 2 5-3 2-5 3-2 4 2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>`,

              `).join("")}
            </g>
            <text class="chart-label" x="${(chart.left + chart.right) / 2}" y="${chart.height - 18}" text-anchor="middle">${escapeHtml(chart.xLabel)}</text>

                <text id="chartTooltipText1" x="12" y="20" fill="#ffffff" font-size="11" font-weight="640"></text>
                <text id="chartTooltipText2" x="12" y="39" fill="#a8a6a0" font-size="11"></text>
