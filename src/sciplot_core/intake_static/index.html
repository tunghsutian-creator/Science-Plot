<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SciPlot Studio</title>
  <style>
	    :root {
	      color-scheme: light;
	      --bg: #f4f6f8;
	      --window: #f4f6f8;
	      --chrome: rgba(255, 255, 255, 0.78);
	      --chrome-2: #eef1f4;
	      --panel: #ffffff;
	      --panel-strong: #f8fafc;
	      --line: #e3e7ee;
	      --line-strong: #9cc6ff;
	      --text: #111827;
	      --muted: #6b7280;
	      --quiet: #a2aab5;
	      --accent: #2563eb;
	      --accent-2: #2563eb;
	      --accent-soft: #edf4ff;
	      --warning: #a16207;
	      --warning-soft: #fef3c7;
	      --success: #15803d;
	      --danger: #dc2626;
	      --shadow: 0 12px 36px rgba(15, 23, 42, 0.08);
	      --shadow-soft: 0 6px 18px rgba(15, 23, 42, 0.05);
	      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
	    }

    * { box-sizing: border-box; }

	    body {
	      margin: 0;
	      min-height: 100vh;
	      color: var(--text);
	      background: var(--bg);
	      letter-spacing: 0;
	      overflow: hidden;
	    }

    button, input, textarea { font: inherit; }

    button {
      border: 0;
      cursor: pointer;
    }

    a {
      color: var(--accent-2);
      text-decoration: none;
    }

	    .app {
	      width: 100vw;
	      height: 100vh;
	      min-height: 100vh;
	      margin: 0;
	      display: grid;
	      grid-template-columns: 72px minmax(0, 1fr);
	      border: 0;
	      border-radius: 0;
	      overflow: hidden;
	      background: var(--window);
	      box-shadow: none;
	    }

    .app.studio-result-mode {
      grid-template-columns: 72px minmax(0, 1fr);
    }

    .inspector,
    .app.studio-result-mode .inspector {
      display: none;
    }

	    .app.studio-result-mode .workspace {
	      grid-template-rows: 52px minmax(0, 1fr);
	    }

	    .app.studio-result-mode .canvas {
	      padding: 0;
	      overflow: hidden;
	      display: block;
	    }

	    .app.studio-result-mode .footer {
	      display: none;
	    }

	    .app.studio-result-mode .footer-actions {
	      display: none;
	    }

	    .rail {
	      min-width: 0;
	      min-height: 0;
	      padding: 14px 10px;
	      border-right: 1px solid var(--line);
	      background: rgba(255, 255, 255, 0.72);
	      backdrop-filter: blur(18px);
	      display: grid;
	      grid-template-rows: auto auto 1fr auto;
	      gap: 18px;
	      color: var(--text);
	    }

    .traffic {
      display: flex;
      justify-content: center;
      gap: 8px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ff5f57;
    }

    .dot:nth-child(2) { background: #ffbd2e; }
    .dot:nth-child(3) { background: #28c840; }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      min-height: 42px;
      font-size: 0;
      font-weight: 760;
    }

    .brand span { display: none; }

	    .brand-mark {
	      width: 38px;
	      height: 38px;
	      border-radius: 10px;
	      color: white;
	      display: grid;
	      place-items: center;
		      background: var(--text);
		      box-shadow: none;
	    }

    .nav {
      display: grid;
      gap: 8px;
      align-content: start;
      grid-auto-rows: min-content;
      justify-items: center;
    }

	    .nav-button {
	      width: 44px;
	      min-height: 44px;
	      padding: 0;
	      border-radius: 12px;
	      color: var(--muted);
	      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      text-align: center;
      font-weight: 660;
    }

	    .nav-index,
	    .nav-icon {
	      width: 28px;
	      height: 28px;
	      border-radius: 10px;
	      display: grid;
	      place-items: center;
	      color: var(--muted);
	      background: transparent;
	      font-size: 12px;
	      font-weight: 760;
	    }

	    .nav-icon svg {
	      width: 17px;
	      height: 17px;
	      display: block;
	    }

    .nav-label {
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      display: none;
    }

	    .nav-button.active {
	      color: var(--text);
	      background: #ffffff;
		      box-shadow: inset 0 0 0 1px rgba(37, 99, 235, 0.14);
	    }

	    .nav-button.active .nav-index,
	    .nav-button.active .nav-icon {
	      color: #ffffff;
	      background: var(--accent);
	    }

	    .workspace {
	      min-width: 0;
	      min-height: 0;
	      display: grid;
	      grid-template-rows: 52px minmax(0, 1fr) 44px;
	      background: var(--window);
	    }

    .banner {
      margin: 14px 22px 0;
      padding: 11px 14px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 14px;
      font-weight: 600;
    }

    .banner[hidden] { display: none; }

    .banner.error {
      color: var(--danger);
      background: #fef3f2;
      border: 1px solid rgba(179, 38, 30, 0.28);
    }

    .banner.busy {
      color: var(--accent);
      background: var(--accent-soft);
      border: 1px solid var(--line-strong);
    }

    .banner-dismiss {
      min-width: 24px;
      height: 24px;
      border-radius: 7px;
      color: inherit;
      background: rgba(0, 0, 0, 0.06);
      font-weight: 800;
      line-height: 1;
    }

    .spinner {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid currentColor;
      border-right-color: transparent;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

	    .topbar {
	      padding: 0 18px 0 20px;
	      border-bottom: 1px solid var(--line);
	      display: flex;
	      align-items: center;
      gap: 14px;
      justify-content: space-between;
    }

    .title-wrap {
      min-width: 0;
      display: grid;
      gap: 0;
    }

    .eyebrow {
      color: var(--muted);
      font-size: 12px;
      font-weight: 720;
      letter-spacing: 0;
    }

    .title-wrap .eyebrow { display: none; }

	    h1 {
	      margin: 0;
	      font-size: 15px;
	      line-height: 1.1;
	      letter-spacing: 0;
	      font-weight: 760;
	    }

	    .project-name {
	      width: min(360px, 44vw);
	      height: 34px;
	      padding: 0 12px;
	      border: 1px solid var(--line);
	      border-radius: 10px;
	      color: var(--text);
	      background: rgba(255, 255, 255, 0.84);
	      outline: none;
	      box-shadow: 0 8px 20px rgba(26, 34, 47, 0.04);
	    }

    .project-name:focus,
    .field-input:focus,
    .sample-input:focus,
    textarea:focus {
      border-color: var(--line-strong);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

	    .canvas {
	      min-height: 0;
	      padding: 18px 20px;
	      overflow: auto;
	      display: grid;
	      gap: 16px;
	      align-content: start;
	    }

	    .canvas-grid {
	      display: grid;
	      grid-template-columns: minmax(0, 1fr) minmax(260px, 0.42fr);
	      gap: 14px;
	      align-items: start;
	    }

	    .source-stage {
	      display: grid;
	      grid-template-columns: minmax(260px, 0.34fr) minmax(0, 1fr);
	      gap: 16px;
	      align-items: start;
	    }

	    .source-summary {
	      display: grid;
	      gap: 12px;
	      position: sticky;
	      top: 0;
	    }

	    .source-summary .metric-row {
	      grid-template-columns: 1fr;
	    }

	    .inspect-stage {
	      min-height: min(720px, calc(100vh - 120px));
	      display: grid;
	      grid-template-columns: minmax(260px, 0.38fr) minmax(0, 1fr);
	      gap: 16px;
	      align-items: stretch;
	    }

	    .inspect-current {
	      min-height: 100%;
	      padding: 22px;
	      border: 1px solid rgba(255, 255, 255, 0.44);
	      border-radius: 18px;
	      color: #ffffff;
		      background: #1f2937;
	      display: grid;
	      grid-template-columns: 1fr;
	      grid-template-rows: minmax(180px, 1fr) auto auto;
	      gap: 16px;
	      align-items: end;
	      overflow: hidden;
	      position: relative;
	      box-shadow: var(--shadow-soft);
	    }

	    .inspect-symbol {
	      align-self: stretch;
		      min-height: 220px;
		      color: rgba(255, 255, 255, 0.82);
		      transform: translateX(-4%);
		      filter: none;
		    }

    .inspect-symbol svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .inspect-current-main {
      min-width: 0;
      display: grid;
      gap: 8px;
    }

	    .inspect-kicker {
	      width: max-content;
	      max-width: 100%;
	      padding: 4px 8px;
	      border-radius: 999px;
	      color: #dffaf5;
	      background: rgba(255, 255, 255, 0.16);
	      font-size: 12px;
	      font-weight: 760;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

	    .inspect-current-title {
	      overflow: hidden;
	      overflow-wrap: anywhere;
	      white-space: normal;
	      text-overflow: ellipsis;
	      font-size: clamp(28px, 3vw, 44px);
	      line-height: 1.05;
	      font-weight: 800;
	    }

	    .status-dot {
	      position: absolute;
	      right: 18px;
	      top: 18px;
	      width: 12px;
	      height: 12px;
	      border-radius: 50%;
	      background: #44d483;
	      box-shadow: 0 0 0 7px rgba(68, 212, 131, 0.18);
	      animation: statusPulse 2.4s ease-in-out infinite;
	    }

	    .inspect-grid {
	      grid-template-columns: repeat(auto-fit, minmax(172px, 1fr));
	      align-content: start;
	    }

	    .panel {
	      border: 1px solid var(--line);
	      border-radius: 14px;
	      background: rgba(255, 255, 255, 0.84);
	      overflow: hidden;
	      box-shadow: 0 10px 26px rgba(26, 34, 47, 0.04);
	    }

    .panel .panel {
      border-radius: 0;
      border: 0;
      background: transparent;
      overflow: visible;
    }

	    .panel-head {
	      min-height: 42px;
	      padding: 0 14px;
	      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-weight: 720;
	      background: rgba(245, 247, 250, 0.76);
	    }

    .panel-body {
      padding: 14px;
      display: grid;
      gap: 12px;
    }

	    .result-stage {
	      min-height: 420px;
	      border-radius: 16px;
	      border: 1px solid var(--line);
	      background: #fff;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .result-stage iframe,
    .result-stage object {
      width: 100%;
      height: 100%;
      min-height: 420px;
      border: 0;
      background: #fff;
    }

	    .webagg-frame {
	      width: 100%;
	      height: 100%;
	      min-height: 100%;
	      border: 0;
	      background: #fff;
	    }

	    .figure-stage {
	      min-height: 520px;
	      padding: 18px;
	      position: relative;
	      display: flex;
	      align-items: center;
	      justify-content: center;
	      transition: box-shadow 0.22s ease, transform 0.22s ease;
	    }

	    .figure-stage.rendering::after {
	      content: "";
	      position: absolute;
	      inset: 0;
	      background: rgba(255, 255, 255, 0.62);
	      pointer-events: none;
	      animation: renderWash 1.4s ease-in-out infinite alternate;
	    }

	    .figure-preview-img {
	      display: block;
	      width: auto;
	      height: auto;
	      max-width: 100%;
	      max-height: 100%;
	      min-width: 0;
	      min-height: 0;
	      transition: transform 0.28s ease, filter 0.28s ease;
	    }

	    .figure-stage:hover .figure-preview-img {
	      transform: scale(1.005);
	      filter: contrast(1.02);
	    }

	    .figure-stage.zoomed .figure-preview-img {
	      transform: scale(1.07);
	    }

	    .figure-stage.axes-focus {
		      box-shadow: inset 0 0 0 1px rgba(37, 99, 235, 0.22);
	    }

	    .figure-stage.legend-focus .figure-preview-img {
	      filter: saturate(1.12) contrast(1.04);
	    }

    .figure-stage object {
      min-height: 520px;
    }

	    .app.studio-result-mode .figure-stage {
	      height: 100%;
	      min-height: 0;
	      padding: 0;
	      border-color: transparent;
	      box-shadow: none;
	    }

    .artifact-row-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 220px), 1fr));
      gap: 8px;
    }

    .artifact-row-grid.compact {
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 150px), 1fr));
    }

	    .tool-button {
	      width: 34px;
	      height: 34px;
	      min-width: 0;
	      min-height: 0;
	      padding: 0;
	      border-radius: 10px;
	      color: var(--muted);
	      background: transparent;
	      display: grid;
	      place-items: center;
	      font-size: 13px;
	      font-weight: 800;
	    }

	    .tool-button svg {
	      width: 17px;
	      height: 17px;
	      display: block;
	    }

	    .tool-button.active,
	    .tool-button:hover {
	      color: var(--text);
	      background: #ffffff;
		      box-shadow: inset 0 0 0 1px var(--line);
	    }

	    .figure-tabs {
	      min-width: 0;
	      display: flex;
	      align-items: center;
	      gap: 8px;
	      overflow: auto;
	    }

	    .figure-tab {
	      width: 28px;
	      height: 28px;
	      min-width: 28px;
	      min-height: 28px;
	      padding: 0;
	      border-radius: 999px;
	      color: var(--muted);
	      background: #ffffff;
	      border: 1px solid rgba(132, 146, 166, 0.24);
	      display: inline-flex;
	      justify-content: center;
	      align-items: center;
	      gap: 6px;
	      font-size: 12px;
	      font-weight: 760;
	      white-space: nowrap;
	    }

	    .figure-tab svg {
	      display: none;
	    }

	    .figure-tab.active {
	      color: var(--text);
		      border-color: rgba(37, 99, 235, 0.22);
	      background: var(--accent-soft);
	    }

	    .studio-shell {
	      height: 100%;
	      min-height: 0;
	      padding: 12px;
	      display: grid;
	      grid-template-columns: minmax(560px, 1fr) 320px;
	      grid-template-rows: minmax(0, 1fr) auto;
	      grid-template-areas:
	        "canvas sidecar"
	        "tabs sidecar";
	      gap: 10px;
	      background: var(--bg);
	      overflow: hidden;
	    }

	    .studio-canvas {
	      grid-area: canvas;
	      min-width: 0;
	      min-height: 0;
	      position: relative;
	      display: grid;
	      place-items: center;
	      overflow: hidden;
	    }

	    .studio-canvas .figure-stage {
	      width: min(100%, 780px);
	      height: min(100%, 650px);
	    }

	    .studio-main {
	      min-width: 0;
	      min-height: 0;
	      display: grid;
	      grid-template-rows: auto minmax(0, 1fr) auto;
	      gap: 12px;
	    }

	    .studio-titlebar,
	    .studio-filmstrip,
	    .studio-sidecar {
	      animation: studioFloatIn 0.32s ease both;
	    }

	    .studio-titlebar {
	      min-width: 0;
	      min-height: 38px;
	      padding: 0 4px;
	      border: 0;
	      border-radius: 0;
	      background: transparent;
	      box-shadow: none;
	      backdrop-filter: none;
	      display: flex;
	      align-items: center;
	      justify-content: space-between;
	      gap: 12px;
	    }

	    .studio-title {
	      min-width: 0;
	      display: grid;
	      gap: 2px;
	    }

	    .app.atelier-app.studio-result-mode .studio-titlebar {
	      display: none;
	    }

	    .app.atelier-app.studio-result-mode .studio-title {
	      display: none;
	    }

	    .studio-title strong,
	    .studio-title span {
	      min-width: 0;
	      overflow: hidden;
	      white-space: nowrap;
	      text-overflow: ellipsis;
	    }

	    .studio-title strong {
	      font-size: 15px;
	      font-weight: 800;
	    }

	    .studio-title span {
	      color: var(--muted);
	      font-size: 12px;
	      font-weight: 650;
	    }

	    .studio-actions {
	      display: flex;
	      align-items: center;
	      justify-content: flex-end;
	      gap: 8px;
	      flex-wrap: wrap;
	    }

	    .studio-board {
	      min-width: 0;
	      min-height: 0;
	      position: relative;
	      display: grid;
		      border: 1px solid rgba(148, 163, 184, 0.12);
		      border-radius: 16px;
		      background: #f8fafc;
		      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
	      overflow: hidden;
	      animation: studioFloatIn 0.42s ease both;
	    }

	    .studio-board .figure-stage {
	      width: 100%;
	      height: 100%;
	      border: 0;
	      border-radius: 0;
	      background: transparent;
	      box-shadow: none;
	    }

	    .app.atelier-app.studio-result-mode .result-stage {
	      border: 0;
	      border-radius: 0;
	      background: transparent;
	    }

	    .studio-tool-dock {
	      position: absolute;
	      z-index: 3;
	      left: 14px;
	      top: 14px;
	      display: grid;
	      gap: 7px;
	      padding: 7px;
		      border: 1px solid rgba(148, 163, 184, 0.16);
		      border-radius: 14px;
		      background: rgba(255, 255, 255, 0.88);
		      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.05);
		      backdrop-filter: blur(12px);
	      animation: studioFloatIn 0.34s ease both;
	    }

	    .studio-state-chip {
	      position: absolute;
	      z-index: 3;
	      right: 16px;
	      top: 16px;
	      width: 18px;
	      height: 18px;
	      padding: 0;
	      border-radius: 999px;
	      color: transparent;
	      background: rgba(255, 255, 255, 0.78);
	      border: 1px solid rgba(148, 163, 184, 0.16);
	      box-shadow: none;
	      display: inline-flex;
	      align-items: center;
	      justify-content: center;
	      gap: 7px;
	      font-size: 0;
	      font-weight: 760;
	      backdrop-filter: blur(8px);
	      animation: studioFloatIn 0.34s ease both;
	    }

	    .studio-state-chip::before {
	      content: "";
	      width: 6px;
	      height: 6px;
	      border-radius: 50%;
	      background: var(--success);
	      box-shadow: none;
	    }

	    .studio-filmstrip {
	      grid-area: tabs;
	      min-width: 0;
	      min-height: 40px;
	      padding: 4px 2px;
	      border: 0;
	      border-radius: 0;
	      background: transparent;
	      box-shadow: none;
	      backdrop-filter: none;
	      display: flex;
	      align-items: center;
	      justify-content: space-between;
	      gap: 10px;
	    }

	    .studio-filmstrip .figure-tabs {
	      flex: 1 1 auto;
	    }

	    .studio-sidecar {
	      grid-area: sidecar;
	      min-width: 0;
	      min-height: 0;
	      padding: 0 0 0 10px;
	      border: 0;
	      border-radius: 0;
	      background: transparent;
	      box-shadow: none;
	      backdrop-filter: none;
	      display: grid;
	      grid-template-rows: auto minmax(0, 1fr);
	      gap: 10px;
	      overflow: hidden;
	      animation-name: studioSlideIn;
	      animation-duration: 0.38s;
	    }

	    .studio-side-tabs {
	      display: grid;
	      grid-template-columns: repeat(4, minmax(0, 1fr));
	      gap: 4px;
	      padding: 3px;
	      border-radius: 12px;
	      background: rgba(241, 245, 249, 0.72);
	    }

	    .studio-side-tab {
	      min-height: 34px;
	      border-radius: 12px;
	      color: var(--muted);
	      background: transparent;
	      font-size: 0;
	      font-weight: 780;
	    }

	    .studio-side-tab svg {
	      width: 16px;
	      height: 16px;
	      display: block;
	      margin: auto;
	    }

	    .studio-side-tab.active {
	      color: var(--text);
	      background: #ffffff;
	      box-shadow: inset 0 0 0 1px rgba(148, 163, 184, 0.14);
	    }

	    .studio-side-body {
	      min-height: 0;
	      overflow: auto;
	      display: grid;
	      gap: 8px;
	      align-content: start;
	      padding-right: 2px;
	    }

	    .studio-section {
	      display: grid;
	      gap: 10px;
	      padding: 0 4px 12px;
	      border: 0;
	      border-bottom: 1px solid rgba(135, 148, 166, 0.18);
	      border-radius: 0;
	      background: transparent;
	    }

	    .studio-controls {
	      min-width: 0;
	      display: grid;
	      gap: 12px;
	      align-content: start;
	    }

	    .studio-controls .panel-head {
	      padding: 0 2px 4px;
	      min-height: 30px;
	      border-bottom: 0;
	      background: transparent;
	    }

	        grid-column: 1;
	      }

      .rail,
      .inspector { display: none; }

	      .canvas-grid,
	      .source-stage,
	      .inspect-current,
	      .inspect-stage,
	      .groups,
	      .metric-row,
	      .studio-shell,
	      .studio-mode,
	      .preview-toolbar,
	      .column-confirm-head,
	      .column-confirm-row { grid-template-columns: 1fr; }

	      .studio-shell {
	        height: auto;
	        min-height: 100%;
	        grid-template-columns: 1fr;
	        grid-template-areas:
	          "canvas"
	          "sidecar"
	          "tabs";
	        overflow: auto;
	      }

	      .studio-canvas {
	        min-height: 620px;
	      }

	      .studio-sidecar {
	        min-height: 320px;
	        padding: 0;
	      }

	      .studio-mode-canvas {
	        min-height: 420px;
	      }

	      .app.studio-result-mode .canvas {
	        overflow: auto;
	      }

      .workspace {
        grid-template-rows: auto minmax(0, 1fr) 60px;
      }

      .topbar {
        padding: 14px;
        align-items: stretch;
        flex-direction: column;
      }

	      .project-name {
	        width: 100%;
	      }

	      .command-bar {
	        top: 10px;
	        width: calc(100vw - 20px);
	        grid-template-columns: auto minmax(0, 1fr);
	      }

	      .command-bar .brand span,
	      .command-status {
	        display: none;
	      }

	      .command-bar .project-name {
	        grid-column: 1 / -1;
	      }

	      .mode-strip {
	        justify-content: flex-start;
	      }

	      .mode-strip .nav-label {
	        display: none;
	      }

	      .app.atelier-app .canvas {
	        padding: 112px 10px 74px;
	      }

	      .app.atelier-app.studio-result-mode .studio-shell {
	        padding: 112px 10px 74px;
	      }

	      .app.atelier-app.studio-result-mode .studio-shell {
	        height: 100vh;
	        grid-template-rows: minmax(0, 1fr) auto;
	        grid-template-areas:
	          "canvas"
	          "tabs";
	        overflow: hidden;
	      }

	      .app.atelier-app.studio-result-mode .studio-canvas {
	        min-height: 0;
	      }

	      .app.atelier-app.studio-result-mode .studio-canvas .figure-stage {
	        width: min(100%, 370px);
	        height: min(100%, 480px);
	      }

	      .app.atelier-app.studio-result-mode .studio-sidecar {
	        display: none;
	      }
	    }

	    @media (min-width: 1500px) {
	      .studio-shell {
	        grid-template-columns: minmax(640px, 1fr) minmax(360px, 420px);
	      }
	    }

	    @media (prefers-reduced-motion: reduce) {
	      *,
	      *::before,
	      *::after {
	        animation-duration: 0.01ms !important;
	        animation-iteration-count: 1 !important;
	        scroll-behavior: auto !important;
	        transition-duration: 0.01ms !important;
	      }
	    }
  </style>
</head>
<body>
  <main class="app atelier-app">
    <header class="command-bar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="19" height="19" fill="none">
            <path d="M5 17.5 10 9l4 5 5-8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
            <path d="M5 18h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
          </svg>
        </div>
        <span>SciPlot</span>
      </div>
      <nav class="nav mode-strip" id="railNav" aria-label="Studio modes"></nav>
      <input id="projectName" class="project-name" type="text" autocomplete="off" placeholder="Project name">
      <div class="command-status">
        <strong id="pageTitle">Source</strong>
        <span id="status" class="status-line"></span>
      </div>
    </header>

    <section class="canvas atelier-canvas" id="canvas"></section>

    <footer class="action-dock">
      <button id="backButton" class="btn" type="button">Back</button>
      <button id="nextButton" class="btn primary" type="button">Next</button>
    </footer>

    <aside class="inspector support-pane" id="inspector" hidden></aside>
  </main>

  <script>
    const state = {
      view: "Source",
      catalog: [],
      dataTypeId: "",
      experimentTypeId: "",
      groups: [
        { sample: "Sample A", files: [] },
        { sample: "Sample B", files: [] }
      ],
      activeGroup: 0,
      session: null,
      lastProject: null,
      projectStatus: null,
      codexJob: null,
      plotOutput: "runs/run_001",
      exports: ["pdf", "tiff_300"],
      figureSize: "120x55",
      refineOptions: {},
      refineDirty: false,
      livePreview: false,
      livePreviewTimer: null,
      livePreviewBusy: false,
	      livePreviewQueued: false,
	      previewInFlight: false,
	      rerunInFlight: false,
	      workbenchPreview: null,
	      workbenchChartSpec: null,
	      studioPanel: "style",
	      activeFigure: 0,
	      tablePreviews: {},
      columnConfirmations: {},
      previewLoading: {},
      previewErrors: {},
      activePreviewKey: "",
      fileSequence: 0,
      codexGoal: "",
      statusText: "",
      error: ""
    };

    const views = ["Source", "Inspect", "Samples", "Export", "Codex Runs"];

    const figureSizeOptions = [
      { value: "60x55", label: "60 x 55 mm" },
      { value: "120x55", label: "120 x 55 mm" },
      { value: "180x55", label: "180 x 55 mm" },
      { value: "60x110", label: "60 x 110 mm" },
      { value: "120x110", label: "120 x 110 mm" },
      { value: "180x110", label: "180 x 110 mm" }
    ];

    const exportOptions = [
      { value: "pdf", label: "PDF" },
      { value: "tiff_300", label: "TIFF 300 DPI" },
      { value: "png_300", label: "PNG 300 DPI" }
    ];

    const scaleOptions = [
      { value: "", label: "Auto" },
      { value: "linear", label: "Linear" },
      { value: "log", label: "Log" }
    ];

    const legendPositionOptions = [
      { value: "", label: "Auto" },
      { value: "upper_right", label: "Upper right" },
      { value: "upper_left", label: "Upper left" },
      { value: "lower_right", label: "Lower right" },
      { value: "lower_left", label: "Lower left" }
    ];

    const seriesLabelModeOptions = [
      { value: "", label: "Auto" },
      { value: "legend", label: "Legend" },
      { value: "inline", label: "Inline" }
    ];

    const tickDensityOptions = [
      { value: "", label: "Auto" },
      { value: "sparse", label: "Sparse" },
      { value: "dense", label: "Dense" }
    ];

    const columnTypeOptions = [
      { value: "auto", label: "Auto" },
      { value: "numeric", label: "Numeric" },
      { value: "text", label: "Text" },
      { value: "categorical", label: "Category" },
      { value: "datetime", label: "Datetime" },
      { value: "unit", label: "Unit" },
      { value: "metadata", label: "Metadata" },
      { value: "ignore", label: "Ignore" }
    ];

    const columnRoleOptions = [
      { value: "auto", label: "Auto" },
      { value: "x", label: "X axis" },
      { value: "y", label: "Y axis" },
      { value: "series", label: "Series" },
      { value: "sample", label: "Sample" },
      { value: "unit", label: "Unit" },
      { value: "metadata", label: "Metadata" },
      { value: "ignore", label: "Ignore" }
    ];

    const stylePresetOptions = [
      { value: "", label: "Auto" },
      { value: "nature", label: "Nature" }
    ];

    const palettePresetOptions = [
      { value: "", label: "Auto" },
      { value: "colorblind_safe", label: "Colorblind safe" }
    ];

        const appShell = document.querySelector(".app");
        const canvas = document.querySelector("#canvas");
        const inspector = document.querySelector("#inspector");
    const pageTitle = document.querySelector("#pageTitle");
    const railNav = document.querySelector("#railNav");
    const projectNameEl = document.querySelector("#projectName");
    const statusEl = document.querySelector("#status");
    const backButton = document.querySelector("#backButton");
    const nextButton = document.querySelector("#nextButton");

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function selectedDataType() {
      return state.catalog.find((item) => item.id === state.dataTypeId);
    }

    function selectedExperiment() {
      const dataType = selectedDataType();
      return dataType?.experiments.find((item) => item.id === state.experimentTypeId);
    }

    function defaultProjectName() {
      const experiment = selectedExperiment();
      const samples = state.groups
        .map((group) => group.sample.trim())
        .filter(Boolean)
        .slice(0, 3)
        .join("_");
      return [experiment?.label, samples].filter(Boolean).join("_") || "SciPlot_Project";
    }

    function groupFileCount() {
      return state.groups.reduce((sum, group) => sum + group.files.length, 0);
    }

    function projectGroups() {
      const groups = state.projectStatus?.manifest?.groups || state.lastProject?.groups || [];
      return Array.isArray(groups) ? groups : [];
    }

    function visibleGroupCount() {
      const selected = namedGroups();
      if (selected.length) return selected.length;
      return state.lastProject?.project_slug ? projectGroups().length : 0;
    }

    function visibleFileCount() {
      const selected = namedGroups();
      if (selected.length || !state.lastProject?.project_slug) return groupFileCount();
      return projectGroups().reduce((sum, group) => {
        const files = Array.isArray(group.files) ? group.files : [];
        return sum + files.length;
      }, 0);
    }

    function namedGroups() {
      return state.groups.filter((group) => group.sample.trim() && group.files.length);
    }

    function selectedSeriesOrder() {
      return namedGroups()
        .map((group) => group.sample.trim())
        .filter(Boolean);
    }

    function fileKey(file) {
      if (!file) return "";
      if (file.source_path) return `source:${file.source_path}`;
      if (!file.preview_id) {
        state.fileSequence += 1;
        file.preview_id = `upload:${state.fileSequence}:${file.name || "file"}`;
      }
      return file.preview_id;
    }

    function allDataFiles() {
      const items = [];
      state.groups.forEach((group, groupIndex) => {
        group.files.forEach((file, fileIndex) => {
          const key = fileKey(file);
          items.push({ key, group, groupIndex, file, fileIndex });
        });
      });
      return items;
    }

    function activePreviewItem() {
      const items = allDataFiles();
      if (!items.length) return null;
      const item = items.find((candidate) => candidate.key === state.activePreviewKey) || items[0];
      if (!state.activePreviewKey) state.activePreviewKey = item.key;
      return item;
    }

    function ensureColumnConfirmation(key, preview, item) {
      if (!key || !preview || state.columnConfirmations[key]) return;
      state.columnConfirmations[key] = {
        key,
        file_name: item?.file?.name || preview.name || "table",
        source_path: item?.file?.source_path || "",
        sample: item?.group?.sample || "",
        sheet: preview.sheet || "",
        columns: (preview.columns || []).map((column) => ({
          index: column.index,
          name: column.name,
          inferred_type: column.inferred_type || "auto",
          confirmed_type: column.inferred_type || "auto",
          role: column.suggested_role || "auto"
        }))
      };
    }

    function updateColumnConfirmation(key, columnIndex, field, value) {
      const preview = state.tablePreviews[key];
      const item = allDataFiles().find((candidate) => candidate.key === key);
      ensureColumnConfirmation(key, preview, item);
      const confirmation = state.columnConfirmations[key];
      if (!confirmation) return;
      const column = confirmation.columns.find((entry) => Number(entry.index) === Number(columnIndex));
      if (!column) return;
      column[field] = value;
    }

    function collectColumnConfirmations() {
      const items = allDataFiles();
      return items.map((item) => {
        const preview = state.tablePreviews[item.key];
        const confirmation = state.columnConfirmations[item.key];
        if (!preview || !confirmation) return null;
        return {
          sample: item.group.sample || "",
          file_name: item.file.name || preview.name || "table",
          source_path: item.file.source_path || "",
          sheet: preview.sheet || "",
          columns: confirmation.columns
        };
      }).filter(Boolean);
    }

    function formatSize(size) {
      const value = Number(size);
      if (!Number.isFinite(value)) return "";
      if (value < 1024) return `${value} B`;
      if (value < 1024 * 1024) return `${(value / 1024).toFixed(1)} KB`;
      return `${(value / 1024 / 1024).toFixed(1)} MB`;
    }

    function formatExportLabel(value) {
      return exportOptions.find((item) => item.value === value)?.label || value;
    }

    function selectedFigureSize() {
      return state.figureSize;
    }

    function validFigureSize(value) {
      return figureSizeOptions.some((item) => item.value === value);
    }

    function canExport() {
      if (state.lastProject?.project_slug) {
        return selectedSeriesOrder().length > 0 && state.exports.length > 0 && validFigureSize(selectedFigureSize());
      }
      return Boolean(state.dataTypeId)
        && Boolean(state.experimentTypeId)
        && namedGroups().length > 0
        && state.exports.length > 0
        && validFigureSize(selectedFigureSize());
    }

    function sourceWarnings() {
      const manifestWarnings = state.projectStatus?.manifest?.warnings;
      const projectWarnings = state.lastProject?.warnings;
      const sessionWarnings = state.session?.warnings;
      if (Array.isArray(manifestWarnings) && manifestWarnings.length) return manifestWarnings;
      if (Array.isArray(projectWarnings) && projectWarnings.length) return projectWarnings;
      if (Array.isArray(sessionWarnings) && sessionWarnings.length) return sessionWarnings;
      return [];
    }

    function renderSourceWarnings() {
      const warnings = sourceWarnings();
      if (!warnings.length) return "";
      return `
        <div class="panel">
          <div class="panel-head"><span>Source warnings</span><span class="chip warning">${warnings.length}</span></div>
          <div class="panel-body">
            ${warnings.map((warning) => `
              <div class="row">
                <div class="row-main">
                  <span class="row-title">${escapeHtml(warning.message || "Check source files")}</span>
                  <span class="row-subtitle">${escapeHtml((warning.samples || []).join(", "))}</span>
                </div>
              </div>
            `).join("")}
          </div>
        </div>
      `;
    }

    function setView(view) {
      state.view = view;
      render();
    }

    function modeIcon(view) {
      const base = 'stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"';
      const icons = {
        Source: `<svg viewBox="0 0 24 24"><path ${base} d="M5 5h14M5 12h14M5 19h8"/></svg>`,
        Inspect: `<svg viewBox="0 0 24 24"><path ${base} d="m15 15 4 4"/><circle ${base} cx="11" cy="11" r="5"/></svg>`,
        Samples: `<svg viewBox="0 0 24 24"><path ${base} d="M5 6h14M5 12h14M5 18h14"/><path ${base} d="M8 4v4M16 10v4M11 16v4"/></svg>`,
        Export: `<svg viewBox="0 0 24 24"><path ${base} d="M12 4v10"/><path ${base} d="m8 10 4 4 4-4"/><path ${base} d="M5 20h14"/></svg>`,
        "Codex Runs": `<svg viewBox="0 0 24 24"><path ${base} d="M8 8h8M8 12h5M6 18h12"/><path ${base} d="M7 4h10a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H9l-4 4V6a2 2 0 0 1 2-2Z"/></svg>`
      };
      return icons[view] || icons.Source;
    }

    function renderRail() {
      railNav.innerHTML = views.map((view) => `
        <button class="nav-button ${state.view === view ? "active" : ""}" type="button" data-view="${view}" aria-label="${view}" title="${view}">
          <span class="nav-icon" aria-hidden="true">${modeIcon(view)}</span>
          <span class="nav-label">${view}</span>
        </button>
      `).join("");
      railNav.querySelectorAll("[data-view]").forEach((button) => {
        button.addEventListener("click", () => setView(button.dataset.view));
      });
    }

    function iconSvg(kind) {
      const base = 'stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" fill="none"';
      const icons = {
        curves: `<svg viewBox="0 0 160 76"><path ${base} d="M18 59h124M23 57c18-38 36-39 54-6 19 35 39 26 60-26"/><path ${base} opacity=".35" d="M24 47c23-4 37-2 52 6 24 13 42 8 61-17"/></svg>`,
        tensile: `<svg viewBox="0 0 160 76"><path ${base} d="M26 57h112M34 57c22-44 42-47 59-18 13 22 26 24 43-6"/><path ${base} opacity=".35" d="M52 18v13M102 45v13"/></svg>`,
        thermal: `<svg viewBox="0 0 160 76"><path ${base} d="M23 58h116M32 49c18 0 19-28 38-28s18 28 37 28 19-16 32-16"/><path ${base} opacity=".35" d="M43 18h83"/></svg>`,
        spectrum: `<svg viewBox="0 0 160 76"><path ${base} d="M20 59h120M31 56l11-28 9 22 13-35 11 41 12-24 10 16 10-26 11 34"/></svg>`,
        unknown: `<svg viewBox="0 0 160 76"><path ${base} d="M28 58h104M47 45c9-18 24-23 37-11 9 8 15 7 24-7"/><path ${base} opacity=".35" d="M111 42v.2"/></svg>`
      };
      return icons[kind] || icons.unknown;
    }

    function tile(item, selected, iconKind) {
      return `
        <button class="choice-tile ${selected ? "selected" : ""}" type="button" data-id="${item.id}">
          <div class="choice-visual">${iconSvg(item.chart || iconKind || item.icon)}</div>
          <div>
            <div class="choice-title">${escapeHtml(item.label)}</div>
          </div>
        </button>
      `;
    }

	    function renderSourceView() {
	      const dataTypes = state.catalog;
	      canvas.innerHTML = `
	        <div class="studio-mode source-studio">
	          <section class="studio-mode-canvas">
	            <div class="choice-grid">
	              ${dataTypes.map((item) => tile(item, item.id === state.dataTypeId)).join("")}
	            </div>
	          </section>
	          <aside class="studio-mode-side">
	            <div class="metric-row">
	              <div class="metric"><div class="metric-value">${escapeHtml(state.session?.confidence ?? "0")}</div><div class="metric-label">Confidence</div></div>
	              <div class="metric"><div class="metric-value">${state.groups.length}</div><div class="metric-label">Groups</div></div>
	              <div class="metric"><div class="metric-value">${groupFileCount()}</div><div class="metric-label">Files</div></div>
	            </div>
	            ${state.session?.input_path ? `
	              <div class="row">
	                <div class="row-main">
	                  <span class="row-title">${escapeHtml(state.session.input_path)}</span>
	                </div>
	                ${state.session ? '<span class="chip success">Prefilled</span>' : '<span class="chip">Manual</span>'}
	              </div>
	            ` : ""}
	            ${renderSourceWarnings()}
	          </aside>
	        </div>
	      `;
      canvas.querySelectorAll("[data-id]").forEach((button) => {
        button.addEventListener("click", () => {
          state.dataTypeId = button.dataset.id;
          const experiments = selectedDataType()?.experiments || [];
          state.experimentTypeId = experiments[0]?.id || "";
          render();
        });
      });
    }

    function renderInspectView() {
      const dataType = selectedDataType();
      const experiments = dataType?.experiments || [];
      const experiment = selectedExperiment();
      const selectedLabel = state.session?.experiment_label || experiment?.label || "Unknown";
      canvas.innerHTML = `
	        <div class="studio-mode inspect-studio">
	          <section class="inspect-current studio-mode-canvas">
	            <div class="inspect-symbol">${iconSvg(experiment?.chart || dataType?.icon)}</div>
	            <div class="inspect-current-main">
	              <span class="inspect-kicker">${escapeHtml(dataType?.label || "SciPlot")}</span>
	              <div class="inspect-current-title">${escapeHtml(selectedLabel)}</div>
	            </div>
	            <span class="status-dot" title="Detected"></span>
	          </section>
	          <aside class="choice-grid inspect-grid studio-mode-side">
	            ${experiments.map((item) => tile(item, item.id === state.experimentTypeId, dataType?.icon)).join("")}
	          </aside>
	        </div>
	      `;
      canvas.querySelectorAll("[data-id]").forEach((button) => {
        button.addEventListener("click", () => {
          state.experimentTypeId = button.dataset.id;
          render();
        });
      });
    }

    function renderSelectOptions(options, value) {
      return options.map((item) => `
        <option value="${escapeHtml(item.value)}" ${String(value || "") === item.value ? "selected" : ""}>
          ${escapeHtml(item.label)}
        </option>
      `).join("");
    }

    function renderColumnConfirmations(preview, key) {
      const item = allDataFiles().find((candidate) => candidate.key === key);
      ensureColumnConfirmation(key, preview, item);
      const confirmation = state.columnConfirmations[key];
      if (!confirmation) return "";
      return `
        <div class="column-confirm-list">
          <div class="column-confirm-head">
            <span>Column</span>
            <span>Type</span>
            <span>Role</span>
          </div>
          ${confirmation.columns.map((column) => `
            <div class="column-confirm-row">
              <div class="column-name">
                <span class="row-title">${escapeHtml(column.name)}</span>
                <span class="row-subtitle">${escapeHtml(column.inferred_type || "auto")} · ${Number(column.index) + 1}</span>
              </div>
              <select class="column-select" data-column-type="${column.index}" aria-label="Column type ${escapeHtml(column.name)}">
                ${renderSelectOptions(columnTypeOptions, column.confirmed_type)}
              </select>
              <select class="column-select" data-column-role="${column.index}" aria-label="Column role ${escapeHtml(column.name)}">
                ${renderSelectOptions(columnRoleOptions, column.role)}
              </select>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderDataTable(preview) {
      const columns = preview?.columns || [];
      const rows = preview?.rows || [];
      if (!columns.length || !rows.length) {
        return "";
      }
      return `
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>#</th>
                ${columns.map((column) => `<th>${escapeHtml(column.name)}</th>`).join("")}
              </tr>
            </thead>
            <tbody>
              ${rows.map((row) => `
                <tr>
                  <td>${escapeHtml(row.index)}</td>
                  ${columns.map((column, index) => `<td title="${escapeHtml(row.values[index] || "")}">${escapeHtml(row.values[index] || "")}</td>`).join("")}
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderTablePreviewPanel() {
      const items = allDataFiles();
      const item = activePreviewItem();
      if (!item) {
        return "";
      }
      const key = item.key;
      const preview = state.tablePreviews[key];
      const loading = Boolean(state.previewLoading[key]);
      const error = state.previewErrors[key];
      const status = error ? "unavailable" : loading ? "loading" : preview ? `${preview.preview_columns} columns` : "queued";
      return `
        <div class="panel">
          <div class="panel-head"><span>Columns</span><span class="chip ${error ? "warning" : preview ? "success" : ""}">${escapeHtml(status)}</span></div>
          <div class="panel-body">
            <div class="preview-toolbar">
              <label class="field">
                <span class="field-label">File</span>
                <select id="previewFileSelect" class="field-input">
                  ${items.map((candidate) => `
                    <option value="${escapeHtml(candidate.key)}" ${candidate.key === key ? "selected" : ""}>
                      ${escapeHtml(candidate.group.sample || "Sample")} / ${escapeHtml(candidate.file.name || "file")}
                    </option>
                  `).join("")}
                </select>
              </label>

    function moveGroup(fromIndex, toIndex) {
      if (!Number.isInteger(fromIndex) || !Number.isInteger(toIndex)) return;
      if (fromIndex === toIndex) return;
      if (fromIndex < 0 || toIndex < 0) return;
      if (fromIndex >= state.groups.length || toIndex >= state.groups.length) return;

      const [group] = state.groups.splice(fromIndex, 1);
      state.groups.splice(toIndex, 0, group);

      if (state.activeGroup === fromIndex) {
        state.activeGroup = toIndex;
      } else if (fromIndex < state.activeGroup && toIndex >= state.activeGroup) {
        state.activeGroup -= 1;
      } else if (fromIndex > state.activeGroup && toIndex <= state.activeGroup) {
        state.activeGroup += 1;
      }
      render();
    }

    function removeGroup(index) {
      if (!Number.isInteger(index) || index < 0 || index >= state.groups.length) return;
      if (state.groups.length <= 1) return;
      const [removed] = state.groups.splice(index, 1);
      (removed?.files || []).forEach((file) => {
        const key = fileKey(file);
        delete state.tablePreviews[key];
        delete state.columnConfirmations[key];
        delete state.previewLoading[key];
        delete state.previewErrors[key];
        if (state.activePreviewKey === key) state.activePreviewKey = "";
      });
      if (state.activeGroup === index) {
        state.activeGroup = Math.min(index, state.groups.length - 1);
      } else if (state.activeGroup > index) {
        state.activeGroup -= 1;
      }
      render();
    }

    function attachSampleHandlers() {
      canvas.querySelector("#addGroup").addEventListener("click", () => {
        state.groups.push({ sample: `Sample ${state.groups.length + 1}`, files: [] });
        state.activeGroup = state.groups.length - 1;
        render();
      });
      canvas.querySelectorAll(".sample-row").forEach((row) => {
        row.addEventListener("click", (event) => {
          if (event.target.closest(".sample-input, .sample-remove")) return;
          state.activeGroup = Number(row.dataset.index);
          render();
        });
        row.addEventListener("dragstart", (event) => {
          event.dataTransfer.effectAllowed = "move";
          event.dataTransfer.setData("text/plain", row.dataset.dragIndex);
          row.classList.add("dragging");
        });
        row.addEventListener("dragend", () => {
          row.classList.remove("dragging");
          canvas.querySelectorAll(".sample-row.drag-over").forEach((item) => item.classList.remove("drag-over"));
        });
        row.addEventListener("dragover", (event) => {
          event.preventDefault();
          event.dataTransfer.dropEffect = "move";
          row.classList.add("drag-over");
        });
        row.addEventListener("dragleave", () => row.classList.remove("drag-over"));
        row.addEventListener("drop", (event) => {
          event.preventDefault();
          row.classList.remove("drag-over");
          const draggedIndex = event.dataTransfer.getData("text/plain");
          const targetIndex = row.dataset.dragIndex;
          moveGroup(Number(draggedIndex), Number(targetIndex));
        });
        const input = row.querySelector(".sample-input");
        input.addEventListener("click", (event) => event.stopPropagation());
        input.addEventListener("input", (event) => {
          state.groups[Number(row.dataset.index)].sample = event.target.value;
          updateChrome();
        });
      });
      canvas.querySelectorAll(".sample-remove").forEach((button) => {
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          removeGroup(Number(button.dataset.removeGroup));
        });
      });
      const fileInput = canvas.querySelector("#fileInput");
      canvas.querySelector("#chooseFiles").addEventListener("click", () => fileInput.click());
      fileInput.addEventListener("change", () => {
        addFiles(Array.from(fileInput.files || []));
        fileInput.value = "";

      const dropzone = canvas.querySelector("#dropzone");
      ["dragenter", "dragover"].forEach((name) => {
        dropzone.addEventListener(name, (event) => {
          event.preventDefault();
          dropzone.classList.add("dragover");
        });
      });
      ["dragleave", "drop"].forEach((name) => {
        dropzone.addEventListener(name, (event) => {
          event.preventDefault();
          dropzone.classList.remove("dragover");
        });
      });
      dropzone.addEventListener("drop", (event) => addFiles(Array.from(event.dataTransfer.files || [])));
      canvas.querySelectorAll(".file-row").forEach((row) => {
        row.addEventListener("click", () => {
          state.activePreviewKey = row.dataset.previewKey || "";
          render();
        });

        button.addEventListener("click", (event) => {

          delete state.previewLoading[removedKey];
          delete state.previewErrors[removedKey];
          if (state.activePreviewKey === removedKey) state.activePreviewKey = "";
          render();

    function artifactUrlWithVersion(artifact) {
      if (!artifact?.url) return "";
      const token = artifact.mtime_ns || artifact.size_bytes || Date.now();
      const joiner = artifact.url.includes("?") ? "&" : "?";
      return `${artifact.url}${joiner}v=${encodeURIComponent(token)}`;
    }

	        function displayableFigures(figures) {
	          return figures.filter((figure) => figure.url && (
	            figure.content_type === "application/pdf"
	            || figure.display_kind === "image"
	            || String(figure.name || "").toLowerCase().endsWith(".png")
	          ));
	        }

	        function renderFigureViewport(previewFigure, figures) {
	          const previewWebAgg = state.workbenchPreview?.webagg;
	          const statusWebAgg = state.projectStatus?.workbench?.webagg;
	          const webagg = previewWebAgg?.url ? previewWebAgg : statusWebAgg;
	          const previewUrl = artifactUrlWithVersion(previewFigure);
	          const displayables = displayableFigures(figures);
	          const active = displayables[state.activeFigure] || displayables[0];
	          const activeUrl = artifactUrlWithVersion(active);
	          const busyClass = state.rerunInFlight || state.livePreviewBusy || state.previewInFlight ? " rendering" : "";
	          let visual = "";
	          if (state.activeFigure === 0 && previewFigure?.exists && previewFigure.display_kind === "image" && previewUrl) {
	            visual = `<img class="figure-preview-img" src="${escapeHtml(previewUrl)}" alt="${escapeHtml(previewFigure.name || "SciPlot figure")}">`;
	          } else if (active?.display_kind === "image" && activeUrl) {
	            visual = `<img class="figure-preview-img" src="${escapeHtml(activeUrl)}" alt="${escapeHtml(active.name || "SciPlot figure")}">`;
	          } else if (activeUrl) {
	            visual = `<object data="${escapeHtml(activeUrl)}" type="${escapeHtml(active.content_type || "application/pdf")}"></object>`;
	          } else if (previewFigure?.exists && previewUrl) {
	            visual = `<object data="${escapeHtml(previewUrl)}" type="${escapeHtml(previewFigure.content_type || "application/pdf")}"></object>`;
	          } else if (webagg?.running && webagg.url) {
	            visual = `<iframe class="webagg-frame" src="${escapeHtml(webagg.url)}" title="Matplotlib WebAgg figure"></iframe>`;
	          } else {
	            visual = '<div class="placeholder">Waiting for figure</div>';
	          }
	          return `
	            <div class="result-stage figure-stage studio-figure-stage${busyClass}">
	              ${visual}
	            </div>
	          `;
	        }

    function compactRenderOptions(options) {
      const compact = {};
      for (const [key, value] of Object.entries(options)) {
        if (key === "review_note") continue;

        if (["x_min", "x_max", "y_min", "y_max", "stack_spacing_scale"].includes(key)) {
          const numeric = Number(value);
          if (!Number.isFinite(numeric)) continue;
          compact[key] = numeric;
        } else {
          compact[key] = value;
        }
      }
      return compact;

      if (!files.length) return;
      state.groups[state.activeGroup].files.push(...files.map((file) => ({
        name: file.name,

        preview_id: `upload:${++state.fileSequence}:${file.name}`,

      })));

    async function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result).split(",", 2)[1] || "");
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(file);
      });
    }

    function queueActivePreviewLoad() {
      const item = activePreviewItem();
      if (!item) return;
      const key = item.key;
      if (state.tablePreviews[key] || state.previewLoading[key]) return;
      state.previewLoading[key] = true;
      loadTablePreview(item, key);
    }

    async function loadTablePreview(item, key) {
      try {
        const body = {
          name: item.file.name || "table",
          source_path: item.file.source_path || ""
        };
        if (!body.source_path && item.file.file) {
          body.content_base64 = await fileToBase64(item.file.file);
        }
        const response = await fetch("/api/table-preview", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });
        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.error || "Table preview failed");
        }
        state.tablePreviews[key] = payload;
        delete state.previewErrors[key];
        ensureColumnConfirmation(key, payload, item);
      } catch (error) {
        state.previewErrors[key] = error.message;
      } finally {
        delete state.previewLoading[key];
        render();
      }
    }

    async function exportProject() {
      const groups = [];
      for (const group of state.groups) {
        if (!group.sample.trim() || !group.files.length) continue;
        const files = [];
        for (const item of group.files) {
          if (item.source_path) {
            files.push({ name: item.name, source_path: item.source_path });
          } else {
            files.push({ name: item.name, content_base64: await fileToBase64(item.file) });
          }
        }
        groups.push({ sample: group.sample.trim(), files });
      }
      state.statusText = "Exporting and rendering";
      state.error = "";
      updateChrome();
      const response = await fetch("/api/projects", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          project_name: projectNameEl.value.trim() || defaultProjectName(),
          data_type_id: state.dataTypeId,
          experiment_type_id: state.experimentTypeId,
          groups,
          plot_output: state.plotOutput.trim() || "runs/run_001",
          exports: state.exports,
          render_options: {
            size: selectedFigureSize()
          },
          column_confirmations: collectColumnConfirmations(),
          run_after_create: true
        })
      });
      const payload = await response.json();
      if (!response.ok) {
        throw new Error(payload.error || "Export failed");
      }
      state.lastProject = payload;
      state.statusText = payload.run_failed ? "Rendered project needs Codex" : "Figures generated";
      await refreshProjectStatus();
      resetRefineOptionsFromProject();
      state.view = payload.run_failed ? "Codex Runs" : "Export";
      render();
    }

      if (state.lastProject?.project_slug) {
        await rerunProject();
        return;

      await exportProject();

      };
    }

    async function previewProject(options = {}) {
      if (!state.lastProject?.project_slug) return;
      const live = Boolean(options.live);
      if (state.previewInFlight) {
        if (live) state.livePreviewQueued = true;
        return;
      }
      try {
        state.previewInFlight = true;
        state.livePreviewBusy = live;
        state.statusText = live ? "Rendering live preview" : "Rendering preview";
        state.error = "";
        updateChrome();
        const response = await fetch(`/api/projects/${encodeURIComponent(state.lastProject.project_slug)}/workbench/preview`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(workbenchRequestPayload(false))
        });
        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.error || "Preview failed");
        }
        state.workbenchPreview = payload;
        state.workbenchChartSpec = payload.chart_spec || null;
        state.statusText = "Preview updated";
        const runQueued = live && state.livePreviewQueued;
        state.previewInFlight = false;
        state.livePreviewBusy = false;
        render();
        if (runQueued) {
          state.livePreviewQueued = false;
          scheduleLivePreview();
        }
      } catch (error) {
        state.error = error.message;
        state.statusText = error.message;
        state.previewInFlight = false;
        state.livePreviewBusy = false;
        render();
      } finally {
        state.previewInFlight = false;
        state.livePreviewBusy = false;
        updateChrome();
      }
    }

    async function applyProject() {
      if (!state.lastProject?.project_slug) return;
      try {
        state.rerunInFlight = true;
        state.statusText = "Applying SciPlot refinements";
        state.error = "";
        updateChrome();
        const response = await fetch(`/api/projects/${encodeURIComponent(state.lastProject.project_slug)}/workbench/apply`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(workbenchRequestPayload(true))
        });
        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.error || "Apply failed");
        }
        state.lastProject = payload;
        state.statusText = "Refinements applied";
        state.workbenchPreview = null;
        await refreshProjectStatus();
        resetRefineOptionsFromProject();
        render();
      } catch (error) {
        state.error = error.message;
        state.statusText = error.message;
        render();
      } finally {
        state.rerunInFlight = false;
        updateChrome();
      }
    }

    async function rerunProject(options = {}) {
      if (!state.lastProject?.project_slug) return;
      const live = Boolean(options.live);
      if (live) {
        await previewProject(options);
        return;
      }
      if (state.rerunInFlight) {
        return;
      }
      try {
        state.rerunInFlight = true;
        state.statusText = "Exporting SciPlot figures";
        state.error = "";
        updateChrome();
        const response = await fetch(`/api/projects/${encodeURIComponent(state.lastProject.project_slug)}/rerun`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(workbenchRequestPayload(true))
        });
        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.error || "Rerun failed");
        }
        state.lastProject = payload;
        state.statusText = payload.run_failed
          ? "Refined run needs Codex"
          : "Refined figures generated";
        state.workbenchPreview = null;
        await refreshProjectStatus();
        state.rerunInFlight = false;
        resetRefineOptionsFromProject();
        render();
      } catch (error) {
        state.error = error.message;
        state.statusText = error.message;
        state.rerunInFlight = false;
        render();
      } finally {
        state.rerunInFlight = false;
        updateChrome();
      }
    }

    async function refreshProjectStatus() {
      if (!state.lastProject?.project_slug) return;
      const response = await fetch(`/api/projects/${encodeURIComponent(state.lastProject.project_slug)}/status`);
      if (!response.ok) return;
      state.projectStatus = await response.json();
      await refreshWorkbenchSpec();
      await refreshWorkbenchWebAgg();
      if (!state.refineDirty) resetRefineOptionsFromProject();
    }

    async function refreshWorkbenchSpec() {
      const url = state.projectStatus?.workbench?.chart_spec_url;
      if (!url) return;
      try {
        const response = await fetch(url);
        if (!response.ok) return;
        state.workbenchChartSpec = await response.json();
      } catch (_error) {
        state.workbenchChartSpec = null;
      }
    }

    async function refreshWorkbenchWebAgg() {
      const url = state.projectStatus?.workbench?.webagg_url;
      if (!url) return;
      try {
        const response = await fetch(url);
        if (!response.ok) return;
        const webagg = await response.json();
        state.projectStatus = {
          ...state.projectStatus,
          workbench: {
            ...state.projectStatus.workbench,
            webagg
          }
        };
      } catch (_error) {
        state.projectStatus = {
          ...state.projectStatus,
          workbench: {
            ...state.projectStatus?.workbench,
            webagg: {
              kind: "sciplot_webagg_sidecar",
              available: false,
              running: false,
              url: null
            }
          }
        };
      }
    }

    async function loadProjectFromQuery() {
      const params = new URLSearchParams(window.location.search);
      const projectSlug = params.get("project");
      if (!projectSlug) return false;
      const response = await fetch(`/api/projects/${encodeURIComponent(projectSlug)}/status`);
      if (!response.ok) throw new Error("Could not load SciPlot project");
      const status = await response.json();
      const manifest = status.manifest || {};
      state.projectStatus = status;
      state.lastProject = {
        ...manifest,
        project_slug: status.project_slug,
        project_dir: status.project_dir,
        plot_request: status.plot_request,
        outputs_dir: status.outputs_dir,
        download_name: `${status.project_slug}.zip`,
        last_run: status.last_run
      };
      if (manifest.data_type?.id) state.dataTypeId = manifest.data_type.id;
      if (manifest.experiment?.id) state.experimentTypeId = manifest.experiment.id;
      if (manifest.project_name) projectNameEl.value = manifest.project_name;
      if (Array.isArray(manifest.groups) && manifest.groups.length) {
        state.groups = manifest.groups.map((group) => ({
          sample: group.sample || "Sample",
          files: (group.files || []).map((file) => {
            const sourcePath = file.source_path || file.raw_path || "";
            const name = file.original_name || file.name || sourcePath.split("/").filter(Boolean).pop() || "file";
            return {
              name,
              size_bytes: file.size_bytes,
              source_path: sourcePath
            };
          })
        }));
        state.activeGroup = 0;
      }
      const renderOptions = manifest.plot_options?.render_options || {};
      if (renderOptions.size && figureSizeOptions.some((item) => item.value === renderOptions.size)) {
        state.figureSize = renderOptions.size;
      }
      const exports = manifest.plot_options?.exports;
      if (Array.isArray(exports) && exports.length) state.exports = exports;
      state.view = status.needs_codex ? "Codex Runs" : "Export";
      await refreshWorkbenchSpec();
      await refreshWorkbenchWebAgg();
      resetRefineOptionsFromProject();
      return true;
    }

    async function startCodexJob() {
      if (!state.lastProject) return;
      const lastRun = state.projectStatus?.last_run || state.lastProject.last_run || {};
      state.statusText = "Starting Codex job";
      updateChrome();
      const response = await fetch("/api/codex/jobs", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          project_slug: state.lastProject.project_slug,
          project_dir: state.lastProject.project_dir,
          plot_request: state.lastProject.plot_request,
          run_output: lastRun.output || state.lastProject.outputs_dir,
          intervention_request: lastRun.intervention_request || state.projectStatus?.artifacts?.intervention_request?.path,
          failure: lastRun.failure || state.lastProject.failure,
          user_goal: state.codexGoal
        })
      });
      const payload = await response.json();
      if (!response.ok) {
        throw new Error(payload.error || "Could not start Codex");
      }
      state.codexJob = payload;
      state.statusText = `Codex job ${payload.status}`;
      await refreshProjectStatus();
      render();
    }

	    function updateChrome() {
	      const studioResultMode = isStudioResultMode();
	      appShell.classList.toggle("studio-result-mode", studioResultMode);
	      pageTitle.textContent = studioResultMode ? "" : state.view;
	      statusEl.textContent = state.error || state.statusText || "";
	      backButton.disabled = views.indexOf(state.view) === 0;
	      nextButton.textContent = state.view === "Export" ? "Export" : "Next";
	      nextButton.disabled = state.view === "Export" ? !canExport() : false;
	    }

    function render() {
      renderRail();
      pageTitle.textContent = state.view;
      if (state.view === "Source") renderSourceView();
      if (state.view === "Inspect") renderInspectView();
      if (state.view === "Samples") renderSamplesView();
      if (state.view === "Export") renderExportView();
      if (state.view === "Codex Runs") renderCodexView();
	      renderInspector();
	      attachPreviewHandlers();
	      attachRefineHandlers();
		      attachStudioHandlers();
	      if (state.view === "Samples") queueActivePreviewLoad();
      updateChrome();
    }

    backButton.addEventListener("click", () => {
      const index = views.indexOf(state.view);
      state.view = views[Math.max(0, index - 1)];
      render();
    });

    nextButton.addEventListener("click", async () => {
      if (state.view === "Export") {
        try {
          await submitExport();
        } catch (error) {
          state.error = error.message;
          state.statusText = error.message;
          render();
        }
        return;
      }
      const index = views.indexOf(state.view);
      state.view = views[Math.min(views.length - 1, index + 1)];
      render();
    });

    function applySession(session) {
      state.session = session;
      state.dataTypeId = session.data_type_id || state.dataTypeId;
      state.experimentTypeId = session.experiment_type_id || state.experimentTypeId;
      if (Array.isArray(session.groups) && session.groups.length) {
        state.groups = session.groups.map((group) => ({
          sample: group.sample || "Sample",
          files: (group.files || []).map((file) => ({
            name: file.name || file.source_path || "file",
            size_bytes: file.size_bytes,
            source_path: file.source_path
          }))
        }));
        state.activeGroup = 0;
      }
      if (session.project_name) projectNameEl.value = session.project_name;
      if (session.plot_output) state.plotOutput = session.plot_output;
      if (Array.isArray(session.exports) && session.exports.length) state.exports = session.exports;
      if (session.render_options?.size) {
        const size = String(session.render_options.size);
        if (figureSizeOptions.some((item) => item.value === size)) state.figureSize = size;
      }
    }

    async function loadSessionFromQuery() {
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get("session");
      if (!sessionId) return;
      const response = await fetch(`/api/session/${encodeURIComponent(sessionId)}`);
      if (!response.ok) throw new Error("Could not load prepared session");
      applySession(await response.json());
    }

    async function boot() {
      const response = await fetch("/api/catalog");
      const payload = await response.json();
      state.catalog = payload.data_types || [];
      state.figureSize = (payload.figure_size_presets || []).includes(state.figureSize) ? state.figureSize : "120x55";
      if (!state.dataTypeId && state.catalog.length) {
        state.dataTypeId = state.catalog[0].id;
        state.experimentTypeId = state.catalog[0].experiments?.[0]?.id || "";
      }
      const projectLoaded = await loadProjectFromQuery();
      if (!projectLoaded) await loadSessionFromQuery();
      if (!projectNameEl.value) projectNameEl.value = defaultProjectName();
      render();
    }

    boot().catch((error) => {
      state.statusText = error.message;
      state.error = error.message;
      render();
    });
  </script>
</body>
</html>
