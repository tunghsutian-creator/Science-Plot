<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SciPlot</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f5f1;
      --surface: #fbfcf8;
      --panel: #ffffff;
      --ink: #111411;
      --muted: #67706c;
      --quiet: #9aa39e;
      --line: #dde3dd;
      --line-strong: #b6c2ba;
      --green: #15936b;
      --green-soft: #e4f5ee;
      --blue: #2864d9;
      --blue-soft: #e7eefc;
      --orange: #d87918;
      --orange-soft: #fff0db;
      --violet: #7c55c7;
      --danger: #c24135;
      --shadow: 0 18px 48px rgba(20, 28, 24, 0.10);
      --shadow-soft: 0 10px 24px rgba(20, 28, 24, 0.06);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      letter-spacing: 0;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overflow: hidden;
      color: var(--ink);
      background: var(--bg);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
      letter-spacing: 0;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .app-shell {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-columns: 76px minmax(0, 1fr) 336px;
      background: var(--bg);
      overflow: hidden;
    }

    .stage-rail {
      min-width: 0;
      min-height: 0;
      padding: 14px 10px;
      border-right: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.64);
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 16px;
    }

    .mark {
      width: 44px;
      height: 44px;
      margin: 0 auto;
      border-radius: 14px;
      display: grid;
      place-items: center;
      color: #ffffff;
      background: #111411;
      box-shadow: var(--shadow-soft);
    }

    .mark svg,
    .icon-button svg,
    .stage-button svg,
    .primary-action svg,
    .micro-button svg {
      width: 19px;
      height: 19px;
      display: block;
    }

    .stage-stack {
      display: grid;
      align-content: start;
      gap: 10px;
    }

    .stage-button {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      color: var(--muted);
      background: transparent;
      transition: background 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .stage-button.active {
      color: var(--ink);
      background: #ffffff;
      box-shadow: var(--shadow-soft);
    }

    .stage-button:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.72);
    }

    .stage-dot {
      width: 8px;
      height: 8px;
      margin: 0 auto 6px;
      border-radius: 999px;
      background: var(--quiet);
    }

    .stage-dot.ready { background: var(--green); }
    .stage-dot.busy { background: var(--orange); }
    .stage-dot.warn { background: var(--danger); }

    .status-strip {
      display: grid;
      gap: 8px;
      justify-items: center;
    }

    .status-light {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: var(--green);
      box-shadow: 0 0 0 5px var(--green-soft);
    }

    .status-light.warn {
      background: var(--orange);
      box-shadow: 0 0 0 5px var(--orange-soft);
    }

    .main-space {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: 72px minmax(0, 1fr);
      overflow: hidden;
    }

    .topbar {
      min-width: 0;
      padding: 14px 18px 10px;
      display: grid;
      grid-template-columns: minmax(160px, 340px) 1fr auto;
      align-items: center;
      gap: 12px;
    }

    .project-input {
      width: 100%;
      height: 42px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      outline: none;
      background: rgba(255, 255, 255, 0.76);
      color: var(--ink);
      box-shadow: var(--shadow-soft);
    }

    .project-input:focus {
      border-color: var(--line-strong);
      background: #ffffff;
    }

    .tool-strip {
      min-width: 0;
      justify-self: center;
      height: 42px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.72);
      display: flex;
      align-items: center;
      gap: 4px;
      box-shadow: var(--shadow-soft);
    }

    .icon-button,
    .micro-button {
      width: 34px;
      height: 32px;
      border-radius: 11px;
      display: grid;
      place-items: center;
      color: var(--muted);
      background: transparent;
    }

    .icon-button.active,
    .icon-button:hover,
    .micro-button:hover {
      color: var(--ink);
      background: #ffffff;
    }

    .zoom-range {
      width: 112px;
      accent-color: var(--green);
    }

    .primary-action {
      height: 42px;
      min-width: 116px;
      padding: 0 14px;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #ffffff;
      background: #111411;
      box-shadow: var(--shadow-soft);
      font-weight: 720;
    }

    .primary-action:disabled {
      color: var(--quiet);
      background: #e6ebe6;
      cursor: not-allowed;
      box-shadow: none;
    }

    .canvas-zone {
      min-width: 0;
      min-height: 0;
      padding: 0 18px 18px;
      overflow: hidden;
    }

    .visual-canvas {
      position: relative;
      width: 100%;
      height: 100%;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
      user-select: none;
    }

    .visual-board {
      position: absolute;
      inset: 0;
      min-width: 0;
      min-height: 0;
      transform-origin: center;
      transition: transform 160ms ease;
    }

    .canvas-watermark {
      position: absolute;
      right: 16px;
      top: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      z-index: 5;
    }

    .phase-chip {
      min-height: 26px;
      padding: 0 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, 0.78);
      color: var(--muted);
      font-size: 12px;
      font-weight: 680;
      white-space: nowrap;
    }

    .pulse {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--green);
    }

    .flow-map,
    .mapping-map,
    .render-map,
    .review-map {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
    }

    .source-landing {
      width: min(920px, 88%);
      min-height: 430px;
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(230px, 0.65fr);
      align-items: center;
      gap: 28px;
    }

    .source-drop {
      min-width: 0;
      min-height: 430px;
      padding: 34px;
      border: 1px dashed var(--line-strong);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.72);
      box-shadow: var(--shadow-soft);
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 22px;
      transition: border-color 160ms ease, background 160ms ease, transform 160ms ease;
    }

    .source-drop.dragover,
    .source-drop:hover {
      border-color: var(--green);
      background: #ffffff;
      transform: translateY(-2px);
    }

    .source-main {
      display: grid;
      align-content: center;
      justify-items: start;
      gap: 16px;
    }

    .source-symbol {
      width: 76px;
      height: 76px;
      border-radius: 24px;
      display: grid;
      place-items: center;
      color: var(--green);
      background: var(--green-soft);
    }

    .source-symbol svg {
      width: 32px;
      height: 32px;
    }

    .source-title {
      margin: 0;
      max-width: 420px;
      color: var(--ink);
      font-size: clamp(30px, 4.2vw, 54px);
      font-weight: 820;
      line-height: 0.98;
    }

    .source-subline {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .canvas-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .canvas-command {
      min-height: 38px;
      padding: 0 14px;
      border-radius: 13px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--ink);
      background: #ffffff;
      box-shadow: var(--shadow-soft);
      font-weight: 760;
    }

    .canvas-command:hover {
      color: var(--green);
    }

    .source-path {
      display: grid;
      gap: 14px;
    }

    .flow-node {
      min-width: 0;
      min-height: 122px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.74);
      box-shadow: var(--shadow-soft);
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: center;
      gap: 14px;
      transition: border-color 160ms ease, transform 160ms ease;
    }

    .flow-node.active,
    .flow-node:hover {
      border-color: var(--green);
      transform: translateY(-2px);
    }

    .flow-node:disabled {
      color: var(--quiet);
      border-color: var(--line);
      cursor: not-allowed;
      transform: none;
    }

    .node-icon {
      width: 40px;
      height: 40px;
      border-radius: 13px;
      display: grid;
      place-items: center;
      background: var(--green-soft);
      color: var(--green);
    }

    .node-icon.blue {
      color: var(--blue);
      background: var(--blue-soft);
    }

    .node-icon.orange {
      color: var(--orange);
      background: var(--orange-soft);
    }

    .node-title {
      margin: 0;
      color: var(--ink);
      font-size: 16px;
      font-weight: 760;
      line-height: 1.15;
    }

    .node-meta {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .file-strip,
    .sample-track,
    .column-track,
    .metric-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .pill,
    .sample-pill,
    .role-pill,
    .figure-pill {
      min-height: 28px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: #ffffff;
      color: var(--ink);
      font-size: 12px;
      font-weight: 680;
      white-space: nowrap;
    }

    .pill.muted {
      color: var(--muted);
      background: #f7f9f6;
    }

    .pill.ok {
      color: var(--green);
      background: var(--green-soft);
      border-color: transparent;
    }

    .pill.warn {
      color: var(--orange);
      background: var(--orange-soft);
      border-color: transparent;
    }

    .mapping-stage {
      width: min(980px, 90%);
      min-height: 420px;
      display: grid;
      grid-template-columns: minmax(220px, 0.9fr) minmax(260px, 1fr) minmax(220px, 0.9fr);
      gap: 18px;
      align-items: stretch;
    }

    .map-column {
      min-width: 0;
      min-height: 0;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: #ffffff;
      box-shadow: var(--shadow-soft);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 12px;
    }

    .map-title {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
      text-transform: uppercase;
    }

    .sample-list {
      min-height: 0;
      overflow: auto;
      display: grid;
      align-content: start;
      gap: 9px;
    }

    .sample-lane {
      min-width: 0;
      min-height: 52px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 15px;
      background: #f8faf7;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px;
    }

    .sample-lane.active {
      border-color: var(--green);
      background: #ffffff;
    }

    .drag-handle {
      width: 28px;
      height: 28px;
      border-radius: 10px;
      color: var(--quiet);
      background: transparent;
      display: grid;
      place-items: center;
      cursor: grab;
    }

    .sample-input {
      min-width: 0;
      height: 32px;
      border: 0;
      border-radius: 10px;
      padding: 0 8px;
      background: transparent;
      color: var(--ink);
      outline: none;
      font-weight: 700;
    }

    .sample-input:focus {
      background: #ffffff;
      box-shadow: inset 0 0 0 1px var(--line);
    }

    .file-count {
      min-width: 24px;
      height: 24px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      color: var(--muted);
      background: #ffffff;
      font-size: 12px;
      font-weight: 760;
    }

    .column-stack {
      display: grid;
      align-content: center;
      gap: 10px;
    }

    .role-row {
      min-height: 46px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #f8faf7;
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 8px;
      align-items: center;
    }

    .role-key {
      width: 34px;
      height: 30px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      color: #ffffff;
      background: #111411;
      font-size: 12px;
      font-weight: 800;
    }

    .role-row select {
      width: 100%;
      height: 32px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #ffffff;
      color: var(--ink);
      padding: 0 8px;
      outline: none;
    }

    .render-sheet {
      width: min(720px, 86%);
      aspect-ratio: 1.55;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: #ffffff;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: 1fr 190px;
      overflow: hidden;
    }

    .render-preview {
      min-width: 0;
      min-height: 0;
      padding: 34px;
      display: grid;
      place-items: center;
    }

    .paper {
      width: 78%;
      max-width: 410px;
      aspect-ratio: 1.1;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fbfcf8;
      position: relative;
      overflow: hidden;
    }

    .paper.wide { aspect-ratio: 2.18; }
    .paper.tall { aspect-ratio: 0.55; }

    .chart-lines {
      position: absolute;
      inset: 19% 14% 17% 13%;
      border-left: 2px solid #1d2520;
      border-bottom: 2px solid #1d2520;
    }

    .chart-lines svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .render-side {
      padding: 20px;
      border-left: 1px solid var(--line);
      display: grid;
      align-content: center;
      gap: 12px;
      background: #f8faf7;
    }

    .progress {
      height: 8px;
      border-radius: 999px;
      background: #e8eee8;
      overflow: hidden;
    }

    .progress span {
      display: block;
      width: 42%;
      height: 100%;
      border-radius: inherit;
      background: var(--green);
    }

    .review-stage {
      width: 100%;
      height: 100%;
      padding: 48px;
      display: grid;
      place-items: center;
    }

    .figure-frame {
      width: min(78%, 820px);
      height: min(76%, 620px);
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #ffffff;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: grid;
      place-items: center;
    }

    .figure-frame img,
    .figure-frame object,
    .figure-frame iframe {
      width: 100%;
      height: 100%;
      display: block;
      border: 0;
      background: #ffffff;
    }

    .figure-frame img {
      object-fit: contain;
    }

    .live-chart-frame {
      width: min(82%, 900px);
      height: min(78%, 640px);
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #ffffff;
      box-shadow: var(--shadow);
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .live-chart {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .chart-grid {
      stroke: #e5e9e5;
      stroke-width: 1;
    }

    .chart-axis {
      stroke: #1b211d;
      stroke-width: 1.5;
    }

    .chart-tick,
    .chart-label {
      fill: var(--muted);
      font-size: 14px;
      font-weight: 620;
    }

    .chart-label {
      fill: var(--ink);
      font-size: 15px;
    }

    .live-series {
      fill: none;
      stroke-width: 3.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .live-point {
      stroke: #ffffff;
      stroke-width: 1.6;
    }

    .empty-figure {
      width: min(560px, 84%);
      min-height: 300px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: #ffffff;
      display: grid;
      place-items: center;
      color: var(--muted);
      box-shadow: var(--shadow-soft);
    }

    .figure-bar {
      position: absolute;
      left: 18px;
      bottom: 16px;
      right: 18px;
      min-height: 44px;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.86);
      display: flex;
      align-items: center;
      gap: 6px;
      overflow-x: auto;
      z-index: 10;
    }

    .figure-tab {
      min-width: 34px;
      height: 32px;
      border-radius: 11px;
      padding: 0 10px;
      color: var(--muted);
      background: transparent;
      font-weight: 760;
    }

    .figure-tab.active,
    .figure-tab:hover {
      color: var(--ink);
      background: #ffffff;
      box-shadow: var(--shadow-soft);
    }

    .side-panel {
      min-width: 0;
      min-height: 0;
      padding: 14px 16px 18px 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 8px;
      overflow: hidden;
    }

    .panel-head {
      min-height: 50px;
      border-bottom: 1px solid var(--line);
      display: grid;
      align-content: center;
      gap: 3px;
      padding: 6px 2px 12px;
    }

    .stage-name {
      color: var(--ink);
      font-size: 17px;
      font-weight: 800;
      line-height: 1.15;
    }

    .stage-status {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
    }

    .panel-body {
      min-width: 0;
      min-height: 0;
      overflow: auto;
      display: grid;
      align-content: start;
      gap: 0;
      padding-right: 2px;
    }

    .section {
      min-width: 0;
      border-top: 1px solid var(--line);
      background: transparent;
      padding: 16px 2px;
      display: grid;
      gap: 12px;
    }

    .panel-body .section:first-child {
      border-top: 0;
      padding-top: 10px;
    }

    .section-title {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .panel-row {
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
      text-transform: uppercase;
    }

    .panel-value {
      color: var(--ink);
      font-size: 20px;
      font-weight: 820;
      text-transform: none;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
    }

    .field input,
    .field select,
    .field textarea,
    .input,
    .select {
      width: 100%;
      min-height: 36px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      outline: none;
      background: #fbfcf8;
      color: var(--ink);
    }

    .field textarea {
      min-height: 88px;
      padding: 10px;
      resize: vertical;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus,
    .input:focus,
    .select:focus {
      border-color: var(--green);
      background: #ffffff;
    }

    .action-row,
    .option-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .template-current {
      min-width: 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #ffffff;
      display: grid;
      gap: 4px;
      text-align: left;
    }

    .template-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--ink);
      font-size: 18px;
      font-weight: 820;
    }

    .template-meta {
      color: var(--muted);
      font-size: 12px;
      font-weight: 680;
    }

    .template-family-list {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .template-family {
      min-height: 30px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: #ffffff;
      font-size: 12px;
      font-weight: 760;
    }

    .template-family.active,
    .template-family:hover {
      border-color: transparent;
      color: var(--green);
      background: var(--green-soft);
    }

    .template-type-list {
      display: grid;
      gap: 7px;
    }

    .template-type {
      min-width: 0;
      min-height: 42px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: #ffffff;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
      color: var(--ink);
      text-align: left;
      font-weight: 760;
    }

    .template-type.active,
    .template-type:hover {
      border-color: var(--green);
      background: #fbfffc;
    }

    .template-type-code {
      color: var(--quiet);
      font-size: 11px;
      font-weight: 760;
    }

    .btn,
    .option {
      min-height: 34px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      color: var(--ink);
      background: #ffffff;
      font-weight: 720;
    }

    .btn.icon-only {
      min-height: 42px;
      justify-content: flex-start;
    }

    .btn:hover,
    .option:hover,
    .option.selected {
      border-color: var(--line-strong);
      background: #f8faf7;
    }

    .btn.primary {
      border-color: #111411;
      color: #ffffff;
      background: #111411;
    }

    .btn.warning {
      color: var(--orange);
      border-color: transparent;
      background: var(--orange-soft);
    }

    .btn:disabled,
    .option:disabled {
      color: var(--quiet);
      background: #edf0ed;
      cursor: not-allowed;
    }

    .hidden-input {
      display: none;
    }

    .file-list,
    .compact-list {
      display: grid;
      gap: 8px;
    }

    .file-row,
    .compact-row {
      min-width: 0;
      min-height: 42px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: #f8faf7;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
    }

    .row-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--ink);
      font-size: 13px;
      font-weight: 760;
    }

    .row-sub {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
      font-size: 12px;
    }

    .dropzone {
      min-height: 84px;
      border: 1px dashed var(--line-strong);
      border-radius: 16px;
      background: #fbfcf8;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 13px;
    }

    .quiet-line {
      min-height: 34px;
      display: flex;
      align-items: center;
      color: var(--quiet);
      font-size: 13px;
    }

    .dropzone.dragover {
      border-color: var(--green);
      color: var(--green);
      background: var(--green-soft);
    }

    .warning-box {
      padding: 10px 12px;
      border-radius: 14px;
      color: var(--orange);
      background: var(--orange-soft);
      font-size: 13px;
      line-height: 1.4;
    }

    .codex-panel {
      border-color: transparent;
      background: var(--orange-soft);
    }

    .canvas-tooltip {
      position: absolute;
      left: 18px;
      top: 16px;
      z-index: 5;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-width: min(620px, 70%);
    }

    @media (max-width: 1100px) {
      .app-shell {
        grid-template-columns: 64px minmax(0, 1fr);
      }

      .side-panel {
        position: fixed;
        right: 12px;
        top: 82px;
        bottom: 14px;
        width: min(330px, calc(100vw - 88px));
        padding: 0;
        z-index: 20;
      }

      .side-panel.collapsed {
        display: none;
      }
    }

    @media (max-width: 720px) {
      body { overflow: auto; }

      .app-shell {
        min-height: 100vh;
        height: auto;
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
        overflow: visible;
      }

      .stage-rail {
        grid-template-columns: auto 1fr auto;
        grid-template-rows: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .stage-stack {
        grid-auto-flow: column;
        align-content: center;
        justify-content: center;
        overflow-x: auto;
      }

      .main-space {
        min-height: 72vh;
        grid-template-rows: auto minmax(560px, 1fr);
      }

      .topbar {
        grid-template-columns: 1fr;
      }

      .tool-strip {
        justify-self: stretch;
        overflow-x: auto;
      }

      .side-panel {
        position: static;
        width: auto;
        padding: 0 12px 16px;
      }

      .source-landing,
      .mapping-stage,
      .render-sheet {
        width: 88%;
        grid-template-columns: 1fr;
      }

      .source-drop {
        min-height: 360px;
      }

      .render-sheet {
        aspect-ratio: auto;
      }

      .render-side {
        border-left: 0;
        border-top: 1px solid var(--line);
      }
    }
  </style>
</head>
<body>
  <div class="app-shell" id="appShell">
    <aside class="stage-rail" aria-label="Stages">
      <div class="mark" title="SciPlot" aria-label="SciPlot">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 16.5h14M7 14c2.4-5.4 4.5-6.4 6.5-2.8 1.8 3.2 3.4 2.6 5.5-3.2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </div>
      <nav class="stage-stack" id="stageNav"></nav>
      <div class="status-strip">
        <span class="status-light" id="statusLight" title="Ready"></span>
      </div>
    </aside>

    <main class="main-space">
      <header class="topbar">
        <input id="projectName" class="project-input" value="SciPlot project" aria-label="Project name">
        <div class="tool-strip" aria-label="Canvas tools">
          <button class="icon-button active" type="button" data-canvas-tool="select" title="Select" aria-label="Select">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 4l11 7-5 1.3 3.1 5.4-2.4 1.4-3.1-5.4-3.6 3.7V4Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
          </button>
          <button class="icon-button" type="button" data-canvas-tool="pan" title="Pan" aria-label="Pan">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v18M3 12h18M7 7l-4 5 4 5M17 7l4 5-4 5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button class="icon-button" type="button" data-canvas-tool="zoom" title="Zoom" aria-label="Zoom">
            <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="10.5" cy="10.5" r="5.5" fill="none" stroke="currentColor" stroke-width="2"/><path d="m15 15 5 5M10.5 8v5M8 10.5h5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
          <input id="zoomRange" class="zoom-range" type="range" min="70" max="160" value="100" aria-label="Zoom">
          <button class="icon-button" type="button" id="fitButton" title="Fit" aria-label="Fit">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 4H4v4M16 4h4v4M8 20H4v-4M16 20h4v-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
        </div>
        <button id="primaryAction" class="primary-action" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Continue</span>
        </button>
      </header>

      <section class="canvas-zone">
        <div id="visualCanvas" class="visual-canvas" aria-label="SciPlot canvas"></div>
      </section>
    </main>

    <aside class="side-panel" id="sidePanel">
      <div class="panel-head">
        <div class="stage-name" id="panelTitle">Data</div>
        <div class="stage-status" id="panelStatus">Ready</div>
      </div>
      <div class="panel-body" id="panelBody"></div>
    </aside>
  </div>

  <script>
    const stageOrder = ["import", "mapping", "generate", "review"];
    const stageMeta = {
      import: { label: "Data", title: "Data", icon: "folder" },
      mapping: { label: "Map", title: "Map", icon: "map" },
      generate: { label: "Render", title: "Render", icon: "play" },
      review: { label: "Review", title: "Review", icon: "figure" }
    };

    const figureSizeOptions = [
      { value: "60x55", label: "60 x 55 mm" },
      { value: "120x55", label: "120 x 55 mm" },
      { value: "180x55", label: "180 x 55 mm" },
      { value: "60x110", label: "60 x 110 mm" },
      { value: "120x110", label: "120 x 110 mm" },
      { value: "180x110", label: "180 x 110 mm" }
    ];

    const exportOptions = [
      { value: "pdf", label: "PDF" },
      { value: "tiff_300", label: "TIFF 300" },
      { value: "png_300", label: "PNG 300" }
    ];

    const replicateModeOptions = [
      { value: "mean", label: "Mean" },
      { value: "representative", label: "Best" },
      { value: "individual", label: "All" }
    ];

    const scaleOptions = [
      { value: "", label: "Auto" },
      { value: "linear", label: "Linear" },
      { value: "log", label: "Log" }
    ];

    const legendPositionOptions = [
      { value: "", label: "Auto" },
      { value: "upper_right", label: "Upper right" },
      { value: "upper_left", label: "Upper left" },
      { value: "lower_right", label: "Lower right" },
      { value: "lower_left", label: "Lower left" }
    ];

    const labelModeOptions = [
      { value: "", label: "Auto" },
      { value: "legend", label: "Legend" },
      { value: "inline", label: "Inline" }
    ];

    const state = {
      stage: "import",
      projectName: "SciPlot project",
      catalog: [],
      dataTypeId: "",
      experimentTypeId: "",
      groups: [{ sample: "Series 1", files: [] }],
      activeGroup: 0,
      activePreviewKey: "",
      tablePreviews: {},
      columnConfirmations: {},
      previewLoading: {},
      previewErrors: {},
      plotOutput: "runs/run_001",
      exports: ["pdf", "tiff_300"],
      figureSize: "60x55",
      replicateMode: "mean",
      templateTouched: false,
      lastProject: null,
      projectStatus: null,
      activeFigure: 0,
      refineOptions: {},
      refineDirty: false,
      livePreviewBusy: false,
      previewInFlight: false,
      rerunInFlight: false,
      livePreviewQueued: false,
      statusText: "Ready",
      error: "",
      canvasTool: "select",
      selectedNode: "data",
      zoom: 1,
      panX: 0,
      panY: 0,
      fileSequence: 0
    };

    let livePreviewTimer = null;

    const appShell = document.querySelector("#appShell");
    const stageNav = document.querySelector("#stageNav");
    const statusLight = document.querySelector("#statusLight");
    const projectNameEl = document.querySelector("#projectName");
    const panelTitle = document.querySelector("#panelTitle");
    const panelStatus = document.querySelector("#panelStatus");
    const panelBody = document.querySelector("#panelBody");
    const visualCanvas = document.querySelector("#visualCanvas");
    const primaryAction = document.querySelector("#primaryAction");
    const zoomRange = document.querySelector("#zoomRange");

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function icon(name) {
      const base = 'fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"';
      const paths = {
        folder: `<svg viewBox="0 0 24 24"><path ${base} d="M4 6.5h6l2 2h8v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-11Z"/></svg>`,
        map: `<svg viewBox="0 0 24 24"><path ${base} d="M4 7l5-2 6 2 5-2v12l-5 2-6-2-5 2V7Z"/><path ${base} d="M9 5v12M15 7v12"/></svg>`,
        play: `<svg viewBox="0 0 24 24"><path ${base} d="M8 5v14l11-7-11-7Z"/></svg>`,
        figure: `<svg viewBox="0 0 24 24"><path ${base} d="M5 19h14M6 16c3.4-8 6.2-9 8.7-3.2 1.4 3.3 2.8 2.7 4.3-2.8"/></svg>`,
        upload: `<svg viewBox="0 0 24 24"><path ${base} d="M12 16V4M7 9l5-5 5 5M5 20h14"/></svg>`,
        plus: `<svg viewBox="0 0 24 24"><path ${base} d="M12 5v14M5 12h14"/></svg>`,
        trash: `<svg viewBox="0 0 24 24"><path ${base} d="M5 7h14M10 11v6M14 11v6M8 7l1-3h6l1 3M7 7l1 13h8l1-13"/></svg>`,
        arrow: `<svg viewBox="0 0 24 24"><path ${base} d="M5 12h14M13 6l6 6-6 6"/></svg>`,
        download: `<svg viewBox="0 0 24 24"><path ${base} d="M12 4v10M8 10l4 4 4-4M5 20h14"/></svg>`,
        reset: `<svg viewBox="0 0 24 24"><path ${base} d="M4 12a8 8 0 1 0 3-6.2M4 5v6h6"/></svg>`,
        codex: `<svg viewBox="0 0 24 24"><path ${base} d="M7 8h10M7 12h7M7 16h5"/><path ${base} d="M5 4h14v16H5z"/></svg>`
      };
      return paths[name] || paths.figure;
    }

    function formatSize(value) {
      const bytes = Number(value || 0);
      if (!Number.isFinite(bytes) || bytes <= 0) return "";
      if (bytes < 1024) return `${bytes} B`;
      if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
      return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
    }

    function currentDataType() {
      return state.catalog.find((item) => item.id === state.dataTypeId) || state.catalog[0] || null;
    }

    function currentExperiment() {
      const dataType = currentDataType();
      const experiments = dataType?.experiments || [];
      return experiments.find((item) => item.id === state.experimentTypeId) || experiments[0] || null;
    }

    function visibleGroups() {
      return state.groups.filter((group) => group.sample.trim() && group.files.length);
    }

    function sampleSummary() {
      const samples = visibleGroups().length;
      const files = allDataFiles().length;
      if (!files) return "Name groups";
      return `${samples} sample${samples === 1 ? "" : "s"} / ${files} file${files === 1 ? "" : "s"}`;
    }

    function replicateModeLabel() {
      return replicateModeOptions.find((item) => item.value === state.replicateMode)?.label || "Mean";
    }

    function allDataFiles() {
      const items = [];
      state.groups.forEach((group, groupIndex) => {
        (group.files || []).forEach((file, fileIndex) => {
          items.push({ group, groupIndex, file, fileIndex, key: fileKey(file) });
        });
      });
      return items;
    }

    function fileKey(file) {
      if (!file.preview_id) {
        state.fileSequence += 1;
        file.preview_id = `file:${state.fileSequence}:${file.name || "data"}`;
      }
      return file.preview_id;
    }

    function activePreviewItem() {
      const items = allDataFiles();
      if (!items.length) return null;
      return items.find((item) => item.key === state.activePreviewKey) || items[0];
    }

    function setStage(stage) {
      state.stage = stage;
      if (stage !== "review") resetCanvasView();
      render();
      if (stage === "mapping") queueActivePreviewLoad();
    }

    function stageReadiness(stage) {
      if (stage === "import") return allDataFiles().length ? "ready" : "";
      if (stage === "mapping") return visibleGroups().length ? "ready" : "";
      if (stage === "generate") return canRender() ? "ready" : "";
      if (stage === "review") return hasRenderedArtifacts() ? "ready" : "";
      return "";
    }

    function hasRenderedArtifacts() {
      return resultFigures().length > 0 || Boolean(state.projectStatus?.preview_figure?.exists);
    }

    function canRender() {
      return visibleGroups().length > 0 && state.exports.length > 0;
    }

    function validFigureSize(value) {
      return figureSizeOptions.some((item) => item.value === value);
    }

    function selectedFigureSize() {
      return validFigureSize(state.figureSize) ? state.figureSize : "60x55";
    }

    function setStatus(text, error = "") {
      state.statusText = text || "Ready";
      state.error = error || "";
      updateChrome();
    }

    function updateChrome() {
      projectNameEl.value = state.projectName;
      const meta = stageMeta[state.stage];
      panelTitle.textContent = meta.title;
      panelStatus.textContent = state.error || state.statusText || "Ready";
      statusLight.classList.toggle("warn", Boolean(state.error || state.projectStatus?.needs_codex || state.lastProject?.run_failed));
      primaryAction.disabled = primaryDisabled();
      primaryAction.querySelector("span").textContent = primaryLabel();
      renderStageNav();
    }

    function primaryDisabled() {
      if (state.stage === "import") return allDataFiles().length === 0;
      if (state.stage === "mapping") return visibleGroups().length === 0;
      if (state.stage === "generate") return !canRender() || state.rerunInFlight;
      if (state.stage === "review") return state.rerunInFlight;
      return false;
    }

    function primaryLabel() {
      if (state.stage === "import") return "Map";
      if (state.stage === "mapping") return "Render";
      if (state.stage === "generate") return state.lastProject?.project_slug ? "Export" : "Render";
      if (state.stage === "review") return "Export";
      return "Continue";
    }

    function renderStageNav() {
      stageNav.innerHTML = stageOrder.map((stage) => `
        <button class="stage-button ${state.stage === stage ? "active" : ""}" type="button" data-stage="${stage}" title="${stageMeta[stage].title}" aria-label="${stageMeta[stage].title}">
          ${icon(stageMeta[stage].icon)}
        </button>
      `).join("");
      stageNav.querySelectorAll("[data-stage]").forEach((button) => {
        const stage = button.dataset.stage;
        button.addEventListener("click", () => setStage(stage));
        const dot = document.createElement("span");
        dot.className = `stage-dot ${stageReadiness(stage)}`;
        button.appendChild(dot);
      });
    }

    function render() {
      updateChrome();
      panelBody.innerHTML = renderPanel();
      visualCanvas.innerHTML = renderCanvas();
      attachPanelHandlers();
      attachCanvasHandlers();
      updateCanvasTransform();
    }

    function renderPanel() {
      if (state.stage === "import") return renderImportPanel();
      if (state.stage === "mapping") return renderMappingPanel();
      if (state.stage === "generate") return renderGeneratePanel();
      if (state.stage === "review") return renderReviewPanel();
      return "";
    }

    function renderCanvas() {
      const tooltip = `
        <div class="canvas-watermark">
          <span class="phase-chip"><span class="pulse"></span>${escapeHtml(stageMeta[state.stage].title)}</span>
        </div>
      `;
      return `${tooltip}<div class="visual-board" id="visualBoard">${renderCanvasBoard()}</div>`;
    }

    function renderCanvasBoard() {
      if (state.stage === "import") return renderImportCanvas();
      if (state.stage === "mapping") return renderMappingCanvas();
      if (state.stage === "generate") return renderGenerateCanvas();
      if (state.stage === "review") return renderReviewCanvas();
      return "";
    }

    function renderImportCanvas() {
      const files = allDataFiles();
      const family = currentDataType()?.label || "Auto";
      const experiment = currentExperiment()?.label || "Auto";
      const fileCount = files.length;
      return `
        <div class="flow-map">
          <div class="source-landing">
            <div class="source-drop ${fileCount ? "ready" : ""}" id="dropzone">
              <div class="source-main">
                <span class="source-symbol">${icon(fileCount ? "figure" : "upload")}</span>
                <h2 class="source-title">${fileCount ? `${fileCount} file${fileCount === 1 ? "" : "s"}` : "Drop data"}</h2>
                <span class="source-subline">${fileCount ? escapeHtml(files.slice(0, 3).map((item) => item.file.name).join(" / ")) : "Files, folder, or saved project"}</span>
              </div>
              <div class="canvas-actions">
                <button class="canvas-command" type="button" data-canvas-command="files">${icon("upload")}Files</button>
                <button class="canvas-command" type="button" data-canvas-command="folder">${icon("folder")}Folder</button>
                <button class="canvas-command" type="button" data-canvas-command="open">${icon("folder")}Open</button>
              </div>
            </div>
            <div class="source-path">
            <button class="flow-node ${state.selectedNode === "intent" ? "active" : ""}" type="button" data-node="intent">
              <span class="node-icon blue">${icon("map")}</span>
              <span>
                <h2 class="node-title">Intent</h2>
                <span class="node-meta">${escapeHtml(family)} / ${escapeHtml(experiment)}</span>
              </span>
            </button>
            <button class="flow-node ${state.selectedNode === "samples" ? "active" : ""}" type="button" data-node="samples">
              <span class="node-icon green">${icon("figure")}</span>
              <span>
                <h2 class="node-title">Samples</h2>
                <span class="node-meta">${escapeHtml(sampleSummary())}</span>
              </span>
            </button>
            </div>
          </div>
        </div>
      `;
    }

    function renderMappingCanvas() {
      const item = activePreviewItem();
      const preview = item ? state.tablePreviews[item.key] : null;
      const columns = preview?.columns || [];
      const xColumn = columns.find((column) => column.suggested_role === "x");
      const yColumns = columns.filter((column) => column.suggested_role === "y");
      return `
        <div class="mapping-map">
          <div class="mapping-stage">
            <section class="map-column">
              <h2 class="map-title">Series</h2>
              <div class="sample-list">
                ${state.groups.map((group, index) => `
                  <button class="sample-lane ${index === state.activeGroup ? "active" : ""}" type="button" data-active-group="${index}">
                    <span class="drag-handle" aria-hidden="true">::</span>
                    <span class="row-title">${escapeHtml(group.sample || `Sample ${index + 1}`)}</span>
                    <span class="file-count">${group.files.length}</span>
                  </button>
                `).join("")}
              </div>
            </section>
            <section class="map-column">
              <h2 class="map-title">Replicates</h2>
              <div class="column-stack">
                <div class="role-row">
                  <span class="role-key">R</span>
                  <span class="row-title">${escapeHtml(replicateModeLabel())}</span>
                </div>
                <div class="role-row">
                  <span class="role-key">N</span>
                  <span class="row-title">${allDataFiles().length}</span>
                </div>
              </div>
            </section>
            <section class="map-column">
              <h2 class="map-title">Auto</h2>
              <div class="column-track">
                ${xColumn ? `<span class="role-pill">X · ${escapeHtml(xColumn.name)}</span>` : ""}
                ${yColumns.slice(0, 4).map((column) => `<span class="role-pill">Y · ${escapeHtml(column.name)}</span>`).join("")}

    function buildLiveChart(spec) {
      const width = 900;
      const height = 560;
      const left = 92;
      const right = 842;
      const top = 48;
      const bottom = 470;
      const options = spec?.contract?.render_options || {};
      const xMode = options.xscale === "log" ? "log" : "linear";
      const yMode = options.yscale === "log" ? "log" : "linear";
      const xLabel = refineOptionValue("x_label_override") || spec?.xAxisLabel || "X";
      const yLabel = refineOptionValue("y_label_override") || spec?.yAxisLabel || "Y";
      const seriesMeta = new Map((spec?.series || []).map((item) => [String(item.label || ""), item]));
      const rowsBySeries = new Map();
      (spec?.data || []).forEach((row) => {
        const x = Number(row.x);
        const y = Number(row.y);
        if (!Number.isFinite(x) || !Number.isFinite(y)) return;
        if (xMode === "log" && x <= 0) return;
        if (yMode === "log" && y <= 0) return;
        const label = String(row.series || "Series");
        if (!rowsBySeries.has(label)) rowsBySeries.set(label, []);
        rowsBySeries.get(label).push({ x, y });
      });
      const allPoints = Array.from(rowsBySeries.values()).flat();
      const xDomain = transformedDomain(allPoints.map((point) => point.x), xMode);
      const yDomain = transformedDomain(allPoints.map((point) => point.y), yMode);
      const scaleX = (value) => left + ((transformValue(value, xMode) - xDomain.min) / (xDomain.max - xDomain.min)) * (right - left);
      const scaleY = (value) => bottom - ((transformValue(value, yMode) - yDomain.min) / (yDomain.max - yDomain.min)) * (bottom - top);
      const palette = ["#176f5d", "#2f6fe4", "#c76b16", "#7c5bc7", "#bd3f5f", "#4f7b2d"];
      const series = Array.from(rowsBySeries.entries()).map(([label, points], index) => {
        const color = safeSeriesColor(seriesMeta.get(label)?.color, palette[index % palette.length]);
        const plotted = points.map((point) => ({
          x: roundCoord(scaleX(point.x)),
          y: roundCoord(scaleY(point.y)),
          rawLabel: `${formatTickValue(point.x)} / ${formatTickValue(point.y)}`
        }));
        return {
          label,
          color,
          points: plotted,
          path: plotted.map((point, pointIndex) => `${pointIndex ? "L" : "M"}${point.x},${point.y}`).join(" ")
        };
      }).filter((seriesItem) => seriesItem.points.length);
      return {
        width,
        height,
        left,
        right,
        top,
        bottom,
        xLabel,
        yLabel,
        xTicks: axisTicks(xDomain, xMode).map((tick) => ({ x: roundCoord(scaleX(tick.value)), label: tick.label })),
        yTicks: axisTicks(yDomain, yMode).map((tick) => ({ y: roundCoord(scaleY(tick.value)), label: tick.label })),
        series
      };
    }

    function transformedDomain(values, mode) {
      const transformed = values.map((value) => transformValue(value, mode)).filter(Number.isFinite);
      if (!transformed.length) return { min: 0, max: 1 };
      let min = Math.min(...transformed);
      let max = Math.max(...transformed);
      if (min === max) {
        const pad = Math.abs(min || 1) * 0.08;
        min -= pad;
        max += pad;
      }
      const pad = (max - min) * 0.04;
      return { min: min - pad, max: max + pad };
    }

    function transformValue(value, mode) {
      return mode === "log" ? Math.log10(value) : value;
    }

    function inverseTransformValue(value, mode) {
      return mode === "log" ? 10 ** value : value;
    }

    function axisTicks(domain, mode) {
      if (mode === "log") {
        const start = Math.ceil(domain.min);
        const end = Math.floor(domain.max);
        const ticks = [];
        for (let power = start; power <= end; power += 1) {
          ticks.push({ value: 10 ** power, label: formatTickValue(10 ** power) });
        }
        if (ticks.length >= 2) return ticks.slice(0, 6);
      }
      return Array.from({ length: 5 }, (_, index) => {
        const value = inverseTransformValue(domain.min + ((domain.max - domain.min) * index) / 4, mode);
        return { value, label: formatTickValue(value) };
      });
    }

    function formatTickValue(value) {
      const number = Number(value);
      if (!Number.isFinite(number)) return "";
      const abs = Math.abs(number);
      if ((abs >= 10000 || (abs > 0 && abs < 0.01))) return number.toExponential(1);
      if (abs >= 100) return number.toFixed(0);
      if (abs >= 10) return number.toFixed(1).replace(/\.0$/, "");
      return number.toFixed(2).replace(/\.?0+$/, "");
    }

    function safeSeriesColor(value, fallback) {
      const color = String(value || "");
      return /^#[0-9a-fA-F]{6}$/.test(color) ? color : fallback;
    }

    function roundCoord(value) {
      return Number(value).toFixed(2);
    }

      return `<div class="figure-frame"><object data="${escapeHtml(url)}" type="${escapeHtml(type || "application/pdf")}"></object></div>`;

      if (!item) return "";

        experimentSelect.onchange = (event) => {
          state.experimentTypeId = event.target.value;
          state.templateTouched = true;
          render();
        };
      }
      document.querySelectorAll("[data-template-family]").forEach((button) => {
        button.onclick = () => {
          state.dataTypeId = button.dataset.templateFamily;
          const experiments = currentDataType()?.experiments || [];
          state.experimentTypeId = experiments[0]?.id || "";
          state.templateTouched = true;
          render();
        };
      });
      document.querySelectorAll("[data-template-experiment]").forEach((button) => {
        button.onclick = () => {
          const experimentId = button.dataset.templateExperiment;
          if (!experimentId) return;
          const owningFamily = state.catalog.find((family) => (
            family.experiments || []
          ).some((experiment) => experiment.id === experimentId));
          if (owningFamily) state.dataTypeId = owningFamily.id;
          state.experimentTypeId = experimentId;
          state.templateTouched = true;
          render();
        };
      });
      const previewFileSelect = document.querySelector("#previewFileSelect");
      if (previewFileSelect) {
        previewFileSelect.onchange = (event) => {
          state.activePreviewKey = event.target.value;
          render();
          queueActivePreviewLoad();
        };
      }
      document.querySelectorAll("[data-replicate-mode]").forEach((button) => {
        button.onclick = () => {
          state.replicateMode = button.dataset.replicateMode;
          render();
        };
      });

      document.querySelectorAll("[data-refine-size]").forEach((button) => {
        button.onclick = () => {
          state.figureSize = button.dataset.refineSize;
          setRefineOption("size", button.dataset.refineSize);
          render();
        };
      });
      document.querySelectorAll("[data-export]").forEach((input) => {
        input.onchange = () => {
          toggleExport(input.dataset.export);
          render();
        };
      });
      const plotOutput = document.querySelector("#plotOutput");
      if (plotOutput) {
        plotOutput.oninput = (event) => {
          state.plotOutput = event.target.value;
        };
      }

      bindRefine("refineXScale", "xscale");
      bindRefine("refineYScale", "yscale");
      bindRefine("refineLegendPosition", "legend_position");
      bindRefine("refineSeriesLabelMode", "series_label_mode");
      bindRefine("refineXLabel", "x_label_override");
      bindRefine("refineYLabel", "y_label_override");

      const previewNowButton = document.querySelector("#previewNowButton");
      if (previewNowButton) previewNowButton.onclick = () => previewProject();
      const applyButton = document.querySelector("#applyButton");
      if (applyButton) applyButton.onclick = applyProject;
      const rerunButton = document.querySelector("#rerunButton");
      if (rerunButton) rerunButton.onclick = rerunProject;
      const resetRefineButton = document.querySelector("#resetRefineButton");
      if (resetRefineButton) resetRefineButton.onclick = () => {
        resetRefineOptionsFromProject();
        state.workbenchPreview = null;
        render();
      };
      const runCodexButton = document.querySelector("#runCodexButton");
      if (runCodexButton) runCodexButton.onclick = startCodexJob;
      const codexGoal = document.querySelector("#codexGoal");
      if (codexGoal) codexGoal.oninput = (event) => {
        state.codexGoal = event.target.value;
      };
    }

    function attachCanvasHandlers() {
      visualCanvas.querySelectorAll("[data-node]").forEach((button) => {
        button.onclick = () => {
          state.selectedNode = button.dataset.node;
          render();
        };
      });
      visualCanvas.querySelectorAll("[data-canvas-command]").forEach((button) => {
        button.onclick = () => {
          const command = button.dataset.canvasCommand;
          if (command === "files") document.querySelector("#fileInput")?.click();
          if (command === "folder") document.querySelector("#folderInput")?.click();
          if (command === "open") openProjectPrompt();
        };
      });
      visualCanvas.querySelectorAll("[data-figure-index]").forEach((button) => {
        button.onclick = () => {
          state.activeFigure = Number(button.dataset.figureIndex);
          render();
        };
      });

      const dropzone = document.querySelector("#dropzone");
      if (dropzone) {
        ["dragenter", "dragover"].forEach((eventName) => {
          dropzone.addEventListener(eventName, (event) => {
            event.preventDefault();
            dropzone.classList.add("dragover");
          });
        });
        ["dragleave", "drop"].forEach((eventName) => {
          dropzone.addEventListener(eventName, (event) => {
            event.preventDefault();
            dropzone.classList.remove("dragover");
          });
        });
        dropzone.addEventListener("drop", (event) => addFiles(Array.from(event.dataTransfer.files || [])));
      }

      let dragging = false;
      let startX = 0;
      let startY = 0;
      let originX = 0;
      let originY = 0;
      visualCanvas.onpointerdown = (event) => {
        if (state.canvasTool !== "pan") return;
        dragging = true;
        startX = event.clientX;
        startY = event.clientY;
        originX = state.panX;
        originY = state.panY;
        visualCanvas.setPointerCapture(event.pointerId);
      };
      visualCanvas.onpointermove = (event) => {
        if (!dragging) return;
        state.panX = originX + event.clientX - startX;
        state.panY = originY + event.clientY - startY;
        updateCanvasTransform();
      };
      visualCanvas.onpointerup = () => {
        dragging = false;
      };
      visualCanvas.onwheel = (event) => {
        if (state.canvasTool !== "zoom") return;
        event.preventDefault();
        const next = Math.min(1.6, Math.max(0.7, state.zoom + (event.deltaY < 0 ? 0.08 : -0.08)));
        state.zoom = next;
        zoomRange.value = Math.round(next * 100);
        updateCanvasTransform();
      };
    }

    function updateCanvasOnly() {
      visualCanvas.innerHTML = renderCanvas();
      attachCanvasHandlers();
      updateCanvasTransform();
    }

    function updateCanvasTransform() {
      const board = document.querySelector("#visualBoard");
      if (!board) return;
      board.style.transform = `translate(${state.panX}px, ${state.panY}px) scale(${state.zoom})`;
    }

    function resetCanvasView() {
      state.zoom = 1;
      state.panX = 0;
      state.panY = 0;
      zoomRange.value = "100";
    }

    function primaryActionHandler() {
      if (state.stage === "import") {
        setStage("mapping");
        return;
      }
      if (state.stage === "mapping") {
        setStage("generate");
        return;
      }
      if (state.stage === "generate") {
        submitExport();
        return;
      }
      if (state.stage === "review") {
        rerunProject();
      }
    }

    function openProjectPrompt() {
      const slug = window.prompt("Project slug");
      if (!slug) return;
      loadProject(slug.trim());
    }

    function replaceSource() {
      state.groups = [{ sample: "Series 1", files: [] }];
      state.activeGroup = 0;
      state.activePreviewKey = "";
      state.tablePreviews = {};
      state.columnConfirmations = {};
      state.previewErrors = {};
      state.previewLoading = {};
      state.lastProject = null;
      state.projectStatus = null;
      setStage("import");
    }

    function addFiles(files) {
      if (!files.length) return;
      const group = state.groups[state.activeGroup] || state.groups[0];
      group.files.push(...files.map((file) => ({
        name: file.name,
        size: file.size,
        file,
        preview_id: `upload:${++state.fileSequence}:${file.name}`
      })));
      state.activePreviewKey = fileKey(group.files[group.files.length - 1]);
      setStatus(`${files.length} added`);
      render();
    }

    function addGroup() {
      state.groups.push({ sample: `Series ${state.groups.length + 1}`, files: [] });
      state.activeGroup = state.groups.length - 1;
      render();
    }

    function removeGroup(index) {
      if (state.groups.length <= 1) return;
      const [removed] = state.groups.splice(index, 1);
      (removed.files || []).forEach((file) => clearFileCaches(file));
      state.activeGroup = Math.min(state.activeGroup, state.groups.length - 1);
      render();
    }

    function removeFile(groupIndex, fileIndex) {
      const group = state.groups[groupIndex];
      if (!group) return;
      const [removed] = group.files.splice(fileIndex, 1);
      clearFileCaches(removed);
      render();
    }

    function clearFileCaches(file) {
      if (!file) return;
      const key = fileKey(file);
      delete state.tablePreviews[key];
      delete state.columnConfirmations[key];
      delete state.previewLoading[key];
      delete state.previewErrors[key];
      if (state.activePreviewKey === key) state.activePreviewKey = "";
    }

    function moveGroup(fromIndex, toIndex) {
      if (fromIndex === toIndex) return;
      if (fromIndex < 0 || toIndex < 0 || fromIndex >= state.groups.length || toIndex >= state.groups.length) return;
      const [group] = state.groups.splice(fromIndex, 1);
      state.groups.splice(toIndex, 0, group);
      state.activeGroup = toIndex;
      render();
    }

    function toggleExport(value) {
      if (state.exports.includes(value)) {
        state.exports = state.exports.filter((item) => item !== value);
      } else {
        state.exports.push(value);
      }
    }

    async function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result).split(",", 2)[1] || "");
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(file);
      });
    }

    async function queueActivePreviewLoad() {
      const item = activePreviewItem();
      if (!item) return;
      const key = item.key;
      if (state.tablePreviews[key] || state.previewLoading[key]) return;
      state.previewLoading[key] = true;
      render();
      await loadTablePreview(item, key);
    }

    async function ensureAllPreviewsLoaded() {
      for (const item of allDataFiles()) {
        const key = item.key;
        if (state.tablePreviews[key] || state.previewLoading[key]) continue;
        state.previewLoading[key] = true;
        await loadTablePreview(item, key);
      }
    }

    async function loadTablePreview(item, key) {
      try {
        const body = {
          name: item.file.name || "table",
          source_path: item.file.source_path || ""
        };
        if (!body.source_path && item.file.file) {
          body.content_base64 = await fileToBase64(item.file.file);
        }
        const response = await fetch("/api/table-preview", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "Columns failed");
        state.tablePreviews[key] = payload;
        delete state.previewErrors[key];
        ensureColumnConfirmation(key, payload, item);
      } catch (error) {
        state.previewErrors[key] = error.message;
      } finally {
        delete state.previewLoading[key];
        render();
      }
    }

    function ensureColumnConfirmation(key, preview, item) {
      if (!key || !preview || state.columnConfirmations[key]) return;
      state.columnConfirmations[key] = {
        sample: item?.group?.sample || "",
        file_name: item?.file?.name || preview.name || "table",
        source_path: item?.file?.source_path || "",
        sheet: preview.sheet || "",
        columns: (preview.columns || []).map((column) => ({
          index: Number(column.index),
          name: column.name,
          inferred_type: column.inferred_type || "auto",
          confirmed_type: column.inferred_type || "auto",
          role: column.suggested_role || "auto"
        }))
      };
    }

    function collectColumnConfirmations() {
      return Object.values(state.columnConfirmations).filter((item) => item && item.columns?.length);
    }

    function selectedSeriesOrder() {
      return visibleGroups().map((group) => group.sample.trim()).filter(Boolean);
    }

    async function exportProject() {
      state.rerunInFlight = true;
      setStatus("Reading");
      render();
      await ensureAllPreviewsLoaded();
      const groups = [];
      for (const group of state.groups) {
        if (!group.sample.trim() || !group.files.length) continue;
        const files = [];
        for (const item of group.files) {
          if (item.source_path) {
            files.push({ name: item.name, source_path: item.source_path });
          } else {
            files.push({ name: item.name, content_base64: await fileToBase64(item.file) });
          }
        }
        groups.push({ sample: group.sample.trim(), files });
      }
      setStatus("Rendering");
      render();
      try {
        const response = await fetch("/api/projects", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            project_name: state.projectName.trim() || "SciPlot project",
            data_type_id: state.dataTypeId,
            experiment_type_id: state.experimentTypeId,
            groups,
            plot_output: state.plotOutput.trim() || "runs/run_001",
            exports: state.exports,
            render_options: {
              series_order: selectedSeriesOrder()
            },
            replicate_mode: state.replicateMode,
            column_confirmations: collectColumnConfirmations(),
            run_after_create: true
          })
        });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "Render failed");
        state.lastProject = payload;
        state.rerunInFlight = false;
        await refreshProjectStatus();
        resetRefineOptionsFromProject();
        setStatus(payload.run_failed ? "Check" : "Ready");
        setStage(payload.run_failed ? "generate" : "review");
      } catch (error) {
        state.rerunInFlight = false;
        setStatus(error.message, error.message);
        render();
      }
    }

    async function submitExport() {
      if (state.lastProject?.project_slug) {
        await rerunProject();
      } else {
        await exportProject();
      }
    }

    function currentProjectRenderOptions() {
      return state.projectStatus?.manifest?.plot_options?.render_options || state.lastProject?.plot_options?.render_options || {};
    }

    function resetRefineOptionsFromProject() {
      const options = currentProjectRenderOptions();
      state.refineOptions = {
        size: options.size || selectedFigureSize(),
        xscale: options.xscale || "",
        yscale: options.yscale || "",
        legend_position: options.legend_position || "",
        series_label_mode: options.series_label_mode || "",
        x_label_override: options.x_label_override || "",
        y_label_override: options.y_label_override || ""
      };
      state.refineDirty = false;
    }

    function refineOptionValue(name) {
      if (!state.refineDirty && Object.keys(state.refineOptions).length === 0) resetRefineOptionsFromProject();
      return state.refineOptions[name] ?? "";
    }

    function setRefineOption(name, value) {
      state.refineOptions = { ...state.refineOptions, [name]: value };
      state.refineDirty = true;
      scheduleLivePreview();
    }

    function bindRefine(id, key) {
      const element = document.querySelector(`#${id}`);
      if (!element) return;
      element.oninput = (event) => setRefineOption(key, event.target.value);
      element.onchange = (event) => setRefineOption(key, event.target.value);
    }

    function scheduleLivePreview(delay = 360) {
      if (state.stage !== "review" || !state.lastProject?.project_slug) return;
      window.clearTimeout(livePreviewTimer);
      livePreviewTimer = window.setTimeout(() => previewProject({ silent: true }), delay);
    }

    function compactRenderOptions(options) {
      const compact = {};
      Object.entries(options).forEach(([key, value]) => {
        if (value === "" || value === null || value === undefined) return;
        compact[key] = value;
      });
      return compact;
    }

    function renderOptionsForProjectRerun() {
      const options = compactRenderOptions(state.refineOptions);
      if (!options.size) options.size = selectedFigureSize();
      const order = selectedSeriesOrder();
      if (order.length) {
        options.series_order = order;
        options.series_include = order;
      }
      return options;
    }

    function workbenchRequestPayload(includeReviewNote = false) {
      return {
        exports: state.exports,
        render_options: renderOptionsForProjectRerun(),
        series_order: selectedSeriesOrder(),
        review_note: includeReviewNote ? state.refineOptions.review_note || "" : ""
      };
    }

    async function previewProject(options = {}) {
      if (!state.lastProject?.project_slug) return;
      if (state.previewInFlight) {
        state.livePreviewQueued = true;
        return;
      }
      const silent = Boolean(options.silent);
      state.previewInFlight = true;
      setStatus(silent ? "Updating" : "Update");
      render();
      try {
        const response = await fetch(`/api/projects/${encodeURIComponent(state.lastProject.project_slug)}/workbench/preview`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(workbenchRequestPayload(false))
        });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "Update failed");
        state.previewInFlight = false;
        state.workbenchPreview = payload;
        setStatus("Live ready");
        render();
      } catch (error) {
        state.previewInFlight = false;
        setStatus(error.message, error.message);
        render();
      } finally {
        if (state.livePreviewQueued) {
          state.livePreviewQueued = false;
          scheduleLivePreview(80);
        }
      }
    }

    async function applyProject() {
      if (!state.lastProject?.project_slug || state.rerunInFlight) return;
      state.rerunInFlight = true;
      setStatus("Apply");
      render();
      try {
        const response = await fetch(`/api/projects/${encodeURIComponent(state.lastProject.project_slug)}/workbench/apply`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(workbenchRequestPayload(true))
        });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "Apply failed");
        state.lastProject = payload;
        state.rerunInFlight = false;
        await refreshProjectStatus();
        resetRefineOptionsFromProject();
        setStatus("Applied");
        render();
      } catch (error) {
        state.rerunInFlight = false;
        setStatus(error.message, error.message);
        render();
      }
    }

    async function rerunProject() {
      if (!state.lastProject?.project_slug || state.rerunInFlight) return;
      state.rerunInFlight = true;
      setStatus("Exporting");
      render();
      try {
        const response = await fetch(`/api/projects/${encodeURIComponent(state.lastProject.project_slug)}/rerun`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(workbenchRequestPayload(true))
        });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "Export failed");
        state.lastProject = payload;
        state.rerunInFlight = false;
        state.workbenchPreview = null;
        await refreshProjectStatus();
        resetRefineOptionsFromProject();
        setStatus(payload.run_failed ? "Check" : "Ready");
        setStage(payload.run_failed ? "generate" : "review");
      } catch (error) {
        state.rerunInFlight = false;
        setStatus(error.message, error.message);
        render();
      }
    }

    async function refreshProjectStatus() {
      if (!state.lastProject?.project_slug) return;
      const response = await fetch(`/api/projects/${encodeURIComponent(state.lastProject.project_slug)}/status`);
      const payload = await response.json();
      if (!response.ok) throw new Error(payload.error || "Status failed");
      state.projectStatus = payload;
      if (payload.manifest) applyManifest(payload.manifest);
    }

    async function loadProject(slug) {
      try {
        const response = await fetch(`/api/projects/${encodeURIComponent(slug)}/status`);
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "Open failed");
        state.projectStatus = payload;
        state.workbenchPreview = null;
        state.lastProject = {
          project_slug: payload.project_slug,
          project_dir: payload.project_dir,
          plot_request: payload.plot_request,
          outputs_dir: payload.outputs_dir,
          last_run: payload.last_run,
          download_name: `${payload.project_slug}.zip`
        };
        applyManifest(payload.manifest || {});
        resetRefineOptionsFromProject();
        setStage(hasRenderedArtifacts() ? "review" : "generate");
      } catch (error) {
        setStatus(error.message, error.message);
        render();
      }
    }

    function applyManifest(manifest) {
      state.projectName = manifest.project_name || manifest.project_slug || state.projectName;
      if (manifest.data_type?.id) state.dataTypeId = manifest.data_type.id;
      if (manifest.experiment?.id) state.experimentTypeId = manifest.experiment.id;
      if (manifest.data_type?.id || manifest.experiment?.id) state.templateTouched = false;
      if (Array.isArray(manifest.groups) && manifest.groups.length) {
        state.groups = manifest.groups.map((group) => ({
          sample: group.sample || "Sample",
          files: (group.files || []).map((file) => ({
            name: file.original_name || String(file.source_path || "").split("/").pop() || "data",
            source_path: file.source_path,
            size_bytes: file.size_bytes,
            preview_id: `source:${file.source_path || file.original_name}`
          }))
        }));
      }
      if (manifest.plot_options?.output) state.plotOutput = manifest.plot_options.output;
      if (manifest.plot_options?.exports?.length) state.exports = manifest.plot_options.exports;
      if (manifest.plot_options?.render_options?.size) state.figureSize = manifest.plot_options.render_options.size;
      if (manifest.plot_options?.replicate_mode) state.replicateMode = manifest.plot_options.replicate_mode;
    }

    function resultFigures() {
      return (state.projectStatus?.figures || state.lastProject?.last_run?.figures?.map((path) => ({
        name: String(path).split("/").pop(),
        path: String(path),
        url: "",
        exists: true
      })) || []).filter((item) => item && (item.exists !== false));
    }

    async function startCodexJob() {
      if (!state.lastProject) return;
      try {
        setStatus("Codex");
        const response = await fetch("/api/codex/jobs", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            project_slug: state.lastProject.project_slug,
            project_dir: state.lastProject.project_dir,
            plot_request: state.lastProject.plot_request,
            run_output: state.projectStatus?.last_run?.output || state.lastProject.outputs_dir,
            intervention_request: state.projectStatus?.artifacts?.intervention_request?.path,
            failure: state.projectStatus?.last_run?.failure || state.lastProject.failure,
            user_goal: state.codexGoal || ""
          })
        });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "Codex failed");
        state.codexJob = payload;
        setStatus(`Codex ${payload.status}`);
        await refreshProjectStatus();
        render();
      } catch (error) {
        setStatus(error.message, error.message);
        render();
      }
    }

    async function loadCatalog() {
      const response = await fetch("/api/catalog");
      const payload = await response.json();
      state.catalog = payload.data_types || [];
      if (!state.dataTypeId && state.catalog[0]) {
        state.dataTypeId = state.catalog[0].id;
        state.experimentTypeId = state.catalog[0].experiments?.[0]?.id || "";
      }
    }

    async function loadSessionFromQuery() {
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get("session");
      if (!sessionId) return;
      const response = await fetch(`/api/session/${encodeURIComponent(sessionId)}`);
      const payload = await response.json();
      if (!response.ok) return;
      state.projectName = payload.project_name || state.projectName;
      state.dataTypeId = payload.data_type_id || state.dataTypeId;
      state.experimentTypeId = payload.experiment_type_id || state.experimentTypeId;
      if (Array.isArray(payload.groups) && payload.groups.length) {
        state.groups = payload.groups.map((group) => ({
          sample: group.sample || "Sample",
          files: (group.files || []).map((file) => ({
            name: file.name || String(file.source_path || "").split("/").pop() || "data",
            source_path: file.source_path,
            size_bytes: file.size_bytes,
            preview_id: `source:${file.source_path || file.name}`
          }))
        }));
      }
    }

    async function loadProjectFromQuery() {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get("project");
      if (slug) await loadProject(slug);
    }

    async function boot() {
      try {
        await loadCatalog();
        await loadSessionFromQuery();
        await loadProjectFromQuery();
        if (!state.projectStatus) render();
        if (state.stage === "mapping") queueActivePreviewLoad();
      } catch (error) {
        setStatus(error.message, error.message);
        render();
      }
    }

    boot();
  </script>
</body>
</html>
