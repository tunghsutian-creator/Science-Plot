<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SciPlot Workbench</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef1f4;
      --window: #f7f9fb;
      --chrome: #16202a;
      --chrome-2: #222c37;
      --panel: #ffffff;
      --panel-strong: #f9fbfd;
      --line: #d8dee6;
      --line-strong: #0f7a83;
      --text: #161a1f;
      --muted: #667085;
      --quiet: #98a2b3;
      --accent: #0f7a83;
      --accent-2: #315fbd;
      --accent-soft: #e6f4f4;
      --warning: #9a5b00;
      --warning-soft: #fff4d6;
      --success: #167047;
      --danger: #b42318;
      --shadow: 0 18px 44px rgba(16, 24, 40, 0.12);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        linear-gradient(90deg, rgba(22, 32, 42, 0.035) 1px, transparent 1px),
        linear-gradient(180deg, rgba(22, 32, 42, 0.035) 1px, transparent 1px),
        var(--bg);
      background-size: 28px 28px;
      letter-spacing: 0;
    }

    button, input, textarea { font: inherit; }

    button {
      border: 0;
      cursor: pointer;
    }

    a {
      color: var(--accent-2);
      text-decoration: none;
    }

    .app {
      width: min(1500px, calc(100vw - 24px));
      min-height: calc(100vh - 24px);
      margin: 12px auto;
      display: grid;
      grid-template-columns: 248px minmax(0, 1fr) 304px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--window);
      box-shadow: var(--shadow);
    }

    .rail {
      min-width: 0;
      padding: 16px;
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      background: var(--chrome);
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 16px;
      color: #f4f7fb;
    }

    .traffic {
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ff5f57;
    }

    .dot:nth-child(2) { background: #ffbd2e; }
    .dot:nth-child(3) { background: #28c840; }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 42px;
      font-size: 18px;
      font-weight: 760;
    }

    .brand-mark {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      color: white;
      display: grid;
      place-items: center;
      background: var(--accent);
    }

    .nav {
      display: grid;
      gap: 6px;
      align-content: start;
      grid-auto-rows: min-content;
    }

    .nav-button {
      min-height: 42px;
      padding: 0 10px;
      border-radius: 8px;
      color: #c5ced8;
      background: transparent;
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: left;
      font-weight: 660;
    }

    .nav-index {
      width: 24px;
      height: 24px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      color: #d5dde6;
      background: rgba(255, 255, 255, 0.08);
      font-size: 12px;
      font-weight: 760;
    }

    .nav-label {
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .nav-button.active {
      color: #ffffff;
      background: rgba(255, 255, 255, 0.11);
      box-shadow: inset 3px 0 0 var(--accent);
    }

    .nav-button.active .nav-index {
      color: #ffffff;
      background: var(--accent);
    }

    .workspace {
      min-width: 0;
      display: grid;
      grid-template-rows: 72px minmax(0, 1fr) 60px;
      background: var(--window);
    }

    .banner {
      margin: 14px 22px 0;
      padding: 11px 14px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 14px;
      font-weight: 600;
    }

    .banner[hidden] { display: none; }

    .banner.error {
      color: var(--danger);
      background: #fef3f2;
      border: 1px solid rgba(179, 38, 30, 0.28);
    }

    .banner.busy {
      color: var(--accent);
      background: var(--accent-soft);
      border: 1px solid var(--line-strong);
    }

    .banner-dismiss {
      min-width: 24px;
      height: 24px;
      border-radius: 7px;
      color: inherit;
      background: rgba(0, 0, 0, 0.06);
      font-weight: 800;
      line-height: 1;
    }

    .spinner {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid currentColor;
      border-right-color: transparent;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .topbar {
      padding: 0 22px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 14px;
      justify-content: space-between;
    }

    .title-wrap {
      min-width: 0;
      display: grid;
      gap: 3px;
    }

    .eyebrow {
      color: var(--muted);
      font-size: 12px;
      font-weight: 720;
      letter-spacing: 0;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .project-name {
      width: min(340px, 40vw);
      height: 36px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      background: var(--panel);
      outline: none;
    }

    .project-name:focus,
    .field-input:focus,
    .sample-input:focus,
    textarea:focus {
      border-color: var(--line-strong);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .canvas {
      min-height: 0;
      padding: 18px;
      overflow: auto;
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .canvas-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(260px, 0.42fr);
      gap: 14px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
    }

    .panel .panel {
      border-radius: 0;
      border: 0;
      background: transparent;
      overflow: visible;
    }

    .panel-head {
      min-height: 46px;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-weight: 720;
      background: var(--panel-strong);
    }

    .panel-body {
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .result-stage {
      min-height: 420px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .result-stage iframe,
    .result-stage object {
      width: 100%;
      height: 100%;
      min-height: 420px;
      border: 0;
      background: #fff;
    }

    .placeholder {
      padding: 28px;
      color: var(--muted);
      text-align: center;
      line-height: 1.45;
    }

    .metric-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .metric {
      min-height: 78px;
      padding: 12px;
      border-radius: 8px;
      background: var(--panel-strong);
      border: 1px solid var(--line);
      display: grid;
      align-content: center;
      gap: 5px;
    }

    .metric-value {
      font-size: 22px;
      font-weight: 760;
    }

    .metric-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .list {
      display: grid;
      gap: 7px;
    }

    .preview-toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: end;
    }

    .table-wrap {
      max-height: 340px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .data-table {
      width: 100%;
      min-width: 620px;
      border-collapse: collapse;
      font-size: 12px;
    }

    .data-table th,
    .data-table td {
      max-width: 190px;
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      border-right: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .data-table th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: var(--panel-strong);
      color: var(--muted);
      font-weight: 740;
    }

    .data-table th:first-child,
    .data-table td:first-child {
      width: 54px;
      max-width: 54px;
      color: var(--quiet);
      background: #fbfcfd;
      text-align: right;
    }

    .column-confirm-list {
      display: grid;
      gap: 8px;
    }

    .column-confirm-head {
      display: grid;
      grid-template-columns: minmax(130px, 1.3fr) minmax(110px, 0.8fr) minmax(110px, 0.8fr);
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 740;
      padding: 0 9px;
    }

    .column-confirm-row {
      min-height: 52px;
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-strong);
      display: grid;
      grid-template-columns: minmax(130px, 1.3fr) minmax(110px, 0.8fr) minmax(110px, 0.8fr);
      gap: 8px;
      align-items: center;
    }

    .column-name {
      min-width: 0;
      display: grid;
      gap: 3px;
    }

    .column-select {
      min-width: 0;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      background: #fff;
      outline: none;
    }

    .row {
      min-height: 40px;
      padding: 9px 11px;
      border-radius: 8px;
      background: var(--panel-strong);
      border: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 14px;
    }

    .row-main {
      min-width: 0;
      display: grid;
      gap: 3px;
    }

    .row-title {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-weight: 620;
    }

    .row-subtitle {
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .chip {
      min-height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      color: var(--muted);
      background: #eef2f6;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .chip.warning {
      color: var(--warning);
      background: var(--warning-soft);
    }

    .chip.success {
      color: var(--success);
      background: rgba(24, 128, 56, 0.1);
    }

    .groups {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 14px;
      align-items: start;
    }

    .sample-list {
      display: grid;
      gap: 6px;
      padding: 12px;
    }

    .sample-row {
      min-height: 48px;
      padding: 8px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto auto;
      gap: 8px;
      align-items: center;
    }

    .sample-row.active {
      border-color: var(--line-strong);
      background: var(--accent-soft);
    }

    .sample-row.dragging { opacity: 0.55; }
    .sample-row.drag-over {
      border-color: var(--accent);
      background: rgba(0, 122, 255, 0.08);
    }

    .drag-handle {
      width: 28px;
      height: 34px;
      border-radius: 6px;
      color: var(--muted);
      background: #eef2f6;
      display: grid;
      place-items: center;
      font-size: 15px;
      font-weight: 700;
      cursor: grab;
      user-select: none;
    }

    .sample-remove {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      color: var(--muted);
      background: #eef2f6;
      display: grid;
      place-items: center;
      font-size: 18px;
      font-weight: 740;
      line-height: 1;
    }

    .sample-remove:disabled {
      cursor: default;
      opacity: 0.35;
    }

    .sample-input,
    .field-input,
    textarea {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      background: var(--panel);
      outline: none;
    }

    .sample-input {
      height: 34px;
      padding: 0 9px;
    }

    .field-input {
      min-height: 38px;
      padding: 0 11px;
    }

    textarea {
      min-height: 92px;
      padding: 10px 11px;
      resize: vertical;
    }

    .file-count {
      min-width: 26px;
      height: 26px;
      padding: 0 8px;
      border-radius: 999px;
      color: var(--muted);
      display: grid;
      place-items: center;
      background: #eef2f6;
      font-size: 13px;
      font-weight: 680;
    }

    .dropzone {
      min-height: 260px;
      margin: 12px;
      border: 1.5px dashed rgba(60, 60, 67, 0.28);
      border-radius: 8px;
      background: #f8fafc;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
    }

    .dropzone.dragover {
      border-color: var(--accent);
      background: rgba(0, 122, 255, 0.1);
    }

    .drop-title {
      margin-bottom: 6px;
      color: var(--text);
      font-size: 19px;
      font-weight: 720;
    }

    .file-list {
      display: grid;
      gap: 8px;
      padding: 0 14px 14px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .field-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 720;
    }

    .option-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .option-pill {
      min-height: 34px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      background: var(--panel);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 650;
    }

    .option-pill.selected {
      border-color: var(--line-strong);
      color: var(--accent);
      background: var(--accent-soft);
    }

    .option-pill input { accent-color: var(--accent); }

    .btn {
      min-width: 84px;
      min-height: 36px;
      padding: 0 13px;
      border-radius: 8px;
      color: var(--text);
      background: #eef2f6;
      font-weight: 680;
    }

    .btn.primary {
      color: white;
      background: var(--accent);
    }

    .btn.warning {
      color: #3a2600;
      background: var(--warning-soft);
    }

    .btn:disabled {
      cursor: default;
      opacity: 0.42;
    }

    .footer {
      padding: 0 18px;
      border-top: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .inspector {
      min-width: 0;
      padding: 16px;
      border-left: 1px solid var(--line);
      background: #ffffff;
      overflow: auto;
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .inspector-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      font-weight: 760;
    }

    .inspector-section {
      display: grid;
      gap: 9px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--panel);
    }

    .section-title {
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
      letter-spacing: 0;
    }

    .mono {
      font-family: "SF Mono", Menlo, Consolas, monospace;
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .status-line {
      color: var(--muted);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .footer-actions {
      display: flex;
      gap: 8px;
    }

    .inline-fit {
      width: max-content;
    }

    .download-button {
      width: max-content;
      display: grid;
      place-items: center;
    }

    .choice-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(172px, 1fr));
      gap: 10px;
    }

    .choice-tile {
      min-height: 140px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      background: #ffffff;
      text-align: left;
      display: grid;
      align-content: space-between;
      gap: 10px;
    }

    .choice-tile.selected {
      border-color: var(--line-strong);
      background: var(--accent-soft);
      box-shadow: inset 0 0 0 1px rgba(15, 122, 131, 0.14);
    }

    .choice-visual {
      height: 58px;
      color: #293241;
    }

    .choice-visual svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .choice-title {
      font-weight: 740;
    }

    .choice-subtitle {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    @media (max-width: 1040px) {
      .app {
        width: 100vw;
        min-height: 100vh;
        margin: 0;
        border-radius: 0;
        grid-template-columns: 1fr;
      }

      .rail,
      .inspector { display: none; }

      .canvas-grid,
      .groups,
      .metric-row,
      .preview-toolbar,
      .column-confirm-head,
      .column-confirm-row { grid-template-columns: 1fr; }

      .workspace {
        grid-template-rows: auto minmax(0, 1fr) 60px;
      }

      .topbar {
        padding: 14px;
        align-items: stretch;
        flex-direction: column;
      }

      .project-name {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="rail">
      <div class="traffic" aria-hidden="true">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="19" height="19" fill="none">
            <path d="M5 17.5 10 9l4 5 5-8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
            <path d="M5 18h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
          </svg>
        </div>
        <span>SciPlot</span>
      </div>
      <nav class="nav" id="railNav" aria-label="Workbench sections"></nav>
    </aside>

    <section class="workspace">
      <header class="topbar">
        <div class="title-wrap">
          <div class="eyebrow">Plot Canvas</div>
          <h1 id="pageTitle">Source</h1>
        </div>
        <input id="projectName" class="project-name" type="text" autocomplete="off" placeholder="Project name">
      </header>
      <section class="canvas" id="canvas"></section>
      <footer class="footer">
        <div id="status" class="status-line"></div>
        <div class="footer-actions">
          <button id="backButton" class="btn" type="button">Back</button>
          <button id="nextButton" class="btn primary" type="button">Next</button>
        </div>
      </footer>
    </section>

    <aside class="inspector" id="inspector"></aside>
  </main>

  <script>
    const state = {
      view: "Source",
      catalog: [],
      dataTypeId: "",
      experimentTypeId: "",
      groups: [
        { sample: "Sample A", files: [] },
        { sample: "Sample B", files: [] }
      ],
      activeGroup: 0,
      session: null,
      lastProject: null,
      projectStatus: null,
      codexJob: null,
      plotOutput: "runs/run_001",
      exports: ["pdf", "tiff_300"],
      figureSize: "120x55",
      refineOptions: {},
      refineDirty: false,
      tablePreviews: {},
      columnConfirmations: {},
      previewLoading: {},
      previewErrors: {},
      activePreviewKey: "",
      fileSequence: 0,
      codexGoal: "",
      statusText: "",
      error: ""
    };

    const views = ["Source", "Inspect", "Samples", "Export", "Codex Runs"];

    const figureSizeOptions = [
      { value: "60x55", label: "60 x 55 mm" },
      { value: "120x55", label: "120 x 55 mm" },
      { value: "180x55", label: "180 x 55 mm" },
      { value: "60x110", label: "60 x 110 mm" },
      { value: "120x110", label: "120 x 110 mm" },
      { value: "180x110", label: "180 x 110 mm" }
    ];

    const exportOptions = [
      { value: "pdf", label: "PDF" },
      { value: "tiff_300", label: "TIFF 300 DPI" },
      { value: "png_300", label: "PNG 300 DPI" }
    ];

    const scaleOptions = [
      { value: "", label: "Auto" },
      { value: "linear", label: "Linear" },
      { value: "log", label: "Log" }
    ];

    const legendPositionOptions = [
      { value: "", label: "Auto" },
      { value: "upper_right", label: "Upper right" },
      { value: "upper_left", label: "Upper left" },
      { value: "lower_right", label: "Lower right" },
      { value: "lower_left", label: "Lower left" }
    ];

    const columnTypeOptions = [
      { value: "auto", label: "Auto" },
      { value: "numeric", label: "Numeric" },
      { value: "text", label: "Text" },
      { value: "categorical", label: "Category" },
      { value: "datetime", label: "Datetime" },
      { value: "unit", label: "Unit" },
      { value: "metadata", label: "Metadata" },
      { value: "ignore", label: "Ignore" }
    ];

    const columnRoleOptions = [
      { value: "auto", label: "Auto" },
      { value: "x", label: "X axis" },
      { value: "y", label: "Y axis" },
      { value: "series", label: "Series" },
      { value: "sample", label: "Sample" },
      { value: "unit", label: "Unit" },
      { value: "metadata", label: "Metadata" },
      { value: "ignore", label: "Ignore" }
    ];

    const stylePresetOptions = [
      { value: "", label: "Auto" },
      { value: "nature", label: "Nature" }
    ];

    const palettePresetOptions = [
      { value: "", label: "Auto" },
      { value: "colorblind_safe", label: "Colorblind safe" }
    ];

    const canvas = document.querySelector("#canvas");
    const inspector = document.querySelector("#inspector");
    const pageTitle = document.querySelector("#pageTitle");
    const railNav = document.querySelector("#railNav");
    const projectNameEl = document.querySelector("#projectName");
    const statusEl = document.querySelector("#status");
    const backButton = document.querySelector("#backButton");
    const nextButton = document.querySelector("#nextButton");

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function selectedDataType() {
      return state.catalog.find((item) => item.id === state.dataTypeId);
    }

    function selectedExperiment() {
      const dataType = selectedDataType();
      return dataType?.experiments.find((item) => item.id === state.experimentTypeId);
    }

    function defaultProjectName() {
      const experiment = selectedExperiment();
      const samples = state.groups
        .map((group) => group.sample.trim())
        .filter(Boolean)
        .slice(0, 3)
        .join("_");
      return [experiment?.label, samples].filter(Boolean).join("_") || "SciPlot_Project";
    }

    function groupFileCount() {
      return state.groups.reduce((sum, group) => sum + group.files.length, 0);
    }

    function namedGroups() {
      return state.groups.filter((group) => group.sample.trim() && group.files.length);
    }

    function fileKey(file) {
      if (!file) return "";
      if (file.source_path) return `source:${file.source_path}`;
      if (!file.preview_id) {
        state.fileSequence += 1;
        file.preview_id = `upload:${state.fileSequence}:${file.name || "file"}`;
      }
      return file.preview_id;
    }

    function allDataFiles() {
      const items = [];
      state.groups.forEach((group, groupIndex) => {
        group.files.forEach((file, fileIndex) => {
          const key = fileKey(file);
          items.push({ key, group, groupIndex, file, fileIndex });
        });
      });
      return items;
    }

    function activePreviewItem() {
      const items = allDataFiles();
      if (!items.length) return null;
      const item = items.find((candidate) => candidate.key === state.activePreviewKey) || items[0];
      if (!state.activePreviewKey) state.activePreviewKey = item.key;
      return item;
    }

    function ensureColumnConfirmation(key, preview, item) {
      if (!key || !preview || state.columnConfirmations[key]) return;
      state.columnConfirmations[key] = {
        key,
        file_name: item?.file?.name || preview.name || "table",
        source_path: item?.file?.source_path || "",
        sample: item?.group?.sample || "",
        sheet: preview.sheet || "",
        columns: (preview.columns || []).map((column) => ({
          index: column.index,
          name: column.name,
          inferred_type: column.inferred_type || "auto",
          confirmed_type: column.inferred_type || "auto",
          role: column.suggested_role || "auto"
        }))
      };
    }

    function updateColumnConfirmation(key, columnIndex, field, value) {
      const preview = state.tablePreviews[key];
      const item = allDataFiles().find((candidate) => candidate.key === key);
      ensureColumnConfirmation(key, preview, item);
      const confirmation = state.columnConfirmations[key];
      if (!confirmation) return;
      const column = confirmation.columns.find((entry) => Number(entry.index) === Number(columnIndex));
      if (!column) return;
      column[field] = value;
    }

    function collectColumnConfirmations() {
      const items = allDataFiles();
      return items.map((item) => {
        const preview = state.tablePreviews[item.key];
        const confirmation = state.columnConfirmations[item.key];
        if (!preview || !confirmation) return null;
        return {
          sample: item.group.sample || "",
          file_name: item.file.name || preview.name || "table",
          source_path: item.file.source_path || "",
          sheet: preview.sheet || "",
          columns: confirmation.columns
        };
      }).filter(Boolean);
    }

    function formatSize(size) {
      const value = Number(size);
      if (!Number.isFinite(value)) return "";
      if (value < 1024) return `${value} B`;
      if (value < 1024 * 1024) return `${(value / 1024).toFixed(1)} KB`;
      return `${(value / 1024 / 1024).toFixed(1)} MB`;
    }

    function formatExportLabel(value) {
      return exportOptions.find((item) => item.value === value)?.label || value;
    }

    function selectedFigureSize() {
      return state.figureSize;
    }

    function validFigureSize(value) {
      return figureSizeOptions.some((item) => item.value === value);
    }

    function canExport() {
      return Boolean(state.dataTypeId)
        && Boolean(state.experimentTypeId)
        && namedGroups().length > 0
        && state.exports.length > 0
        && validFigureSize(selectedFigureSize());
    }

    function setView(view) {
      state.view = view;
      render();
    }

    function renderRail() {
      railNav.innerHTML = views.map((view, index) => `

          <span class="nav-label">${view}</span>
        </button>
      `).join("");
      railNav.querySelectorAll("[data-view]").forEach((button) => {
        button.addEventListener("click", () => setView(button.dataset.view));
      });
    }

    function iconSvg(kind) {
      const base = 'stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" fill="none"';
      const icons = {
        curves: `<svg viewBox="0 0 160 76"><path ${base} d="M18 59h124M23 57c18-38 36-39 54-6 19 35 39 26 60-26"/><path ${base} opacity=".35" d="M24 47c23-4 37-2 52 6 24 13 42 8 61-17"/></svg>`,
        tensile: `<svg viewBox="0 0 160 76"><path ${base} d="M26 57h112M34 57c22-44 42-47 59-18 13 22 26 24 43-6"/><path ${base} opacity=".35" d="M52 18v13M102 45v13"/></svg>`,
        thermal: `<svg viewBox="0 0 160 76"><path ${base} d="M23 58h116M32 49c18 0 19-28 38-28s18 28 37 28 19-16 32-16"/><path ${base} opacity=".35" d="M43 18h83"/></svg>`,
        spectrum: `<svg viewBox="0 0 160 76"><path ${base} d="M20 59h120M31 56l11-28 9 22 13-35 11 41 12-24 10 16 10-26 11 34"/></svg>`,
        unknown: `<svg viewBox="0 0 160 76"><path ${base} d="M28 58h104M47 45c9-18 24-23 37-11 9 8 15 7 24-7"/><path ${base} opacity=".35" d="M111 42v.2"/></svg>`
      };
      return icons[kind] || icons.unknown;
    }

    function tile(item, selected, iconKind) {
      return `
        <button class="choice-tile ${selected ? "selected" : ""}" type="button" data-id="${item.id}">
          <div class="choice-visual">${iconSvg(item.chart || iconKind || item.icon)}</div>
          <div>
            <div class="choice-title">${escapeHtml(item.label)}</div>
            ${item.rule_id ? `<div class="choice-subtitle">${escapeHtml(item.rule_id)}</div>` : ""}
          </div>
        </button>
      `;
    }

      const dataTypes = state.catalog;
      canvas.innerHTML = `

                  <div class="row-main">

              <div class="panel-body choice-grid">

          </div>

      canvas.querySelectorAll("[data-id]").forEach((button) => {

    function renderInspectView() {

      const experiments = dataType?.experiments || [];
      canvas.innerHTML = `
        <div class="canvas-grid">
          <div class="panel">
            <div class="panel-head"><span>Inspect Recommendation</span><span class="chip">${escapeHtml(dataType?.label || "No data type")}</span></div>
            <div class="panel-body">
              <div class="row">
                <div class="row-main">
                  <span class="row-title">${escapeHtml(state.session?.experiment_label || selectedExperiment()?.label || "No experiment")}</span>
                </div>
                <span class="chip">${escapeHtml(state.session?.rule_id || selectedExperiment()?.rule_id || "unknown")}</span>

              <div class="panel">
                <div class="panel-head"><span>Experiment / plot type</span></div>
                <div class="panel-body choice-grid">

    function renderColumnConfirmations(preview, key) {
      const item = allDataFiles().find((candidate) => candidate.key === key);
      ensureColumnConfirmation(key, preview, item);

      if (!confirmation) return "";

          <div class="column-confirm-head">

                <span class="row-subtitle">${escapeHtml(column.inferred_type || "auto")} · ${Number(column.index) + 1}</span>
              </div>
              <select class="column-select" data-column-type="${column.index}" aria-label="Column type ${escapeHtml(column.name)}">
                ${renderSelectOptions(columnTypeOptions, column.confirmed_type)}
              </select>
              <select class="column-select" data-column-role="${column.index}" aria-label="Column role ${escapeHtml(column.name)}">
                ${renderSelectOptions(columnRoleOptions, column.role)}
              </select>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderDataTable(preview) {
      const columns = preview?.columns || [];
      const rows = preview?.rows || [];
      if (!columns.length || !rows.length) {
        return '<div class="placeholder">Table data pending</div>';
      }
      return `
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>#</th>
                ${columns.map((column) => `<th>${escapeHtml(column.name)}</th>`).join("")}
              </tr>
            </thead>
            <tbody>
              ${rows.map((row) => `
                <tr>
                  <td>${escapeHtml(row.index)}</td>
                  ${columns.map((column, index) => `<td title="${escapeHtml(row.values[index] || "")}">${escapeHtml(row.values[index] || "")}</td>`).join("")}
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderTablePreviewPanel() {
      const items = allDataFiles();
      const item = activePreviewItem();
      if (!item) {
        return `
          <div class="panel">
            <div class="panel-head"><span>Data table preview</span><span class="chip">waiting</span></div>
            <div class="panel-body"><div class="placeholder">Select a data file</div></div>
          </div>
        `;
      }
      const key = item.key;
      const preview = state.tablePreviews[key];
      const loading = Boolean(state.previewLoading[key]);
      const error = state.previewErrors[key];
      const status = error ? "error" : loading ? "loading" : preview ? `${preview.preview_columns} columns` : "queued";
      return `
        <div class="panel">
          <div class="panel-head"><span>Data table preview</span><span class="chip ${error ? "warning" : preview ? "success" : ""}">${escapeHtml(status)}</span></div>
          <div class="panel-body">
            <div class="preview-toolbar">
              <label class="field">
                <span class="field-label">File</span>
                <select id="previewFileSelect" class="field-input">
                  ${items.map((candidate) => `
                    <option value="${escapeHtml(candidate.key)}" ${candidate.key === key ? "selected" : ""}>
                      ${escapeHtml(candidate.group.sample || "Sample")} / ${escapeHtml(candidate.file.name || "file")}
                    </option>
                  `).join("")}
                </select>
              </label>
              ${preview?.encoding ? `<span class="chip">${escapeHtml(preview.encoding)}</span>` : ""}
              ${preview?.sheet ? `<span class="chip">${escapeHtml(preview.sheet)}</span>` : ""}
            </div>
            ${error ? `<div class="row-subtitle">${escapeHtml(error)}</div>` : ""}
            ${preview ? renderDataTable(preview) : '<div class="placeholder">Loading table</div>'}
            ${preview ? renderColumnConfirmations(preview, key) : ""}
          </div>
        </div>
      `;
    }

    function moveGroup(fromIndex, toIndex) {
      if (!Number.isInteger(fromIndex) || !Number.isInteger(toIndex)) return;
      if (fromIndex === toIndex) return;
      if (fromIndex < 0 || toIndex < 0) return;
      if (fromIndex >= state.groups.length || toIndex >= state.groups.length) return;

      const [group] = state.groups.splice(fromIndex, 1);
      state.groups.splice(toIndex, 0, group);

      if (state.activeGroup === fromIndex) {
        state.activeGroup = toIndex;
      } else if (fromIndex < state.activeGroup && toIndex >= state.activeGroup) {
        state.activeGroup -= 1;
      } else if (fromIndex > state.activeGroup && toIndex <= state.activeGroup) {
        state.activeGroup += 1;
      }
      render();
    }

    function removeGroup(index) {
      if (!Number.isInteger(index) || index < 0 || index >= state.groups.length) return;
      if (state.groups.length <= 1) return;
      const [removed] = state.groups.splice(index, 1);
      (removed?.files || []).forEach((file) => {
        const key = fileKey(file);
        delete state.tablePreviews[key];
        delete state.columnConfirmations[key];
        delete state.previewLoading[key];
        delete state.previewErrors[key];
        if (state.activePreviewKey === key) state.activePreviewKey = "";
      });
      if (state.activeGroup === index) {
        state.activeGroup = Math.min(index, state.groups.length - 1);
      } else if (state.activeGroup > index) {
        state.activeGroup -= 1;
      }
      render();
    }

    function renderSamplesView() {
      const active = state.groups[state.activeGroup] || state.groups[0];
      const files = active?.files || [];
      canvas.innerHTML = `
        <div class="groups">
          <div class="panel">
            <div class="panel-head">
              <span>Legend order</span>
              <button class="btn" id="addGroup" type="button">Add</button>
            </div>
            <div class="sample-list" id="sampleList">
              ${state.groups.map((group, index) => `
                <div class="sample-row ${index === state.activeGroup ? "active" : ""}" data-index="${index}" data-drag-index="${index}" draggable="true">
                  <button class="drag-handle" type="button" aria-label="拖动调整图例顺序" title="拖动调整图例顺序">::</button>
                  <input class="sample-input" value="${escapeHtml(group.sample)}" aria-label="样品名（图例名）" title="图例名">
                  <span class="file-count">${group.files.length}</span>
                  <button class="sample-remove" data-remove-group="${index}" type="button" aria-label="Remove sample ${escapeHtml(group.sample || `Sample ${index + 1}`)}" title="Remove sample" ${state.groups.length <= 1 ? "disabled" : ""}>&times;</button>
                </div>
              `).join("")}
            </div>
          </div>
          <div class="panel">
            <div class="panel-head">
              <span>${escapeHtml(active?.sample || "Sample")}</span>
              <input id="fileInput" type="file" multiple hidden>
              <button class="btn" id="chooseFiles" type="button">Choose files</button>
            </div>
            <div class="dropzone" id="dropzone">
              <div>
                <div class="drop-title">Drop files here</div>
                <div>${escapeHtml(active?.sample || "Sample")}</div>
              </div>
            </div>
            <div class="file-list">
              ${files.map((file, index) => `
                <div class="row file-row" data-preview-key="${escapeHtml(fileKey(file))}">
                  <div class="row-main">
                    <span class="row-title">${escapeHtml(file.name)}</span>
                    <span class="row-subtitle">${escapeHtml(file.source_path || formatSize(file.size || file.size_bytes))}</span>
                  </div>
                  <button class="btn remove-file" data-index="${index}" type="button">Remove</button>
                </div>
              `).join("")}
            </div>
          </div>
        </div>
        ${renderTablePreviewPanel()}
      `;
      attachSampleHandlers();
    }

    function attachSampleHandlers() {
      canvas.querySelector("#addGroup").addEventListener("click", () => {
        state.groups.push({ sample: `Sample ${state.groups.length + 1}`, files: [] });
        state.activeGroup = state.groups.length - 1;
        render();
      });
      canvas.querySelectorAll(".sample-row").forEach((row) => {
        row.addEventListener("click", (event) => {
          if (event.target.closest(".sample-input, .sample-remove")) return;
          state.activeGroup = Number(row.dataset.index);
          render();
        });
        row.addEventListener("dragstart", (event) => {
          event.dataTransfer.effectAllowed = "move";
          event.dataTransfer.setData("text/plain", row.dataset.dragIndex);
          row.classList.add("dragging");
        });
        row.addEventListener("dragend", () => {
          row.classList.remove("dragging");
          canvas.querySelectorAll(".sample-row.drag-over").forEach((item) => item.classList.remove("drag-over"));
        });
        row.addEventListener("dragover", (event) => {
          event.preventDefault();
          event.dataTransfer.dropEffect = "move";
          row.classList.add("drag-over");
        });
        row.addEventListener("dragleave", () => row.classList.remove("drag-over"));
        row.addEventListener("drop", (event) => {
          event.preventDefault();
          row.classList.remove("drag-over");
          const draggedIndex = event.dataTransfer.getData("text/plain");
          const targetIndex = row.dataset.dragIndex;
          moveGroup(Number(draggedIndex), Number(targetIndex));
        });
        const input = row.querySelector(".sample-input");
        input.addEventListener("click", (event) => event.stopPropagation());
        input.addEventListener("input", (event) => {
          state.groups[Number(row.dataset.index)].sample = event.target.value;
          updateChrome();
        });
      });
      canvas.querySelectorAll(".sample-remove").forEach((button) => {
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          removeGroup(Number(button.dataset.removeGroup));
        });
      });
      const fileInput = canvas.querySelector("#fileInput");
      canvas.querySelector("#chooseFiles").addEventListener("click", () => fileInput.click());
      fileInput.addEventListener("change", () => {
        addFiles(Array.from(fileInput.files || []));
        fileInput.value = "";
      });
      const dropzone = canvas.querySelector("#dropzone");
      ["dragenter", "dragover"].forEach((name) => {
        dropzone.addEventListener(name, (event) => {
          event.preventDefault();
          dropzone.classList.add("dragover");
        });
      });
      ["dragleave", "drop"].forEach((name) => {
        dropzone.addEventListener(name, (event) => {
          event.preventDefault();
          dropzone.classList.remove("dragover");
        });
      });
      dropzone.addEventListener("drop", (event) => addFiles(Array.from(event.dataTransfer.files || [])));
      canvas.querySelectorAll(".file-row").forEach((row) => {
        row.addEventListener("click", () => {
          state.activePreviewKey = row.dataset.previewKey || "";
          render();
        });
      });
      canvas.querySelectorAll(".remove-file").forEach((button) => {
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          const [removed] = state.groups[state.activeGroup].files.splice(Number(button.dataset.index), 1);
          const removedKey = fileKey(removed);
          delete state.tablePreviews[removedKey];
          delete state.columnConfirmations[removedKey];
          delete state.previewLoading[removedKey];
          delete state.previewErrors[removedKey];
          if (state.activePreviewKey === removedKey) state.activePreviewKey = "";
          render();
        });
      });
    }

    function attachPreviewHandlers() {
      const select = canvas.querySelector("#previewFileSelect");
      if (select) {
        select.addEventListener("change", (event) => {
          state.activePreviewKey = event.target.value;
          render();

        });

    }

    function renderExportControls() {

          <div class="panel-body">
            <label class="field">
              <span class="field-label">Output directory</span>
              <input id="plotOutput" class="field-input" value="${escapeHtml(state.plotOutput)}" autocomplete="off">
            </label>
            <div class="field">
              <span class="field-label">Figure size</span>
              <div class="option-row">
                ${figureSizeOptions.map((item) => `
                  <button class="option-pill ${state.figureSize === item.value ? "selected" : ""}" type="button" data-size="${item.value}">
                    ${escapeHtml(item.label)}
                  </button>
                `).join("")}
              </div>
            </div>
            <div class="field">
              <span class="field-label">Export formats</span>
              <div class="option-row">
                ${exportOptions.map((item) => `
                  <label class="option-pill ${state.exports.includes(item.value) ? "selected" : ""}">
                    <input type="checkbox" data-export="${item.value}" ${state.exports.includes(item.value) ? "checked" : ""}>
                    <span>${escapeHtml(item.label)}</span>
                  </label>
                `).join("")}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderCodexView() {
      const status = state.projectStatus;
      const jobs = status?.codex?.jobs || [];
      const needsCodex = Boolean(status?.needs_codex || state.lastProject?.run_failed);
      canvas.innerHTML = `
        <div class="${hasResultReview() ? "canvas-grid" : ""}">
          <div class="panel">
            <div class="panel-head">
              <span>Codex Handoff</span>
              ${needsCodex ? '<span class="chip warning">Needs Codex</span>' : '<span class="chip success">Idle</span>'}
            </div>
            <div class="panel-body">
              <div class="row">
                <div class="row-main">
                  <span class="row-title">${needsCodex ? "Intervention" : "Idle"}</span>
                  ${status?.last_run?.failure ? `<span class="row-subtitle">${escapeHtml(status.last_run.failure)}</span>` : ""}
                </div>
              </div>
              <label class="field">
                <span class="field-label">Codex goal</span>
                <textarea id="codexGoal">${escapeHtml(state.codexGoal)}</textarea>
              </label>
              <button class="btn warning" id="runCodexButton" type="button" ${state.lastProject ? "" : "disabled"}>Run Codex</button>
              <div class="panel">
                <div class="panel-head"><span>Codex Runs</span></div>
                <div class="panel-body">
                  ${jobs.length ? jobs.map(jobHtml).join("") : '<div class="placeholder">No jobs</div>'}
                </div>
              </div>
            </div>
          </div>
          ${hasResultReview() ? renderResultReview() : ""}
        </div>
      `;
      const goal = canvas.querySelector("#codexGoal");
      goal.addEventListener("input", (event) => {
        state.codexGoal = event.target.value;
      });
      canvas.querySelector("#runCodexButton").addEventListener("click", startCodexJob);
    }

    function jobHtml(job) {
      return `
        <div class="row">
          <div class="row-main">
            <span class="row-title">${escapeHtml(job.job_id)}</span>
            <span class="row-subtitle">${escapeHtml(job.final_message || job.error || job.status)}</span>
          </div>
          <span class="chip ${job.status === "succeeded" ? "success" : job.status === "failed" ? "warning" : ""}">${escapeHtml(job.status)}</span>
        </div>
      `;
    }

    function hasResultReview() {
      const status = state.projectStatus;
      const figures = resultFigures();
      return Boolean(status?.artifacts?.review_html?.exists || figures.length);
    }

    function resultFigures() {
      const statusFigures = state.projectStatus?.figures || [];
      if (statusFigures.length) return statusFigures;
      return (state.lastProject?.last_run?.figures || []).map((path) => ({
        name: String(path).split("/").pop(),
        path: String(path),
        url: "",
        size_bytes: null
      }));
    }

    function currentProjectRenderOptions() {
      return state.projectStatus?.manifest?.plot_options?.render_options
        || state.lastProject?.plot_options?.render_options
        || {};
    }

    function currentProjectExports() {
      return state.projectStatus?.manifest?.plot_options?.exports
        || state.lastProject?.plot_options?.exports
        || state.exports;
    }

    function resetRefineOptionsFromProject() {
      const options = currentProjectRenderOptions();
      state.refineOptions = {
        size: options.size || selectedFigureSize(),
        xscale: options.xscale || "",
        yscale: options.yscale || "",
        reverse_x: Boolean(options.reverse_x),
        legend_position: options.legend_position || "",
        style_preset: options.style_preset || "",
        palette_preset: options.palette_preset || "",
        line_width: options.line_width ?? "",
        marker_size: options.marker_size ?? "",
        tick_count: options.tick_count ?? "",
        x_label_override: options.x_label_override || "",
        y_label_override: options.y_label_override || "",
        x_min: options.x_min ?? "",
        x_max: options.x_max ?? "",
        y_min: options.y_min ?? "",
        y_max: options.y_max ?? "",
        review_note: ""
      };
      const projectExports = currentProjectExports();
      if (Array.isArray(projectExports) && projectExports.length) {
        state.exports = projectExports;
      }
      state.refineDirty = false;
    }

    function refineOptionValue(name) {
      if (!state.refineDirty && Object.keys(state.refineOptions).length === 0) {
        resetRefineOptionsFromProject();
      }
      return state.refineOptions[name] ?? "";
    }

    function setRefineOption(name, value) {
      state.refineOptions = { ...state.refineOptions, [name]: value };
      state.refineDirty = true;
    }

    function compactRenderOptions(options) {
      const compact = {};
      for (const [key, value] of Object.entries(options)) {
        if (key === "review_note") continue;
        if (value === "" || value === null || value === undefined) continue;
        if (["x_min", "x_max", "y_min", "y_max", "line_width", "marker_size", "tick_count"].includes(key)) {
          const numeric = Number(value);
          if (!Number.isFinite(numeric)) continue;
          compact[key] = numeric;
        } else {
          compact[key] = value;
        }
      }
      return compact;
    }

    function renderOptionSelect(id, label, value, options) {
      return `
        <label class="field">
          <span class="field-label">${escapeHtml(label)}</span>
          <select id="${escapeHtml(id)}" class="field-input">
            ${options.map((item) => `
              <option value="${escapeHtml(item.value)}" ${String(value || "") === item.value ? "selected" : ""}>
                ${escapeHtml(item.label)}
              </option>
            `).join("")}
          </select>
        </label>
      `;
    }

    function renderRefinePanel() {
      const options = {
        size: refineOptionValue("size") || selectedFigureSize(),
        xscale: refineOptionValue("xscale"),
        yscale: refineOptionValue("yscale"),
        reverse_x: Boolean(refineOptionValue("reverse_x")),
        legend_position: refineOptionValue("legend_position"),
        style_preset: refineOptionValue("style_preset"),
        palette_preset: refineOptionValue("palette_preset"),
        line_width: refineOptionValue("line_width"),
        marker_size: refineOptionValue("marker_size"),
        tick_count: refineOptionValue("tick_count"),
        x_label_override: refineOptionValue("x_label_override"),
        y_label_override: refineOptionValue("y_label_override"),
        x_min: refineOptionValue("x_min"),
        x_max: refineOptionValue("x_max"),
        y_min: refineOptionValue("y_min"),
        y_max: refineOptionValue("y_max"),
        review_note: refineOptionValue("review_note")
      };
      return `
        <div class="panel">
          <div class="panel-head">
            <span>SciPlot Refine</span>
            <span class="chip">rerun</span>
          </div>
          <div class="panel-body">
            <div class="field">
              <span class="field-label">Figure size</span>
              <div class="option-row">
                ${figureSizeOptions.map((item) => `
                  <button class="option-pill ${options.size === item.value ? "selected" : ""}" type="button" data-refine-size="${item.value}">
                    ${escapeHtml(item.label)}
                  </button>
                `).join("")}
              </div>
            </div>
            <div class="field-grid">
              ${renderOptionSelect("refineXScale", "X scale", options.xscale, scaleOptions)}
              ${renderOptionSelect("refineYScale", "Y scale", options.yscale, scaleOptions)}
            </div>
            <label class="option-pill inline-fit">
              <input id="refineReverseX" type="checkbox" ${options.reverse_x ? "checked" : ""}>
              <span>Reverse X</span>
            </label>
            <div class="field-grid">
              ${renderOptionSelect("refineLegendPosition", "Legend", options.legend_position, legendPositionOptions)}
              ${renderOptionSelect("refineStylePreset", "Style", options.style_preset, stylePresetOptions)}
              ${renderOptionSelect("refinePalettePreset", "Palette", options.palette_preset, palettePresetOptions)}
              <label class="field">
                <span class="field-label">Revision note</span>
                <input id="refineReviewNote" class="field-input" value="${escapeHtml(options.review_note)}" placeholder="e.g. move legend / log y">
              </label>
            </div>
            <div class="field-grid">
              <label class="field"><span class="field-label">Line width</span><input id="refineLineWidth" class="field-input" inputmode="decimal" value="${escapeHtml(options.line_width)}"></label>
              <label class="field"><span class="field-label">Marker size</span><input id="refineMarkerSize" class="field-input" inputmode="decimal" value="${escapeHtml(options.marker_size)}"></label>
              <label class="field"><span class="field-label">Tick count</span><input id="refineTickCount" class="field-input" inputmode="numeric" value="${escapeHtml(options.tick_count)}"></label>
            </div>
            <div class="field-grid">
              <label class="field">
                <span class="field-label">X label override</span>
                <input id="refineXLabel" class="field-input" value="${escapeHtml(options.x_label_override)}">
              </label>
              <label class="field">
                <span class="field-label">Y label override</span>
                <input id="refineYLabel" class="field-input" value="${escapeHtml(options.y_label_override)}">
              </label>
            </div>
            <div class="field-grid">
              <label class="field"><span class="field-label">X min</span><input id="refineXMin" class="field-input" inputmode="decimal" value="${escapeHtml(options.x_min)}"></label>
              <label class="field"><span class="field-label">X max</span><input id="refineXMax" class="field-input" inputmode="decimal" value="${escapeHtml(options.x_max)}"></label>
              <label class="field"><span class="field-label">Y min</span><input id="refineYMin" class="field-input" inputmode="decimal" value="${escapeHtml(options.y_min)}"></label>
              <label class="field"><span class="field-label">Y max</span><input id="refineYMax" class="field-input" inputmode="decimal" value="${escapeHtml(options.y_max)}"></label>
            </div>
            <div class="option-row">
              <button class="btn primary" id="rerunButton" type="button">Apply & Rerun</button>
              <button class="btn" id="resetRefineButton" type="button">Reset</button>
            </div>
          </div>
        </div>
      `;
    }

    function renderResultReview() {
      const status = state.projectStatus;
      const review = status?.artifacts?.review_html;
      const manifest = status?.artifacts?.manifest;
      const revisionBrief = status?.artifacts?.revision_brief;
      const figures = resultFigures();
      return `
        <div class="panel">
          <div class="panel-head">
            <span>Result Review</span>
            ${status?.last_run?.qa?.status ? `<span class="chip success">QA ${escapeHtml(status.last_run.qa.status)}</span>` : '<span class="chip">Waiting</span>'}
          </div>
          <div class="panel-body">
            ${review?.exists ? `
              <div class="result-stage">
                <iframe src="${escapeHtml(review.url)}" title="SciPlot review"></iframe>
              </div>
            ` : ""}
            <div class="list">
              ${manifest?.exists ? `<a class="row" href="${escapeHtml(manifest.url)}"><span class="row-title">manifest.json</span><span class="chip">open</span></a>` : ""}
              ${revisionBrief?.exists ? `<a class="row" href="${escapeHtml(revisionBrief.url)}"><span class="row-title">Revision brief</span><span class="chip">Codex</span></a>` : ""}
              ${figures.map((figure) => {
                const label = figure.size_bytes ? formatSize(figure.size_bytes) : "figure";
                const content = `<span class="row-title">${escapeHtml(figure.name)}</span><span class="chip">${escapeHtml(label)}</span>`;
                return figure.url
                  ? `<a class="row" href="${escapeHtml(figure.url)}">${content}</a>`
                  : `<div class="row">${content}</div>`;
              }).join("")}
            </div>
            ${renderRefinePanel()}
          </div>
        </div>
      `;
    }

    function resultHtml(project, status) {
      const figures = project.last_run?.figures || [];
      return `
        <div class="panel">
          <div class="panel-head">
            <span>${project.run_failed ? "Run needs Codex" : figures.length ? "Project and figures generated" : "Project generated"}</span>
            ${project.run_failed ? '<span class="chip warning">Failed</span>' : '<span class="chip success">Ready</span>'}
          </div>
          <div class="panel-body">
            <div class="mono">${escapeHtml(project.project_dir)}</div>
            ${project.failure ? `<div class="row-subtitle">${escapeHtml(project.failure)}</div>` : ""}
            ${figures.map((figure) => `<div class="mono">${escapeHtml(figure)}</div>`).join("")}
            <a class="btn primary download-button" href="/api/download/${encodeURIComponent(project.download_name)}">Download ZIP</a>
          </div>
        </div>
      `;
    }

    function renderInspector() {
      const experiment = selectedExperiment();
      const dataType = selectedDataType();
      const status = state.projectStatus;
      const needsCodex = Boolean(status?.needs_codex || state.lastProject?.run_failed);
      inspector.innerHTML = `
        <div class="inspector-title">
          <span>Inspector</span>
          ${needsCodex ? '<span class="chip warning">Codex</span>' : '<span class="chip success">Ready</span>'}
        </div>
        <section class="inspector-section">
          <div class="section-title">Detection</div>
          <div class="row-subtitle">${escapeHtml(dataType?.label || "No data type")}</div>
          <div class="row-title">${escapeHtml(experiment?.label || "No experiment")}</div>
          <div class="mono">${escapeHtml(experiment?.rule_id || state.session?.rule_id || "unknown")}</div>
        </section>
        <section class="inspector-section">
          <div class="section-title">Export</div>
          <div class="row-subtitle">${escapeHtml(selectedFigureSize())}</div>
          <div class="row-subtitle">${escapeHtml(state.exports.map(formatExportLabel).join(" + "))}</div>
          <div class="mono">${escapeHtml(state.plotOutput)}</div>
        </section>
        <section class="inspector-section">
          <div class="section-title">Project</div>
          <div class="row-subtitle">${escapeHtml(state.lastProject?.project_slug || "Not exported")}</div>
          <div class="row-subtitle">${escapeHtml(status?.last_run?.qa?.status || status?.last_run?.failure || "No QA yet")}</div>
        </section>
        <section class="inspector-section">
          <div class="section-title">Codex Handoff</div>
          <div class="row-subtitle">${needsCodex ? "Available" : "Idle"}</div>
          <button class="btn warning" id="inspectorRunCodex" type="button" ${state.lastProject ? "" : "disabled"}>Run Codex</button>
        </section>
      `;
      inspector.querySelector("#inspectorRunCodex").addEventListener("click", () => {
        state.view = "Codex Runs";
        render();
      });
    }

    function attachExportHandlers() {
      const plotOutput = canvas.querySelector("#plotOutput");
      if (plotOutput) {
        plotOutput.addEventListener("input", (event) => {
          state.plotOutput = event.target.value;
          updateChrome();
        });
      }
      canvas.querySelectorAll("[data-size]").forEach((button) => {
        button.addEventListener("click", () => {
          state.figureSize = button.dataset.size;
          render();
        });
      });
      canvas.querySelectorAll("[data-export]").forEach((input) => {
        input.addEventListener("change", () => {
          toggleExport(input.dataset.export);
          render();
        });
      });
      const exportButton = canvas.querySelector("#exportButton");
      if (exportButton) exportButton.addEventListener("click", exportProject);
    }

    function attachRefineHandlers() {
      canvas.querySelectorAll("[data-refine-size]").forEach((button) => {
        button.addEventListener("click", () => {
          setRefineOption("size", button.dataset.refineSize);
          state.figureSize = button.dataset.refineSize;
          render();
        });
      });
      const bindings = [
        ["refineXScale", "xscale"],
        ["refineYScale", "yscale"],
        ["refineLegendPosition", "legend_position"],
        ["refineStylePreset", "style_preset"],
        ["refinePalettePreset", "palette_preset"],
        ["refineReviewNote", "review_note"],
        ["refineLineWidth", "line_width"],
        ["refineMarkerSize", "marker_size"],
        ["refineTickCount", "tick_count"],
        ["refineXLabel", "x_label_override"],
        ["refineYLabel", "y_label_override"],
        ["refineXMin", "x_min"],
        ["refineXMax", "x_max"],
        ["refineYMin", "y_min"],
        ["refineYMax", "y_max"]
      ];
      bindings.forEach(([id, key]) => {
        const element = canvas.querySelector(`#${id}`);
        if (!element) return;
        element.addEventListener("input", (event) => setRefineOption(key, event.target.value));
        element.addEventListener("change", (event) => setRefineOption(key, event.target.value));
      });
      const reverseX = canvas.querySelector("#refineReverseX");
      if (reverseX) {
        reverseX.addEventListener("change", (event) => setRefineOption("reverse_x", event.target.checked));
      }
      const rerunButton = canvas.querySelector("#rerunButton");
      if (rerunButton) rerunButton.addEventListener("click", rerunProject);
      const resetButton = canvas.querySelector("#resetRefineButton");
      if (resetButton) {
        resetButton.addEventListener("click", () => {
          resetRefineOptionsFromProject();
          render();
        });
      }
    }

    function toggleExport(value) {
      if (state.exports.includes(value)) {
        state.exports = state.exports.filter((item) => item !== value);
      } else {
        state.exports = [...state.exports, value];
      }
    }

    function addFiles(files) {
      if (!files.length) return;
      state.groups[state.activeGroup].files.push(...files.map((file) => ({
        name: file.name,
        size: file.size,
        preview_id: `upload:${++state.fileSequence}:${file.name}`,
        file
      })));
      render();
    }

    async function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result).split(",", 2)[1] || "");
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(file);
      });
    }

    function queueActivePreviewLoad() {
      const item = activePreviewItem();
      if (!item) return;
      const key = item.key;
      if (state.tablePreviews[key] || state.previewLoading[key]) return;
      state.previewLoading[key] = true;
      loadTablePreview(item, key);
    }

    async function loadTablePreview(item, key) {
      try {
        const body = {
          name: item.file.name || "table",
          source_path: item.file.source_path || ""
        };
        if (!body.source_path && item.file.file) {
          body.content_base64 = await fileToBase64(item.file.file);
        }
        const response = await fetch("/api/table-preview", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });
        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.error || "Table preview failed");
        }
        state.tablePreviews[key] = payload;
        delete state.previewErrors[key];
        ensureColumnConfirmation(key, payload, item);
      } catch (error) {
        state.previewErrors[key] = error.message;
      } finally {
        delete state.previewLoading[key];
        render();
      }
    }

    async function exportProject() {
      const groups = [];
      for (const group of state.groups) {
        if (!group.sample.trim() || !group.files.length) continue;
        const files = [];
        for (const item of group.files) {
          if (item.source_path) {
            files.push({ name: item.name, source_path: item.source_path });
          } else {
            files.push({ name: item.name, content_base64: await fileToBase64(item.file) });
          }
        }
        groups.push({ sample: group.sample.trim(), files });
      }
      state.statusText = "Exporting and rendering";
      state.error = "";
      updateChrome();
      const response = await fetch("/api/projects", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          project_name: projectNameEl.value.trim() || defaultProjectName(),
          data_type_id: state.dataTypeId,
          experiment_type_id: state.experimentTypeId,
          groups,
          plot_output: state.plotOutput.trim() || "runs/run_001",
          exports: state.exports,
          render_options: {
            size: selectedFigureSize()
          },
          column_confirmations: collectColumnConfirmations(),
          run_after_create: true
        })
      });
      const payload = await response.json();
      if (!response.ok) {
        throw new Error(payload.error || "Export failed");
      }
      state.lastProject = payload;
      state.statusText = payload.run_failed ? "Rendered project needs Codex" : "Figures generated";
      await refreshProjectStatus();
      resetRefineOptionsFromProject();
      state.view = payload.run_failed ? "Codex Runs" : "Export";
      render();
    }

    async function rerunProject() {
      if (!state.lastProject?.project_slug) return;
      try {
        state.statusText = "Applying SciPlot refinements";
        state.error = "";
        updateChrome();
        const response = await fetch(`/api/projects/${encodeURIComponent(state.lastProject.project_slug)}/rerun`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            exports: state.exports,
            render_options: compactRenderOptions(state.refineOptions),
            review_note: state.refineOptions.review_note || ""
          })
        });
        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.error || "Rerun failed");
        }
        state.lastProject = payload;
        state.statusText = payload.run_failed ? "Refined run needs Codex" : "Refined figures generated";
        await refreshProjectStatus();
        resetRefineOptionsFromProject();
        render();
      } catch (error) {
        state.error = error.message;
        state.statusText = error.message;
        render();
      }
    }

    async function refreshProjectStatus() {
      if (!state.lastProject?.project_slug) return;
      const response = await fetch(`/api/projects/${encodeURIComponent(state.lastProject.project_slug)}/status`);
      if (!response.ok) return;
      state.projectStatus = await response.json();
      if (!state.refineDirty) resetRefineOptionsFromProject();
    }

    async function startCodexJob() {
      if (!state.lastProject) return;
      const lastRun = state.projectStatus?.last_run || state.lastProject.last_run || {};
      state.statusText = "Starting Codex job";
      updateChrome();
      const response = await fetch("/api/codex/jobs", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          project_slug: state.lastProject.project_slug,
          project_dir: state.lastProject.project_dir,
          plot_request: state.lastProject.plot_request,
          run_output: lastRun.output || state.lastProject.outputs_dir,
          intervention_request: lastRun.intervention_request || state.projectStatus?.artifacts?.intervention_request?.path,
          failure: lastRun.failure || state.lastProject.failure,
          user_goal: state.codexGoal
        })
      });
      const payload = await response.json();
      if (!response.ok) {
        throw new Error(payload.error || "Could not start Codex");
      }
      state.codexJob = payload;
      state.statusText = `Codex job ${payload.status}`;
      await refreshProjectStatus();
      render();
    }

    function updateChrome() {
      pageTitle.textContent = state.view;
      const experiment = selectedExperiment();
      const dataType = selectedDataType();
      statusEl.textContent = state.statusText || [dataType?.label, experiment?.label].filter(Boolean).join(" / ");
      backButton.disabled = views.indexOf(state.view) === 0;
      nextButton.textContent = state.view === "Export" ? "Export" : "Next";
      nextButton.disabled = state.view === "Export" ? !canExport() : false;
    }

    function render() {
      renderRail();
      pageTitle.textContent = state.view;
      if (state.view === "Source") renderSourceView();
      if (state.view === "Inspect") renderInspectView();
      if (state.view === "Samples") renderSamplesView();
      if (state.view === "Export") renderExportView();
      if (state.view === "Codex Runs") renderCodexView();
      renderInspector();
      attachPreviewHandlers();
      attachRefineHandlers();
      if (state.view === "Inspect" || state.view === "Samples") queueActivePreviewLoad();
      updateChrome();
    }

    backButton.addEventListener("click", () => {
      const index = views.indexOf(state.view);
      state.view = views[Math.max(0, index - 1)];
      render();
    });

    nextButton.addEventListener("click", async () => {
      if (state.view === "Export") {
        try {
          await exportProject();
        } catch (error) {
          state.error = error.message;
          state.statusText = error.message;
          render();
        }
        return;
      }
      const index = views.indexOf(state.view);
      state.view = views[Math.min(views.length - 1, index + 1)];
      render();
    });

    function applySession(session) {
      state.session = session;
      state.dataTypeId = session.data_type_id || state.dataTypeId;
      state.experimentTypeId = session.experiment_type_id || state.experimentTypeId;
      if (Array.isArray(session.groups) && session.groups.length) {
        state.groups = session.groups.map((group) => ({
          sample: group.sample || "Sample",
          files: (group.files || []).map((file) => ({
            name: file.name || file.source_path || "file",
            size_bytes: file.size_bytes,
            source_path: file.source_path
          }))
        }));
        state.activeGroup = 0;
      }
      if (session.project_name) projectNameEl.value = session.project_name;
      if (session.plot_output) state.plotOutput = session.plot_output;
      if (Array.isArray(session.exports) && session.exports.length) state.exports = session.exports;
      if (session.render_options?.size) {
        const size = String(session.render_options.size);
        if (figureSizeOptions.some((item) => item.value === size)) state.figureSize = size;
      }
    }

    async function loadSessionFromQuery() {
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get("session");
      if (!sessionId) return;
      const response = await fetch(`/api/session/${encodeURIComponent(sessionId)}`);
      if (!response.ok) throw new Error("Could not load prepared session");
      applySession(await response.json());
    }

    async function boot() {
      const response = await fetch("/api/catalog");
      const payload = await response.json();
      state.catalog = payload.data_types || [];
      state.figureSize = (payload.figure_size_presets || []).includes(state.figureSize) ? state.figureSize : "120x55";
      if (!state.dataTypeId && state.catalog.length) {
        state.dataTypeId = state.catalog[0].id;
        state.experimentTypeId = state.catalog[0].experiments?.[0]?.id || "";
      }
      await loadSessionFromQuery();
      if (!projectNameEl.value) projectNameEl.value = defaultProjectName();
      render();
    }

    boot().catch((error) => {
      state.statusText = error.message;
      state.error = error.message;
      render();
    });
  </script>
</body>
</html>
